body:
  text: 天台山華頂嗣祖沙門寂震述無生行品第三此為法忍分夫法忍者即無生法忍也無生法有十一諸蘊自性無生二諸見自性無生三空自性無生四性自性無生五時劫不遷自性無生六涅槃生死自性無生七説法音聲寂默自性無生八智慧分別自性無生九神通道力一一周遍自性無生十不出剎那際對現三世盡古今劫一切衆生身自性無生菩薩入第七地先當以方便慧發起殊勝廣遠之行方能證無生法忍故此品之名乃為無生行又必從自心上辨明無生之法所以假心王菩薩發問若求契證之功須具決烈性發大勇猛用剛斷之智乃能證入蓋忍者刃於心也將一切世間有為有漏之妄心真下一刀而割裂之永不復起此乃得忍之義所以般若經云一切法無我得成於忍又大經云離心意識分別想入一切法如虗空性是得無生法忍又云於一切法念念無生滅相可得是名無生法忍又云菩薩行六波羅蜜住三解脫門無方便善巧於法生染著是法愛如宿食生能為過患即不能入正性離生是名菩薩頂結墮於二乘若離於法愛一切法無所得名離生則不墮頂結又云正性即涅槃之理離生即見道無漏智得此智自不為煩惱所迷而於三界受生若能如是即入正性離生得無生法忍以是觀之無剛斷決不能離不割裂豈非是愛只此二語無生法忍之義已盡於斯然今行此無生行以求證於心體必須從法上辨心故先言法而後言心若心之所行而契於無生之法即便證此心體於日用動靜之間矣夫何難之有此品從無相法品中無生之心句發來爾時心王菩薩聞佛説法出三界外不可思議從座而起叉手合掌以偈問曰此序述聞法啓問然菩薩問法之儀皆各不同如圓覺中十二菩薩皆禮足右繞長跪叉手而問又必三請乃止此會獨不然蓋有所表也今心王唯叉手合掌表身心合一戒定慧三學決定圓成若三學圓成始證無生法忍也如來所説義出世無有相可有一切生皆得盡有漏斷結空心我是則無有生云何無有生而得無生忍此贊頌法利以發起無生忍之問也言佛所説義乃超出於世間而實無世間有為之相可謂所有一切衆生莫不皆得令其盡於有漏斷於結空於心我由是觀之則無有於生矣云何無有於生而言有得於無生法忍耶蓋恐後世衆生作有得想故興此問爾時佛告心王菩薩言善男子無生法忍法本無生諸行無生非無生行得無生忍即為虗妄此示忍揀明蓋無生法忍者謂此心於一切生滅之法本無所生非謂諸行無有所生也若諸行無有所生非可謂之無生行若以此謂之得無生忍乃是有無得失之想即為虗妄矣後地藏菩薩問法若無生收此法本無生之義心王菩薩言尊者得無生忍即為虗妄無得無忍應非虗妄此揀問誤解謂如佛所言若謂得無生忍即為虗妄若乃無有得於無生忍者應非虗妄矣佛言不也何以故無得無忍是則有得有得有忍是則有生有生於得有所得法並為虗妄此折非揀妄謂若言無有得於無生忍亦不出得失有無之中是則同於有得既同於有得亦乃有忍是則真有無生法忍矣若果有無生於心有得即是有所得法作此計度並為虗妄此皆以知解分別以盡夫後世之疑也心王菩薩言尊者云何無忍無生心而非虗妄此正問其義始出此心字從前兩番窮詰只為此一字耳佛言無忍無生心者心無形段猶如火性雖處木中其在無所決定性故但名但字性不可得欲詮其理假説為名名不可得心相亦爾不見處所知心如是則無生心流通本作心生此明無生心言此心無形段可見亦無處所可住喻如火性之在木中但虗有名字而不可得今欲詮釋其理故假説為名而名實不可得心相亦爾知心如是則是無生之心瞿曇老漢當時如是論説總屬支離連纍後代種種説心論性總是相樓打樓依樣畫樣皆不能出於範圍如西天不如蜜多尊者偈云真性心地藏無頭亦無尾應緣而化物方便呼為智又如東土六祖曰我有一物無頭無尾無名無字無背無面諸人還識否時沙彌神會曰是諸佛之本源神會之佛性祖曰向道無名無字汝又喚作本源佛性已後有把茅蓋頭也只成知解宗徒所以宗乘中至南嶽馬祖百丈黃檗臨濟代代顯大機大用翻盡心性窠窟直顯頓悟一宗然而返觀一大藏教如嚼飯喂嬰兒相似雖然為下根人固合如是亦怪伊不得善男子是心性相又如阿摩勒果本不自生不從他生不共生不因生不無生何以故緣代謝故緣起非生緣謝非滅隱顯無相根理寂滅在無有處不見處所住決定性故是決定性亦不一不異不斷不常不入不出不生不滅離諸四謗言語道斷無生心性亦復如是云何説生不生有忍無忍若有説心有得有住及以見者即為不得阿耨多羅三藐三菩提是為長夜了別心性者知心性如是性亦如是是無生行此明無生行阿摩勒葉似棗華小而白果如胡桃味酸甜可入藥又菴沒羅葉似柳而長果似梨一翻云難分別謂其似桃而非桃似奈而非奈可以療疾又菴摩勒形似檳榔食之除風此土皆無故不翻今此言阿摩勒果因移接乃生故以為喻言不因生者不無因而生也不無生者亦不無有生也如龍勝菩薩中觀論偈云諸法不自生亦不從他生不共不無因是故説無生取義同此後又徵明其義謂此乃緣之代謝故以緣起而生非實有所生以緣謝而滅非實有所滅緣滅即隱緣起即顯本無有相若窮詰其根源而真理本自寂滅欲求其在終無有處然不見其處所以其住於決定性故是決定性無有名狀亦非一異斷常入出生滅等相若謂生滅等相即同於四謗蓋有是增益謗無是損滅謗亦有亦無是相違謗非有非無是戲論謗四謗若離百非都絶至此則言語道斷何有生與不生有忍無忍若有説於心有所得有所住及以有無等見者即為不得無上正遍知覺而困於無明長夜矣若真曉了分別此心性者知心之性相如是性體亦如是是則為無生行然心之與性本非二物迷則結性為心悟則轉心成性正如水之成氷而氷還成水也心王菩薩言尊者心若本如無生於行諸行無生生行不生不生無行即無生行也此自審於解言此心若本自如於心無所生於一切諸行於諸行亦無所生於其心如是則無生之心與一切諸行二俱不生不生則無所行是即無生行也佛言善男子汝以無生而證無生行耶北藏作也此揀問所證心王菩薩言不也何以故如無生行性相空寂無見無聞無得無失無言無説無知無相無取無捨云何取證若取證者即為諍論無諍無論乃無生行此發明正解初拂去所詰之意而後乃發明言如無生行者性相二俱空寂即今無見無聞體自空故無得無失性本具故無言無説文字性空故內無知覺外無幻相無一法可取無一法可捨云何而有取證若有取證者即為諍論以言相爭曰諍執理辨駁曰論須是無諍無論乃為無生行此無生行即是淨名問菩薩入不二法門時法自在菩薩首唱云生滅為二法本不生今則無滅得此無生法忍是為入不二法門諸菩薩各各説已最後文殊大士曰如我意者於一切法無言無説無示無識離諸問答是為入不二法門復以問於淨名淨名默然無言文殊嘆曰善哉是真入不二法門是時衆中五千菩薩聞説是已皆入不二法門得無生法忍肇法師曰有言於無言未若無言於無言所以示默然也今以不二法門而證心王菩薩之解若合符節然初祖西來以不立文字直指人心見性成佛直接世尊拈華正傳心印一宗至今四十有三傳皆用勦絶著子要人將金剛王寶劍向自己意根下一揮直教一斬一切斷而顯無言之旨用覿面一機真是得忍法門但世尊當日曲為後世衆生敷演教義不肯截斷葛藤致使心王牽枝引蔓設遇而今濟下兒孫才見伊恁麼説便喝住云此猶涉唇吻在屏却咽喉唇吻快道一句來且看心王作何抵對佛言汝得阿耨多羅三藐三菩提也此印成其解雖然者一句也是惡毒語直使心王退身三步心王菩薩言尊者我無得阿耨多羅三藐三菩提何以故菩提性中無得無失無覺無知無分別相無分別中即清淨性性無間雜無有言説非有非無非知非不知諸可法行亦復如是何以故一切法行不見處所決定性故本無有得不得云何得阿耨多羅三藐三菩提此自斷真見梵語阿耨多羅三藐三菩提此云無上正等正覺在菩薩始能發此覺心在諸佛始能得此覺果般若經云阿耨多羅三藐三菩提無有定法實無有法無有少法可得於是中無實無虗今心王所言亦即此義故曰菩提性中本自具足無有得失本無迷故亦無覺心不自知故無知又分別是識不分別是智故無分別相然無分別中即清淨性以故真常獨露而無間雜不立文字而無言説絶於朕兆而非有任運自在而非無體性湛寂而非知靈明常照又非不知至於一切可修之法可行之行亦爾俱不見有處所得決定性本無有得與不得云何而言得於阿耨菩提耶雖然心王被世尊驀頭一印便覺頂門重看來也是膽小華嚴經云如來成正覺時普見一切衆生成正覺又菩薩摩訶薩知自心念念常有佛成正覺若恁麼會去也只是尋常事耳佛言如是如是如汝所言一切心行不過無相體寂無生所有諸識亦復如是何以故眼眼觸悉皆空寂識亦空寂無有動不動相內無三受三受寂滅耳鼻舌身心意意識及以末那阿梨耶亦復如是皆亦不生寂滅心及無生心此重印釋成夫佛與心王皆曲為後世衆生互為唱酬故云如汝所言蓋此非為印成心王可知矣下發明無生法忍心量境界言一切心中之行亦不過於無相其體本自空寂無生所有諸識亦爾如眼根及眼觸之色塵與眼根之識皆本空寂無動與不動之相於內本無苦受樂受不苦不樂受夫苦受中具壞苦行苦苦苦樂受中唯壞苦不苦不樂受中唯行苦如眼識中苦受具三苦者眼視苦色是壞苦苦色觸眼是行苦眼與色交互為苦苦其樂受中見好色不常緣謝即壞不苦不樂受中一切色皆有無常所侵若眼之根塵色三悉皆空寂而此三受皆歸寂滅至於耳鼻舌身心意意識亦然各有三受具三種苦如耳聞苦聲苦聲觸耳耳與聲交互是苦受中三種苦耳聽好聲不常是樂受中壞苦終有無常所侵是不苦不樂中行苦餘如鼻聞惡臭舌嘗苦味身遇惡觸心意緣慮苦境意識分別苦法又惡臭觸鼻苦味觸舌惡觸觸身惡境逼心惡法亂意以至鼻舌身心意意識與臭味觸及境法交互等皆是苦受中三苦一切皆是不常是樂受中壞苦一切終有無常所侵是不苦不樂受中行苦也以眼根例推悉皆空寂然心意意識一句成唯識論云約緣慮積集八識皆名心若集諸種子第八獨名心又約等無間思慮八識皆名意若恆審思慮第七獨名意約了達分別八識皆名識若了別六塵粗境前六可名識謂其皆從所依之根而發為屬為助一如六根之識故曰識末那此云染污第七識之名謂其與我見癡慢愛四惑相應能染污真性故得此名阿梨耶此云藏謂能含藏諸種子以變起諸現行故又謂之現識以能隨五塵對至即現無有前後任運而起如鏡之現像故又具能所執三義謂我愛執所攝藏也又名阿陀那此云執持謂能執持善惡業果故又謂之業識也復名毗播迦此云異熟以其能變心真如相而為異受前七識善惡業所熏而成熟為果故前言心意意識一句隨衆生虗妄心識而言後末那阿梨耶以明菩薩修行大乘七八二識之別據法相宗云第八識有三位名異而體不異凡位至七地名梨耶識八地至等覺名異熟識佛位名陀那亦云無垢識前二真妄和合後一純真又云唵摩羅識此云白淨乃佛位純真之識若無此識則過未因緣悉應忘失見後本覺利品中然經言一心論云唯識心意識三名字雖異皆以寂滅為體而亦不生寂滅心及無生之心此真為無生行也後地藏菩薩問無生識乃收此中之義若生寂滅心若生無生心是有生行非無生行內生三受三行三戒若寂滅生心則不生心常寂滅無功無用不證寂滅相亦不住於無證可處無住總持無相即無三受三受等三悉皆寂滅清淨無住不入三昧不住坐禪無生無行此揀明無生行相乃承上所言若生寂滅與無生之心是即有生行非謂之無生行於內則生三種受由三受便隨情識而行起貪瞋癡三毒成三惡業然貪因緣盜瞋因緣殺癡因緣淫此三因若斷即三緣不生故以三戒作對治方便一攝律儀戒明止作持犯二攝善法戒修一切菩提分法三攝衆生戒即饒益有情雖然若寂滅之心生則妄心決定不生而心體常自寂滅如是則功用俱泯故曰無功無用既無功無用則自不取證於寂滅之相亦不住於無證可處而無所住此是總持無相大解脫法門若得如是即無三受而三受三行三戒亦皆寂滅一切法性皆得清淨皆依無住而住入不三昧亦不住坐禪是為無生無行華嚴第七遠行地菩薩成就圓滿方便慧而住於此地無有一念休息廢捨行住坐臥乃至睡夢未嘗暫與蓋障相應念念中常能具足十波羅蜜修無相行成就不可思議身語意業無相行故行於實際而不作證雖示現生死而恆住涅槃雖萬衆圍繞而心如獨處雖以願力三界受生而不為世諦所染雖常寂滅以方便力而還熾然作用雖隨順一切世間而常行一切出世之法獲如實三昧離一切心意識分別想無所取著猶如虗空是名得無生法忍能於三千大千世界為大明師即此便入第八地捨前七地一切功用行住無功用為深行菩薩離於喧諍所作皆息住於報行得真寂滅心至此又發起無功用大覺慧獲無量差別智得入法流門中入一切智智境界今此中即華嚴七地入八地所修所證行相心王菩薩言禪能攝動定諸幻亂云何不禪此揀問禪寂之義蓋禪能攝心之所動而能定諸虗幻亂想云何而言不住於坐禪耶夫禪為靜慮乃第五地中行相凡初習禪定正身端坐或半跏趺或全跏趺先挺動其身并諸骨節作七八反如自按摩法既而令脊相對身心適然乃開口吐胸中濁氣想身分中百脈不通處皆得舒暢後方閉口納鼻中清氣如是至三若習久身息調和但一亦得次當唇齒相合舌拄上齶後方閉目祇令斷光而已若欲出定時先開口放氣想息從百脈隨意而散然後微動其身及肩胛頭項以至於足復以手遍摩悉令柔軟又擦手令暖摩抄兩眼方使其開乃可隨意蓋入定從粗入細出定從細出粗若在定既久出時陡促則細法未散恐於身中作風痛諸患至若調息之法有聲喘氣息四相守聲則散守喘則結守氣則勞守息則定也若夫論禪定之法余嘗得諸藏典中如經云初學不思議三昧當繫心一緣若久習成就更無心想恆與定俱此修定之初門也又云若入遍處定或行或住或坐或臥隨所入定境界現前如是則繁興大用無有不定時矣此修定得力處也又經中言次第入定之法云結跏趺坐正念現前便入初禪從初禪起入第二禪從二禪起入第三禪從三禪起入第四禪又云有覺有觀念得喜安遊心初禪無覺無觀定生喜樂遊心二禪護念清淨無有衆想遊心三禪憂喜既盡無復苦樂意念清淨遊心四禪又云清淨心中諸漏不動名為初禪粗漏已伏名為二禪安隱心中歡喜畢具名為三禪諸苦樂境所不能動名為四禪此四是色界以禪為樂為食然初禪過患內有覺觀故外有火災二禪過患內有歡喜故外有水災三禪過患內有喘息故外有風災至四禪內外過患一切俱無諸災所不能及得四禪已於自身相與虗空相等心緣虗空無邊而為行相即證空無邊處定法從空無邊處起觀空無邊識亦無邊觀空則外觀識則內一心緣識無邊處而為行相即證識無邊處定法從識無邊處起空色既亡識心都滅澄定寂然無去無住故以無所有處而為行相即證無所有處定法亦名不用處從不用處起如存不存若盡非盡故以非想非非想處而為行相即證非想非非想處定法亦名有想無想處此四是無色界以寂為食為樂至此身心滅盡定性現前無復行相滅諸想受名滅盡定二乘人又名此定為想知滅定故曰有想無想處想滅入想知滅定得此想已作是念有念為惡無念為善若不為念行不起思惟微妙想滅粗想不生即入想知滅定此名背捨法亦名次第滅想法通前四禪名為九次第定又云若入初禪則聲刺滅入第二禪則覺觀刺滅入第三禪則喜刺滅入第四禪則出入息刺滅入空處則色想刺滅入識處則空想刺滅入無所有處則識想刺滅入非想非非想處則無所有想刺滅入滅盡定則想受刺滅此諸想中以不用處想為無上諸言有想諸言無想於其中間能次第得想知滅定是為第一無上想又云從初禪起次第入於滅受想定從滅受想定次第還入至於初禪是名師子奮迅三昧喻如師子奮迅之時既能進前奮迅而去亦能却行奮迅而還此餘獸之所不及諸佛菩薩入此三昧亦爾因名師子奮迅三昧既因師子奮迅三昧逆順出入故菩薩有超越三昧能超越諸法次第有順入超逆入超順逆入超逆順入超超出亦爾此名超越三昧然菩薩能具足超聲聞不能具足超但能從初禪超入三禪尚不能超二何況能超三耶菩薩從初禪便能超入滅受想定故名頂禪亦名佛智三昧所謂隨意自在善入出住也又云如來於滅度時從初禪次第入於滅盡三昧從滅盡三昧起入𦦨光三昧從焰光三昧起入水氣三昧復從水氣三昧起還入𦦨光三昧從焰光三昧起還入滅盡三昧次第還入以至初禪復從初禪至滅盡三昧而入無餘涅槃又云菩薩雖入滅定而不樂著寂滅俱時發起四心由慈辦悲緣悲得喜緣喜有捨由空得無願由無願得無相是為解脫門亦名三三昧也然比丘心無異緣意在禪息其始以一心專思寂想為旨訣而能隨意自在善入出住為要終也故文殊師利云昔初發意求入不可思議定我於今日無復此意當入不可思議定若我入不可思議定者則成可思議矣此誠可與學般若菩薩言之而未可與二乘人説也佛言菩薩禪即是動不動不禪是無生禪禪性無生離生禪相禪性無住離住禪動若知禪性無有動靜即得無生此示無生禪為第一義言禪即是動者即前所謂無生之心譬如虗空無有動住無有起相無有作相又如具離空寂心處無住是禪波羅蜜也以離於動靜故曰不動不禪是無生禪然禪性本無生當離於生是禪之行相禪性本無住自當離其住於禪動之相也若知此禪性無有動靜之相即得於無生矣台教依一心三諦修三止觀分藏通別圓四教謂圓教三諦圓融此心即空即假即中一心具十法界三千性相百界千如安心止觀以三觀破三惑三觀一心無惑不破此亦與圓覺中二十五輪最後三觀齊修義同圓覺又云修於禪那先取數門為初首方便疏云次第有六妙門一數二隨三止四觀五還六淨一數息攝心在數不令馳散二隨息心隨於息捨於數故三止凝心寂慮捨隨修止四觀不著於止起觀分別五還捨觀修還轉心返照六淨捨還修淨淨心成就心無所依不起妄想分別能發真性之明前三是定後三是慧台教謂修此六妙門能至涅槃之道也昔有大珠慧海禪師因止觀座主來參問曰如智者大師説止破止説觀破觀住止沒生死住觀心神亂且為當將心止心為復起心觀觀若有心觀是常見法若無心觀是斷見法亦有亦無成二見法試請説看座主不能對珠曰何曾修得止觀來圭峯禪師以禪教互相非毀嘗著禪源詮其序略曰禪是天竺之語具云禪那此云思惟修亦云靜慮定慧之通稱也源者是一切衆生本覺真性悟之名慧修之名定定慧通明為禪又云若頓悟自心本來清淨元無煩惱無漏智性本自具足此心即佛畢竟無異依此而修是最上乘禪亦名如來清淨禪達磨門下展轉相傳者是也無生般若亦不依住心亦不動以是智故故得無生般若波羅蜜此別明般若義言既得此無生即得於般若何故以無生亦不依於有住而心本亦不動以有是智故故得無生般若波羅蜜也心王菩薩言尊者無生般若於一切處無住於一切處無離心無住處無處住心無住無心心無生住如此住心即無生住尊者心無生行不可思議不思議中可不可説此自述領解般若以明主伴互為唱酬也故承上而言無生般若者今我已知於一切處皆無所住亦無所離然此無生之心本無住處亦無處可住其心由此心無住處無處住心故心得於無生而住如此而住其心即是無生住矣既而又歎美其法曰尊者心無生行誠不可以心思口議於其間也然此不可思議中正智現前雖可説而又不可説固當於言外體而明之佛言如是如是此印成其解如是者唯如為是重言者深美之也此又為不可説下一注腳矣心王菩薩聞如是言歎未曾有而説偈言此述聞法喜歎後説偈發明滿足大智尊廣説無生法聞所未曾聞未説而今説此贊法所未有然佛以智方便為後世衆生演説斯義故即稱大智也前無相法中亦説無生而未能若此所以謂廣説也然我等今聞所未曾聞而如來四十餘年未説之法今亦説之矣猶如淨甘露時時乃一出難遇難思議聞者亦復難此歎聞遇之難時時猶言久久也如是妙法今已説雖云後世難遇此法然欲求聞而深解者亦復難矣無上良福田最上勝妙藥為度衆生故而今為宣説此明悉檀法利蓋田能長養根苗而藥能療身心之病以明度生説法意也爾時衆中聞説此已皆得無生無生般若此結衆聞獲益無生般若本是七地中法在會同聞而得共證理固然也又須知初地至七地同修無相法次第斷俱生我法二執同入滅定但前六地有出有入定相未忘以其同於二乘厭生死欣涅槃墮有為行有能取所取故七地則遠離定相能念念入念念起念念無相以捨於二乘之善住於亡善之地無生死涅槃之相第功用未忘心量猶在故必至八地捨離藏識俱生我執已盡一切種種相滅方得住於滅定不起然以自覺聖智之力所持終不為定相所醉是故不取證涅槃而上求下化也音釋療音料治病也諍爭去聲駁音博色不純也吻音刎脣邊曰吻屏音丙除也與迸同朕呈錦切上聲線縫處又帝王自稱曰朕兆音趙與兆同事先見也驀音麥躍身上馬之狀供平聲具也首去聲有罪自陳曰首喧音暄譁也囂也挺汀上聲聳直貌齶音噩胛音夾肩脾嚙音舛息在心胸之圓則嚙奮音糞鳥忽飛起貌又力舉也迅音信疾也又與奮同奮亦音信鳥之張羽自奮也
