body:
  text: 天台山華頂嗣祖沙門𧧌震述本覺利品第四此為轉識分唯識論云約了達分別八識皆名識若了別六塵粗境前六獨名識故前六總名分別境識其第八識又名本覺識今此品既以本覺標為名何以不言第八識而反言九識耶蓋以轉八識為第九識耳九識梵語名為唵摩羅此云清淨又云白淨識即第八異熟識謂成佛時轉第八而成唵摩羅無別第九又名無分別智光即佛性正因又名阿摩羅識有二種一所緣即是真如二本覺即真如智能緣即不空如來藏所緣即空如來藏此二竝以真如為體又此第九總攝諸識乃于前八識中加唵摩羅識故又諸識中有體用二心識性是體識相是用如寂滅心即九識是體生滅心即前八識是用以用即體故生滅即不生滅以體即用故不生滅即生滅然生滅無性寂滅隨緣其體用本不二故又此轉字即從利字轉出以九識即第八識所轉亦猶本覺所出之利是故標為本覺利品也又菩薩為住世利人故云留惑潤生如解深密經是入惑之初門說九識名純淨識接引初根留惑不滅令悲智漸漸得生而楞伽為大乘根頓說第八識為如來藏皆直示惑之本實蓋不斷衆生住地無明即顯諸佛根本不動智此留惑潤生義也九識有十種名一曰真識自體非僞故二曰無相識體非有無故三曰法性識軌用不改故四曰佛性真識真覺常存體非隱顯故五曰實際識性絶虗假故六曰法身識大用無方故七曰自性清淨識隨流不染故八曰阿摩羅識此云無垢淨識無有變異如如可為究竟故九曰真如識體非一異故十曰不可名目識勝妙絶待故然欲使衆生轉諸情識入唵摩羅只要策發其自心一覺別無他法又釋摩訶衍論中立十種識心眼識心至第八阿賴耶識心其第九名多一識心第十名一一識心故契經中云心量雖無量而不出十識此即前九中加一切一心識總攝前九故如是十種心量中初九種心不緣真理後一種心得緣真理而為境界故然此品正是第八不動地行相俱生我執已盡所作皆息住於報行得寂滅現前有為無為二行已終是為究竟今此無住菩薩住於不動法爾如是故佛為其發起無功用大覺慧發起無量差別智故以無住為名而表能入於一切智智境界蓋達法身之理名一切智差別智名一切種智一切智智乃根本智中修差別智也又八地修願波羅蜜表願之無住此品又從無相法品中本無本處發源爾時無住菩薩聞佛所說一味真實不可思議從遠近來親如來坐專念諦聽入清白處身心不動此先示儀表法從遠近來表從遠行地近來至此親如來坐表智力自在依諸法如義而住專念諦聽表離於喧諍入清白處表入無垢淨識身心不動表第八地此已包括全品之義矣爾時佛告無住菩薩言汝從何來今至何所此如來下問正表菩薩入不動地時住於報行諸佛必當親現其前為其發起覺慧方得入法流門中然今問汝從何來今至何所正發起其不動意耳無住菩薩言尊者我從無本來今至無本所此自陳不動法相即無相法中本來無本本無本處之義華嚴經云住此地時菩薩心佛心菩提心涅槃心俱不起也佛言汝本不從來今亦不至所汝得本利不可思議是大菩薩摩訶薩即放大光遍照大千界而說偈言此示現光相印成起智華嚴經言八地菩薩以初地至七地中本願力故諸佛親現其前歎云善哉善哉汝所得無生法忍是為第一能順諸佛法故但未得如來十力無畏十八不共諸佛之法所謂十力者一是處非處智力知善惡因緣果報定相二業智力知衆生三世業受果報三定智力知諸禪解脫三昧四根智力知衆生諸根勝劣五解智力知衆生種種解六性智力知世間種種性七道智力知一切道至處相八眼智力能遍見一切九命智力知衆生宿命十漏盡智力知永斷習氣不受後有又無畏有四一正覺等無畏總持一切智故二漏盡無畏知根漏盡故三決疑無畏能決諸障道法疑慮故四受報無畏知苦盡道故以此四種能廣說自他智斷既決定無所失則無所畏又十八不共法者身業無失口業無失意業無失無不定心無異想心無不知已捨心志樂無減精進無減憶念無減智慧無減解脫無減解脫知見無減一切身業隨智慧行口業隨智慧行意業隨智慧行知過去世無礙知未來世無礙知現在世無礙此皆不與二乘共故然當成就此法勤加精進勿自棄所得之忍又當憶念本昔利生之願不可放捨而此諸法法性若佛出世若不出世常住不異且諸佛不以得此法故名為如來須知二乘亦能得此無分別法汝今適得此一法明知一切法無生無分別應更成就諸佛無量法明通達無量差別智直與諸佛無異此菩薩若諸佛不與其發起彼即入究竟涅槃棄捨一切利生之願矣又論云菩薩至第八地有三加七勸三加者一如來現身二摩頂三語業言讚七勸者一勸修十力四無畏十八不共法二勸行精進不捨無生忍門三勸愍念一切衆生四勸憶念本願饒益一切衆生五勸修諸佛身相國土果報六勸學佛無量法門七勸學無量衆生差別業智皆悉通達起大悲業不令滯於無功智門今佛放光讚德發起無住菩薩正合斯義初二句印成其所得不動之無生法忍本利二字本即所得法忍即是本覺利即無量差別智即是轉識佛贊其所得而發起之意在焉放光者即顯如來成就十力無畏十八不共之法也大千界者日月所照一四天下為一小世界統一千小世界為小千界統一千小千界為中千界統一千中千界為大千界一云娑婆乃大千界之都名然前第七地得無生法忍已於三千大千世界為大明師即此便入八地中以故佛今放光印可亦遍照於大千界也大哉菩薩智慧滿足常以本利利益衆生此贊其宿願菩薩住六地七地時得般若方便願力之深常欲以本利之法而利生也於四威儀常住本利導諸羣庶不來不去此導其發問菩薩既入於不動地而現諸威儀能常住於本利矣則亦當以導利之心為心必令一切衆生皆住於不動法地佛如是說直是逼無住菩薩發問而決不能緘其口矣爾時無住菩薩而白佛言尊者以何利轉而轉衆生一切情識入唵摩羅此發轉識入淨之問言佛今令我利益衆生然我實不知以何法利堪為轉用而轉彼衆生一切情想意識入於無垢淨識也上轉字是轉法下轉字是轉識佛言諸佛如來常以一覺而轉諸識入唵摩羅何以故一切衆生本覺常以一覺覺諸衆生令彼衆生皆得本覺覺諸情識空寂無生何以故決定本性本無有動此示自覺覺他之行也言諸佛出世亦無別法常以自心中得一念相應頓然覺悟本來具足之性即此以轉諸識而入於淨性中然以衆生皆本具此覺性故諸佛常以此一心自覺而覺彼衆生令其皆得此本覺而覺悟自己情想意識之空寂無生且決定自知本覺之性其體本無有動亦令其至於不來不去之地也此即宗門明心見性旨訣一覺即明心唵摩羅即是淨性能一見自性即入唵摩羅此示根本實智後皆是諸佛種種差別智業蓋從一心流出種種差別之相菩薩了之名差別智也無住菩薩言可一切識皆緣境起如何不動此揀問識緣境起以發起後得之智可字當作一句勿連下三字讀此可者乃無住菩薩心領意會於自覺覺他之行故曰可語已復曰然則一切識皆緣外境而起如何而言不動耶無住發此一問不自住於不動之地名實相稱矣又菩薩住第八地有十種名一曰不動地無能沮壞故二曰不退轉智慧無退故三曰難得地世無能測故四曰童真地離諸過故五曰生地隨樂自在發生智願故六曰成地智行已成更無所作故七曰究竟地智慧決定故八曰變化地隨願成就故九曰力持地他不能動故十曰無功用地先已成就故有此十名地義方顯佛言一切境本空一切識本空空無緣性如何緣起此示境識本空言雖因目前之境以顯識若識空則境亦空雖因自心之識以顯境若境空而識亦空然外境內識二俱空寂即無可緣之性如何謂之緣境而起耶此祇答識緣境起一句如何不動其義已破無住菩薩言一切境空如何言見此揀問境空無見乃擬凡見而設問故執言有見此見字即從無相法品觀十二因緣中得來佛言見即為妄何以故一切萬有無生無相本不自名悉皆空寂一切法相亦復如是一切衆生身亦如是身尚不有云何有見此折見妄之非佛即隨其凡見以妄折之故曰有見即為妄矣蓋一切萬有之性本自無生無相山不自言山水不自言水草木鳥獸本不自立名字悉皆空寂一切法相一切衆生身亦爾此身尚且不有云何而有見耶無住菩薩言一切境空一切身空一切識空覺亦應空此發明覺空義夫理智相應曰覺佛既言境與身識俱空所言覺者亦因迷而有覺若無迷亦無有覺矣佛言可一覺者不毀不壞決定性故非空非不空無空不空此印可覺空義前無住菩薩言可蓋自言其可耳今佛之言可者乃僅可之詞也因其義之未足所以不言如是後即徵明其義一覺者非同境與身有毀有壞而可言空此乃不能毀壞其性決定蓋順法性則萬法俱寂隨智用則萬法俱生故曰非空亦非不空亦無空與不空也無住菩薩言諸境亦然非空相非無空相此又自陳悟解佛言覺性義而悟諸境也佛言如是彼可境者性本決定決定性根無有處所此重印其解故言如是又印定所解而發起其問故曰彼之可指為境者其性本決定非可以言空若推其決定性之根源實無有處所又非可以言其不空也無住菩薩言覺亦如是無有處所此因境而推明覺義佛言如是覺無處所藏本無所字故清淨清淨無覺物無處所故清淨清淨無色此印成發起言覺本無有處所故性自清淨然清淨性中實無覺之幻名物亦無有處所故性亦清淨然清淨性中實無物之幻色無住菩薩言心眼識亦復如是不可思議此以覺推明言若覺與物同一清淨則心眼識等亦爾其義亦不可思議也佛言心眼識亦復如是不可思議何以故色無處所清淨無名不入於內眼無處所清淨無見不出於外心無處所清淨無止無有起處識無處所清淨無動無有緣別性皆空寂性無有覺覺則為覺此順成覺義夫色居法相之首塵蘊之初今舉一以例諸乃言色無處所故清淨自無幻色之可名且色屬外塵亦不入於內也眼為六根之一舉一以例五乃言眼無處所故清淨自無幻色之可見且眼屬內根亦不出於外也三界惟是一心故特言心無處所故清淨自無能所之可止亦無有起處之可覓也萬法皆歸於識故又言識無處所因根塵而有根塵若泯識體空寂故亦清淨自無妄念之可動亦無有緣慮而生分別也然色之與眼及心識等性悉皆空寂其性本無有覺若得此性本無覺則可為一覺矣善男子覺知無覺諸識則入何以故金剛智地解脫道斷斷已入無住地無有出入心處無在決定性地其地清淨如淨琉璃性常平等如彼大地覺妙觀察如慧日光利成得本如大法雨入是智者是入佛智地入智地者諸識不生此結成覺智利生之能事也夫覺知此無覺而諸識則自入唵摩羅蓋菩薩至等覺證金剛心入佛智地及妙覺位中解脫道時諸識一時俱斷故斷已生死涅槃二皆不住故名無住地又金剛智地解脫道斷者是頓超佛地也入無住地者是退位利生也菩薩入此無住地無有出入之相心處如空而無所在得決定性地其性地中清淨無垢如淨琉璃內外皎潔而具諸法門此即法門無量誓願學也又性常平等如彼大地萬有竝育而利一切生此即衆生無邊誓願度也又以本覺妙明觀察一切如慧日光無不照見而永斷煩惱此即煩惱無盡誓願斷也又始覺利成得本覺性如大法雨無不充足而佛道垂成此即佛道無上誓願成也然入是四弘智願者是為入佛智地然圓頓法中信住行向地總融成一法為諸佛之智地入佛智地者則諸識決定不生矣經中雖不標願字而本具四弘誓願此乃自性具足故名為智此上發明一覺轉識之義已周無住菩薩言如來所說一覺聖力四弘智地即一切衆生本根覺利何以故一切衆生即此身中本來滿足此發明本根覺利乃是回顧在會同聞者說非向佛而言故曰如來所說一覺聖智之力四弘智願之地蓋以修自性法門而利自性之衆生斷自性煩惱而成自性之佛道此即是一切衆生本覺根源始覺之利雖然而又不從外得乃一切衆生即此自身之中本來皆自滿足者也此無住菩薩已明佛為發起之意佛言如是何以故一切衆生本來無漏諸善利本今有欲刺為未降伏此印成揀過言一切衆生本來具足無漏諸善菩提分法故能出生始覺之利而得一覺自心之本此印成無住菩薩之言也後則揀衆生過患且云今為五欲所刺自不能拔若不與其翦除損害實大然三界欲重其性習剛強誠為未易降伏也前此通明一覺聖力乃以始覺返照本覺是以佛境界發明衆生境界後此化衆生境界而入諸佛境界乃以佛眼順觀衆生心行不齊皆利生之差別智也無住菩薩言若有衆生未得本利猶有採集云何降伏難伏此代衆生以咨降伏之方言若衆生未得本覺之利則彼心意猶有採集云何令其降伏此難調伏之心意耶採集二字即楞伽所言心名採集業意名廣採集心指第八藏識能集諸種子招善惡業故名採集業意指七識恆審思量堅守藏識為我者藏識如庫藏意如庫吏堅守毫無滲漏有入無出有益無損且又得第六意識為所依根舉緣一切故名廣採集也後地藏菩薩言即非集也乃收此中之義佛言若集若獨行分別及以染回神住空窟降伏難調伏流通本有遠離諸欲刺一句解脫魔所縛超然露地坐識陰般涅槃此言採集對治之效夫第八藏識中有相見二分相分生滅不停者是即名採集見分離緣獨行者是即名獨行此相見二分皆八識所變然相分即聚集見分能緣之用而成見分乃離相分所緣之用而獨立相是境分見是心分又相分所緣用即明暗塞空六塵等相故曰山河大地乃心相分然相見總是心體之用攝用歸體惟是一心分別即第六分別事識染即第七染汙識此總言衆生心意意識之相若一念回神栖於空寂則便降伏其難調伏之心矣但住於空窟又不免為解脫魔所縛未能超然於露地而坐俾識陰入般涅槃也按經論云從此初知名三昧頂亦名爾𦦨智若守初知為解名頂結亦名墮頂結二乘見之名爾𦦨識一念瞥起如陽𦦨不可趁逐不用滅不用止知一切法性是爾亦名微細煩惱又此煩惱一名惑障爾𦦨是梵語此云智障即所知障蓋此二障由人法二執而起若於真如界內絶生佛之假名則無人執平等性中無自他之異相則無法執以故如來覺了本性二執皆空衆生妄以二執為惑乃謂之惑障若了人法二空其惑既除乃為之智又執此二空之智為實有智亦成障必須二空之智亦泯是無智障也故前所云煩惱障大涅槃所知障大菩提者即同斯義若唯識中謂所知障者障智不生若智已生障是智者所知之境障却不能障其知也所以古者云所知不是障被障障所知此說乃不如空智亦泯之義深矣無住菩薩言心得涅槃獨一無伴常住涅槃應當解脫此問解脫縛之疑言若心既得於涅槃則獨存一淨性諸識都盡無侶伴可得如是便可常住涅槃應當解脫超然出於三界矣何以又言為其所縛耶因獨一無伴後地藏菩薩問法應自成收此中之義佛言常住涅槃是涅槃縛此示其縛義何以故涅槃本覺利覺利本涅槃涅槃覺分即本覺分覺性不異涅槃無異覺本無生涅槃無生覺本無滅涅槃無滅涅槃本故無得涅槃涅槃無得云何有住此明涅槃本智義蓋涅槃具法身解脫般若三德為本覺所生之利即始覺之本智故又云涅槃智也如是則本覺之利即是衆生根本涅槃智此以衆生本具之佛性為本覺增進修習至最後證得為之涅槃也故涅槃始覺分即衆生本覺分本覺與涅槃性體是一本覺之性不異涅槃之性亦無異由此推之本覺涅槃之性同是無生同是無滅既同無生無滅則涅槃原是其本故亦無得於涅槃既無得於涅槃云何而有所住乎又涅槃相有四一本來自性清淨涅槃即真如理二有餘涅槃二乘煩惱雖斷餘習未除三無餘涅槃煩惱既盡餘習亦滅四無住涅槃不住生死不住涅槃為利生故今言無得則此四相亦俱不可得矣善男子覺者不住涅槃何以故覺本無生離衆生垢覺本無寂離涅槃動住如是地心無所住無有出入入唵摩羅識此示覺無住相言若得一覺者決不住於涅槃何故以覺此本智之無生止離其衆生之垢患而已又覺此本智之無寂已離涅槃定相之體而能發智用之動故覺者住如是地心非有生滅故無所住亦非有動寂故無出入如是則諸識自入於無垢淨性中矣無住菩薩言唵摩羅識是有入處處有所得是得法耶北藏作也此明本得義初揀問有得之疑意者有入即有處所可得是豈謂之得法哉佛言不也何以故譬如迷子手執金錢而不知有遊行十方經五十年貧窮困苦專事求索而以養身而不充足其父見子有如是事而謂子言汝執金錢何不取用隨意所須皆得充足其子醒已而得金錢心大歡喜而謂得錢其父謂言迷子汝勿欣懌所得金錢是汝本物汝非有得云何可喜善男子唵摩羅者亦復如是本無出相今即非入昔迷故非無今覺故非入此設喻發明以顯得義正為後世衆生曲垂方便迷子喻五陰衆生金錢喻唵摩羅識迷子得錢作有得想不知乃是自己本有之物而非外有所得也五陰衆生本具無垢淨性今一覺轉諸識而入於淨性然昔在迷時本無出相而今乃覺亦非有所入也入字當作返源看無住菩薩言彼父知其子迷云何經五十年十方遊歷貧窮困苦方始告言此揀問喻中之意蓋佛之所說法喻皆齊無住菩薩知佛必有所表故乃問之佛言經五十年者一念心動十方遊歷遠行遍計此示其所表明非虗引也教中立喻有四借喻非喻似喻假喻此借也一念心動十方遊歷表一心具十法界一念心清淨即入諸佛法界一念圓修利生諸行即入菩薩法界一念執偏空理即入緣覺法界一念修四果法即入聲聞法界一念修上品十善即入天法界一念作諸善緣不生惡念即住人法界一念心嗔即墮修羅法界一念心起慳貪不捨即墮餓鬼法界一念心癡欲貪不息妄想橫生即墮畜生法界一念心迷造於惡業即墮地獄法界又一法界中即具十種法界夫心真如相名為一真法界以一切法空為界故而十法界性體同一空寂故總曰法界以故地獄法界中亦具十種法界台教因此謂一心中具百界千如之法一心之理本如是故言遠行謂衆生備歷惡趣遍計者言緣念計度而廣執名相也無住菩薩言云何一念心動此特推其過患之由佛言一念心動五陰俱生五陰生中具五十惡此明妄念之惡言衆生只因一念妄心動五種妄想遂有五陰如色陰以堅固妄想為本若衆生修禪定中一念取著即受十種群邪受陰以虗明妄想為本若一念取證即為十種魔所攝持必當從其淪墜想陰以融通妄想為本若一念動搖妄情即有十種魔業淫淫相傳魅其心腑後墮地獄行陰以幽隱妄想為本若一念迷昧而為心魔作孽即墮十種外道種類識陰有顛倒微細妄想以一念所得即為涅槃成十種知見邪魔自作沉孽其略說如是若廣明如首楞嚴中說五陰假名即見惑五陰實法即思惑破五陰假名即人空破五陰實法即法空又涅槃淨法即無明惑破涅槃淨法即無明惑斷是名出三界外得常樂我淨矣無住菩薩言遠行遍計遊歷十方一念心生具五十惡云何令彼衆生無生一念此請示滅惡之法謂誠如佛言衆生之心念真乃生滅紛紜但不審云何令彼無生一念耶佛言令彼衆生安坐心神住金剛地靜念無起心常安泰即無生一念此垂示趨進之方安者不妄動坐者即是止息非坐臥之坐心神即心王也住金剛地住堅固不動之地佛垂示衆生下手用功要訣只此二語更不煩修止作觀亦非必取閒居靜處如若行若住若坐若臥但令心王不妄動諸念皆息又若起一靜念心即動亂須教靜念無起心常安泰即是無生一念矣初祖曰心如牆壁方可入道三祖曰不用求真惟須息見六祖曰若起真正般若觀照一剎那間妄念俱滅識自本性一悟即至佛地皆與此經同一樞紐也無住菩薩言不可思議覺念不生其心安泰即本覺利利無有動常在不無無有不無不無不覺覺知無覺本利本覺覺者清淨無染不變不易決定性故不可思議此深解佛語故先歎美而後言也言已又復歎之其得佛之深意可見矣佛之言曰無生一念直示實智之體也菩薩翻其語曰覺念不生蓋無生一念即覺念也覺念亦不生菩薩之領解也其心安泰已得諸佛安心法門此即本覺所出之利也既得本覺之利必無有一念心動之咎常在動用中無處不是無生一念至於一切時亦無有不是無生一念然則不達無生一念亦不能覺然今覺知此無生覺念實從本覺所出之利以明本覺也得此覺者其心清淨無染絶於垢穢不變不易離於生滅是決定性法爾如是此所謂不可思議也然常在不無無有不無語意甚密宗門下出語徑捷如曰繁興永處那伽定心如境如事事無礙豈非同此意耶佛言如是此總結印成前義然前品因心王菩薩自問疑其有惑故重言之曰如是如是令其永斷疑惑也今此發起無住菩薩利生之行故不必重言之但曰如是而已無住菩薩聞是語已得未曾有而說偈言此敘述得聞希有說偈發明尊者大覺尊說生無念法無念無生心心常生不滅一覺本覺利利諸本覺者如彼得金錢所得即非得此深領利生法要言佛為說衆生無念之法由無念而體會無生之心令心常住無生而不生滅得一覺以獲本覺之利而又明利於本覺故示迷子金錢之喻明吾人之本有若言有所得即非得矣爾時大衆聞說是語皆得本覺利般若波羅蜜此統結衆聞獲益般若波羅蜜者即本覺所出之利佛之發起八地菩薩正為其令衆生得此般若也論云二乘見道唯斷分別我執證初果從是次第斷三界八十一品思惑得寂滅定證四果若菩薩見道斷分別我法二執得入初地從是次第斷俱生我法二執至八地得滅盡定此滅定三乘共修共證以耽寂滅樂不捨者為小乘不起寂滅而現諸威儀者為菩薩又入滅定而不忘相者為二乘行相雖入滅定而念念無相者為菩薩行相然七地與八地俱名住地菩薩皆得不退轉故又七地雖得無相無生之法而功用未忘藏識未淨不得任運現身現土故又名為心量地此八地由轉捨藏識心量都盡證無生忍入不動地又名無所有地以住於無功用故如來雖說諸地次第而楞伽會中佛又嘗言我為欲顯菩薩修證與二乘逈別如菩薩能斷心意意識生滅流注相能斷我我所生滅自共相能斷法我生滅自共相能斷二無我得四無礙智證決定力三昧有如是最勝行故分諸地次第行相從地入地次第相續入菩提法弗使墮於外道邪徑中此皆是無漸次中強設漸次耳又楞伽言十地即為初地同證真如故初地即是八地煩惱皆不動故九地可為七地同得無生忍故七地可為八地同得無相法故二地可為三地同信忍故四地可為五地同順忍故三地可為六地同得般若故如是則諸地行相互相通攝可以頓超可以漸進原無定執如經論云信住行向地而融成一法又言十地法初末總為一際法門以是觀之則知如來圓融行布之理及禪宗參悟一門頓同佛體皆可無疑矣吾聞先輩有云八地名無所有直是無位真人所住境界何有次第漸進可得此真乃不涉程途不立階級之向上一路也不見青原禪師曰聖諦亦不為何階級之有此說亦可特為存之然今去聖時遙凡沙門釋子多有一念得悟尋便廢失鮮有斷惑證果者況登地位也耶音釋唵庵上聲梵語也經中稱唵摩羅唵摩羅阿摩羅乃譯人語音少異耳又唵字是一切真言之母含無量法門即是無相法界也緘音兼封固也沮疽上聲抑也測音惻測度琉音流琉璃俗作琉滲森去聲滲漏趁嗔去聲踐也畜音觸衆獸皆曰畜淪音倫沒也墜垂去聲隕落也魅音妹迷昧也又鬼名有魑魅魍魎兩種魑魅四足好迷惑人山林異氣所生乃精怪之物魍魎為川澤之神紐音紐鼻紐咎求去聲過愆也渠音劬渠渠力言不已也
