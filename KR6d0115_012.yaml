body:
  text: 天台山華頂嗣祖沙門𧧌震述總持品第八之下地藏菩薩言尊者如是之法則無因緣若無緣法因則不起云何不動法得入如來此問入如來義結明如來藏品末之偈有常自在如如入於如來藏之義謂如來藏品所說如是之法則無有因緣生滅之可得也何故若無緣法因則不起緣起不生則如如正體之中而湛然不動矣但云何以如如不動之法而得入於如來正智之道也爾時如來欲宣此義而說偈言一切諸法相性空無不動是法於是時不於是時起此言真性緣起夫目前一切諸法雖有其相而性本空無其體如如不動蓋即相而觀法法森立即性而觀念念空寂雖則空寂且能隨機而動以故目前如是之法雖於正是時而顯現然剎那無住實非三際可攝故亦不決定於正是時而起也所言是法者即是真性緣起之法即宗門目前一著子是時者正當是時即當前一念正興之時也昔有僧問智威禪師云真性緣起其義云何威良久時安國玄挺侍立次遽召云大德正興一念問時是真性中緣起其僧言下有省後徑山杲禪師徵云一念未興時不可無緣起也設有人道一念未興喚甚麼作緣起我只要汝恁麼道此二則語安國發明是法於是時徑山發明不於是時起而臨濟大師又曰一念緣起無生超出三乘權學是皆深得此中妙旨非智識之可測也法無有異時不於異時起法無動不動性空故寂滅此言法性體相夫法無有異時不於異時起者謂此目前一法覿體顯現無有別異於當前一念時故亦不於當前一念別異之時而起也又法無動不動性空故寂滅者謂此目前一法雖則覿體顯現而當念空寂無動不動相又且性體本空故隨處寂滅也此一段義若不明心見性悟覿面全提一著恰似大蟲看水磨一般故閲是說者不可只恁麼念過便了性空寂滅時是法是時現離相故寂住寂住故不緣此言性體全彰夫性空寂滅時者即前後際斷一念不生時也此是法是時現一句正顯不立文字拈華直指之大宗謂此目前一法即於是當前一念時覿面顯現蓋我佛如來初從正覺山前睹明星處得來後在涅槃會上拈華時露出不意又向此中道破吾固曰初祖以楞伽印心不若此一句切當從上諸祖千說萬說以至擎扠輥毬拈推豎拂行棒行喝種種機用不出此一句然此一句實從妙覺中流出是大總持門總持二字梵語即陀羅尼謂能總攝諸法含無盡教理行果也然總持無文字但妙契於佛心能於差別中解無差別義於無差別中解差別義衆生悟此便得諸佛祕密心印而頓同佛體善達一切衆生語言陀羅尼能轉根本法輪是大不可思議諸佛境界一切佛法無不具攝故又謂之真言又名祕密藏非器不傳曰祕深隱難知曰密又祕密即是顯義未悟是密悟之即非密也故法華謂唯佛與佛乃能究盡諸法實相此經亦云惟佛與大菩薩乃能知之故在諸佛菩薩是顯而衆生分中則為密矣若欲得顯密融通且參取者一句好但當初釋迦老子真是婆心太切又曰離相故寂住寂住故不緣蓋謂此目前覿露之機本離生滅緣起及文字等相故唯依於空寂而住既依空寂而住故於一切法皆不相為緣於此薦得方知龐家箇漢問不與萬法為侶者是甚麼人馬大師曰待汝一口吸盡西江水即向汝道當人欲識經中的旨且看馬大師者一句意旨云何是諸緣起法是法緣不生因緣生滅無生滅性空寂此言體性獨存謂凡是世間諸有為相皆是從緣而起之法今我所說如是全體獨露之法乃緣之所不能生然一切有為皆以因緣自相生滅若不從緣生則因緣生滅之相亦無其相既無則知此生滅之性本自空寂而法性獨存矣緣性能所緣是緣本緣起故法起非緣緣無起亦爾此言法性迥出謂一切緣起之性即能緣所緣之性如是能所二緣皆本從緣而起故知法性之起實非有藉於緣其緣既無而起亦不可得矣凡夫以惑業為緣聖人以機感為緣緣起有四義一緣生故有二緣生故空三無性故有四無性故空此四義中以後二義為實蓋無性緣生故空則非斷見無見之空是名真空緣生無性故有則非常見有見之有是為幻有又緣起無性故不生無性緣起故不滅又推無起性故不生能顯無生性故不滅此所謂真性緣起無生之義也因緣所生法是法是因緣因緣生滅相彼則無生滅此言性無生滅謂世間一切皆是因緣所生之法是法既從之而生自是屬於因緣既屬因緣便有生滅之相若彼法性之體非屬因緣則亦無有生滅矣彼如真實相本不於出沒諸法於是時自生於出沒此言體無出沒言彼法性無有生滅其體自如即是真如實相而本不有於出沒也第諸法於是一切時一切處而自生於種種出沒之想亦何有於我也是故極淨本本不因衆力即於後得處得得於本得此言本始不二是故二字總結如上法義以攝一經之旨極淨本三字當一字作一句讀極者至極淨者明淨本者本覺乃滿口形容言說難盡之意言以是之故此至極此明淨此即所謂本覺然以覺妙觀察性體獨露本不因衆法緣起之力而成即於等覺最後所得金剛心地之處得其所得於自性本覺之得也爾時地藏菩薩聞佛所說心地快然時諸衆等無有疑者知衆心已而說偈言此敘述無疑說偈結成我知衆心疑所以殷固問如來大慈善分別無有餘此明請轉法輪言我知衆心之有疑所以殷勤固請而申問今佛以大慈度世善為分別如上法義而無有遺餘矣是諸二衆等皆悉得明了我今於了處普化諸衆生此明法利流化然前真性空品分大小二衆謂大乘小乘也今此皆得明了而同入於大乘矣又自言我今於了處以利生此即所謂自覺己圓能覺他者同如來應世之意也如佛之大悲不捨於本願故於一子地而住於煩惱此明利生弘願謂佛本不捨於悲願吾亦當如之然菩薩視諸衆生猶如一子今衆生住於煩惱我亦當住於煩惱而化度之已上滿覺分竟後屬弘化分即流通分也爾時如來而告衆言是菩薩者不可思議恆以大慈拔衆生苦若有衆生持是經法持是菩薩名即不墮於惡趣一切障難皆悉除滅此贊慈德利生及經功滅障謂名法同有不思議熏而能離惡滅障也若有衆生持此經者無餘雜念專念是經如法修習爾時菩薩常作化身而為說法擁護是人終不暫捨令是人等速得阿耨多羅三藐三菩提此顯菩薩現身衛法之願如此然持者必當專念修習必須如法果能如是則諸佛實相念念現前於佛菩提何遠之有汝等菩薩若化衆生皆令修習如是大乘決定了義此特垂遵行轉化之誡爾時阿難從座而起前白佛言如來所說大乘福聚決定斷結無生覺利不可思議如是之法名為何經此贊法請名也梵語阿難此云慶喜乃佛之從弟也以佛成道日而生故名年始八歲從佛出家至年三十為佛侍者涅槃經云如來成道已過三十年在王舍城中告諸比丘言誰能受持如來十二部經供養左右所須之事亦不失自利時憍陳如舍利弗皆求侍左右佛言汝已朽邁當須使人云何方欲為我給使乃至五百阿羅漢亦皆求侍佛皆不受時大目揵連即入定中觀如來之心在阿難處如日之初出而光照於西壁也便從定起以佛意語憍陳如即與五百羅漢同請阿難謂佛意欲令汝作阿難云若有是事當預索三願如世尊故衣願弗賜與受檀越別請聽我不從出入無時隨我裁量世尊與我三願當順僧命佛許之阿難又云佛當為我說從前所說之法佛許重為說之遂為侍者二十餘年具足八法能持十二部經言八法者信根堅固其心質直身無病苦常勤精進具足念心心無憍慢成就定意具足從聞生智故佛常稱為多聞藏是總持第一佛又言過去諸佛侍者皆具如是八法又云阿難聞我所說如瀉瓶水置之一器所有祕義悉能了知然佛凡在一會中說法已竟阿難必請命名蓋護持法藏之職固合如是今此白言如來所說大乘之法功德福聚決定斷結了證無生本覺之利實乃不可思議當稱何等名耶受持是經得幾所福願佛慈悲為我宣說此問持經獲福佛言善男子是經名者不可思議過去諸佛之所護念能入如來一切智海若有衆生持是經者則於一切經中無所希求是經典法總持衆法攝諸經要是諸經法法之繫宗此稱述經功夫華嚴一名大不思議經此經亦稱為不可思議也又佛所說經法如般若為釋梵守護法華為菩薩守護然此經不可思議是佛境界故為諸佛護念護念者何能令衆生入如來之智海也又云持是經者已得此一味醍醐之法則於一切經中而無所希求矣又言是經典法雖是一味總持五味之法雖是一經能攝三百餘會諸經之綱要也夫脉絡相屬謂之繫流派所出而為宗然凡是諸經之法須知皆是此法之繫屬而於此法中流出者也如般若廣行六度祇得此中無相法品中事且經云一切諸佛及諸佛阿耨多羅三藐三菩提皆從此經出而況是經之法頓超十地直至等妙二覺者也是經名者名攝大乘經又名金剛三昧又名無量義宗此約名有三夫攝大乘者從法上立名即般若義而以真如實際為其體也金剛三昧者從用上立名取法喻並彰能摧堅破惑即解脫義而以明心見性為其用也無量義宗者從體上立名能攝一切法而為衆義所宗即法身義然法身能具攝一切義能出生一切法若衆生證如來法身即明始本二覺之不二故此經以始本二覺為宗今立此三名以明圓備三德祕藏而為涅槃之前導也若有人受持是經典者即名受持百千諸佛如是功德譬如虗空無有邊際不可思議此明功德無際言持此經者即持百千諸佛而百千諸佛皆不出此法也然功德以虗空為喻更無有過於此矣我所囑纍唯是經典此特申囑纍以事託付曰囑事相緣坐曰纍夫佛囑纍之意謂我之所說一切法藏唯此經為最耳蓋如來說一切經法皆為欲顯此金剛三昧之法也阿難言云何心行云何人者受持是經此揀問根性先揀其心行而後揀人也佛言善男子受持是經者是人心無得失常修梵行若於戲論常樂靜心入於聚落心常在定若處居家不著三有此明其操行夫心無得失則離於取捨常修梵行則住於不退此可驗其心行之真實矣若於戲論常樂靜心則遇事而不為事之所轉入於聚落心常在定則遇境而不為境之所惑若處居家不著三有則居塵而不染塵此可以定其人之品節矣此是華嚴六地七地菩薩踐履處是人現世有五種福一者衆所尊敬二者身不橫夭三者辨答邪論四者樂度衆生五者能入聖道如是人者受持是經此明現獲五福蓋以法自持必致尊敬以道自衛必不橫夭二者為自受用三昧正智明了而能辨其邪論悲願無盡而樂度衆生二者為他受用三昧前四是菩薩因中之行後能入聖道是菩薩之果德如是人者現在自他俱利且能入於聖道必得受持是經而轉化於衆生也此是我輩學道人真福不可不知阿難言如彼人者度諸衆生得受供養不此明堪受供否為斷世疑故有斯問佛言如是人者能為衆生作大福田常行大智權實俱演是四依僧此明大乘四依所謂依法不依人依義不依語依智不依識依了義不依不了義得如是四依則能常行於大智矣夫智有權實之分實智即諸佛本得智一切語言道斷權智即後得智能以方便設化然實非權而不顯權非實而不立必須權實俱演方為大乘四依華嚴離世間品云菩薩住於涅槃而示現生死究竟寂滅而現起煩惱常入深禪定而示受欲樂常遠離三界而不捨衆生是為不由他教權實雙行不共法又云雖知一切法無有造作而亦不捨諸法自相雖知不由他悟入於法而種種方便求一切智雖恆觀察無人無我而教化衆生無有疲厭雖已成就一切智智而修菩薩行無有休息雖知諸法不可言說而轉淨法輪令衆心喜雖現入於大般涅槃而一切處示現受生能作如是權實雙行法是佛業今此權實俱演亦即此義然離世間品原是發明妙覺果後利生常行之道即同於大乘四依行相而非小乘四依一謂乞食二謂冢間樹下宿三謂糞掃衣四謂服腐敗藥者比也於諸供養乃至頭目髓腦亦皆得受何況衣食而不得受此明內外二施俱堪受故凡捨身分所有為內施衣食供具為外施如華嚴回向品中言最勝智菩薩等以頭目布施饒益菩薩等以髓肉布施又法華云一切衆生喜見菩薩捨於兩臂藥王菩薩捨身等是也蓋內施尚且得受況外施乎智者於受食之時當作厭離想猶如曠野鬼食子之肉心生厭惡都不甘樂如是深加觀察知世間受摶食之過摶食即欲界分段之食以資色身者也次觀觸食如披剝牛羊如諸蟲唼食然有身斯有觸若貪於觸樂終獲苦觸故知觸之為患實大又觀思食如大火聚此思是第七意業從根本無明不覺而起故喻如火聚然一有想因即有此思食矣再觀識食猶如三百攢柔森列而不可近以有生故則有此識食然此三種俱名為食能資益衆生諸根四大及種子故是為三界食智者作如是觀而於一切不生貪想故受食時無論好惡如塗治癰瘡之藥而已又須知比丘當以法喜為食如妙吉祥菩薩即文殊別名為舍利弗等設希有食乃曰我今所設食者不可分段不可吞咽非香味觸三塵為體非三界所攝亦非不繫如是妙食是如來食非飯食也善現與舍利弗聞已法喜飽滿俱入滅定不復食三界之食此是般若涅槃二經中所說之義又經云一切諸法由食而住在眼以眠為食在耳以聲為食在鼻以香為食在舌以味為食在身以細滑為食在意以法為食在大般涅槃以無放逸為食也善男子如是人者是汝知識是汝橋梁何況凡夫而不供養此明為二乘良導然阿難在般若會上祇得初果首楞嚴會中雖證法身悟成佛法門猶未盡漏至法華受記作佛雖能憶念過去諸佛法藏通達無礙而習漏未盡及佛滅度後結集法眼始得阿羅漢果今此故云如是人者是汝知識以堪導入聖道故是汝橋梁以堪超越三有海故實能與汝二乘為師為導豈況博地凡夫而不敬事者哉阿難言於彼人所受持是經供養是人得幾所福此又問傳持福利佛言若復有人持以滿城金銀而以布施不如於是人所受持是經一四句偈不可思議此言功德難量夫以財寶為施祇得人天有漏之福耳此句先釋明不必問其得幾所福矣下獨顯持者之功若能持此中一偈便得頓悟本覺而獲法王出世之智寶是豈世寶之可為喻此功此德真實難量非心可思非口可議者也善男子令諸衆生持是經者心常在定不失本心此明悟心不失言一人成道則多人獲益若令諸衆生持於此經必得契悟此心常在定中決不失其本心者矣華嚴稱發菩提心功德連舉十餘喻重重較之不及少分蓋發心者發明本覺之心體也然於初發明得一念相應見道即已斷於見惑更當修道求斷思惑始得不失本心而常安住於道矣所以初祖達磨大師從南天竺國來至此土傳上乘一心之法欲令人明心見性又得馬大師大弘其道曰一切法皆是心法萬法皆從心生心為萬法之根本凡所見色即是見心心不自心因色故有若是上根衆生遇善知識指示言下領會更不歷於階級地位即頓悟本性此等提唱豈不是六地菩薩說法化導耶又云行住坐臥悉是不思議用不取善不捨惡淨穢兩邊俱不依著前念後念中念念念不相待念念寂滅喚作海印三昧此又豈非七地菩薩成就不可思議身語意業無相行耶又如百丈云心如虗空亦莫作虗空想黃檗云內外身心一切俱捨猶如虗空無所取著然後隨方應物能所俱忘臨濟云你才擬心早是錯了也德山云瞥起一念心便是魔家眷屬此等所說又豈不是七地中得無生法忍境界歷觀從上諸祖莫不皆得此等契證方可稱佛祖兒孫利生接物但今法運下衰不能挽其頽風以致見道者多修道者少說理者多通理者少楞嚴所謂邪師說法如恆河沙正在此時豈不悲哉若失本心即當懺悔懺悔之法是為清涼此明失心悔過即得於清凉也然此失心者無他祇為學者但求一悟便為了手羆參即乃隨順世緣久久舊習復起不特求斷思惑并前見惑仍復又生故破壞法身夭傷慧命依舊與前凡夫日用一般此即失心之謂也昔有僧問溈山頓悟之人更有修否山曰若真悟得本他自知時修與不修是兩頭語如初心頓悟猶有無始習氣未除須教淨除現業流識即是修也不可別有法令其修行趣向溈山此說一如佛之言曰理則頓悟乘悟併銷事非頓除因次第盡其義一也夫佛祖令人見道復修道其言切誡如此後人不肯聽從亦無可奈何以故佛又開此方便門乃曰若失本心即當懺悔梵語懺摩此云悔過今華梵兼舉故曰懺悔蓋言若此心之既得者倘觸境緣熱惱或乃失之亟應悔過永斷勿生則心智仍現亦何失之有是中即轉熱惱而為清涼矣阿難言懺悔先罪不入於過去也此明罪性無住即淨名所言說悔先罪而不說入於過去什法師注云今因先所作罪故今悔其先罪既言有先罪則似罪有常性而入於過去矣故為說不入過去而去其常想也肇法師又云往罪雖繫人而不言罪有常性從未來至現在從現在入過去如是則三世性空矣故三祖僧璨大師初謁二祖設禮而問曰弟子身纏風恙請和尚懺罪二祖曰將罪來與汝懺璨良久曰覓罪了不可得二祖曰與汝懺罪竟宜依佛法僧住曰今見和尚已知是僧未審何名佛法二祖曰是心是佛是心是法法佛無二僧寶亦然璨於言下大悟曰今日始知罪性不在內不在外不在中間如其心然佛法無二也此悟罪性當體空寂如毗婆尸佛偈云幻人心識本來無罪福皆空無所住矣然未悟者又不可撥無因果謂無罪之可懺蓋人繫於業緣有性罪遮罪遮罪依教作法懺之性罪即當起行方滅起行有二種一從事行上懺即淨身口意對三寶發露更不覆藏斷相續心後不復作二從理行上懺如後所言入真實觀是也今此阿難謂佛雖說懺悔先所作之罪然罪性本不屬於三際故必不入於過去者也佛言如是猶如暗室若遇明燈暗即滅矣善男子無說悔先所有諸罪而以為說入於過去此先印成又重以喻明謂汝之言然夫罪性實無三際之可住如遇其明則暗自滅矣無如毋字說悔於先前所有諸罪而以為其說入於過去也此句即重舉阿難之言申明其義耳阿難言云何名為懺悔此又問前失心悔過之法佛言依此經教入真實觀一入觀時諸罪悉滅離諸惡趣當生淨土速成阿耨多羅三藐三菩提此明入觀之功言一依如前所說修空無相無作而觀於真如實際此即實相無生懺如經云若欲懺悔者端坐念實相慧日破諸暗衆罪如霜露又云信心清淨即生實相當知是人成就第一希有功德以故不特罪滅離諸惡趣必得當念即生法性清淨之土速成阿耨菩提此如華嚴十住位中梵行品所云初發心時即得阿耨多羅三藐三菩提又如妙覺果後說離世間品明利生之道云衆生得聞此法聞已信解解已修行必得疾成阿耨多羅三藐三菩提以如說修行故皆與此經合而同為一乘圓頓法也佛說是經已爾時阿難及諸菩薩四部之衆皆大歡喜心得決定頂禮佛足歡喜奉行此結法圓成以明在會咸皆秉教傳持也夫歡喜本是初地之名謂初明性智具證二空能益自他生大喜故今此特申二種喜一者心得決定無有餘疑住於不退轉故二者拜命奉行以法轉利而自生願樂故如舍利弗來所還復來具足然後出而阿難在首楞嚴會上亦云我雖未度願度末劫一切衆生此皆發歡喜奉行之悲願也但今我輩欲修行大乘者必當發無上勝心如不退轉法輪經云時有三善男子求菩薩乘者白言世尊我等於此法能信能解不生疑惑猶如如來爾時第一善男子言世尊若作是說我是如來此言便是正說第二善男子言世尊若作是說我是世尊此言便是正說第三善男子言世尊若作是說我是佛此言便是正說所以者何我等於此法不生疑惑故在會聞者心皆擾動作是念言無有二佛並出世間何緣彼作是說阿難問佛佛說偈曰能知過去如亦知未來如見一切法如是故名如來彼已能通達諸法平等相亦不生心念是故名如來道如菩提如及與不住如知如如虗空是故名如來又曰不畏於生死正住生死中化度諸衆生是故名世尊又曰覺無明無知自性無所有已得於明智是故名為佛此即見性成佛直趣無上菩提之義余述此經記一日先於定中見梵僧手持經卷以授余未幾會南柱禪人持此經至閲之如獲故物晨夕展玩不忍釋手後遇南天竺僧四人余因問之曰汝知金剛三昧經否一僧曰此間亦有是經耶其義校首楞嚴更勝同在灌頂部中收在昔傳聞五天竺國世主皆保護祕重不妄示人此真是菩薩出世度人之大法寶也余因研究其義奉為此生他生修行之法程惟願見者聞者同願力行轉相設化如舍利弗所云前來後來者悉令登正覺音釋恰苦洽切音掐適當之辭謂有合於心也邁音賣老也瀉音寫傾潟冢音腫故墓也掃掃本字摶音團捏聚唼色洽切聚食聲丞音戟急速也擾饒上聲諳音菴悉也曉也修習金剛三昧行法一切恭謹一心頂禮十方常住一切三寶是諸衆等各各胡跪嚴持香華如法供養願此香華雲遍滿十方界供養一切佛尊法諸菩薩無量諸聖賢及大阿羅漢一念普周遍同時作佛事普熏諸衆生皆發菩提心具修菩薩道成就諸佛法供養已一切恭謹大慈滿足尊智慧通無礙廣度衆生故說於一諦義如來所說法悉從於無住我從無住處是處禮如來敬禮如來相等空不動智不著無處所敬禮無住身一心頂禮如來藏海清淨法身佛行者作觀當想普賢菩薩禮佛發願偈云我今五輪禮佛足為斷五道離五蓋願令一切諸衆生安住五通具五眼願我右膝著地時令諸衆生得正覺願我左膝著地時令諸衆生離邪見願我右手著地時如佛坐于金剛座右手指地為震動一時疾證大菩提願我左手著地時攝諸外道入正道願我頭頂著地時令諸衆生離憍慢成就如來無見頂一心頂禮具足萬德圓滿報身佛一心頂禮相好光明百億化身佛一心頂禮入金剛三昧示不動智身本師釋迦牟尼佛一心頂禮不可思議無量義宗攝大乘金剛三昧尊經偈云真空法性如虗空出世智寶難思議我身應現法寶前五體翹勤皈命禮一心頂禮入空無相解脫菩薩摩訶薩文殊菩薩作觀偈云能禮所禮性空寂感應道交難思議我此道場如帝珠某號菩薩應現中我身應現菩薩前頭面接足皈命禮一心頂禮證無生行心王菩薩摩訶薩一心頂禮得本覺利無住菩薩摩訶薩一心頂經智入實際大力菩薩摩訶薩一心頂禮總持衆法為衆決疑地藏菩薩摩訶薩一心頂禮入佛智地金剛三昧會中二千等諸大菩薩摩訶薩一心頂禮阿伽陀比丘舍利弗尊者一萬衆等大阿羅漢賢聖僧一心奉為梵行長者八萬人等及護持正法天龍八部六十萬億諸大善神各及眷屬頂禮三寶往昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切罪根皆懺悔罪從心起將心懺心若滅時罪亦亡罪亡心滅兩俱空此則是名真懺悔我與衆生無量劫來以識心妄緣多起愛染由內外使隨使流轉造諸一切不善之業輪回三界無有出期而本有如來藏性皆為生滅慮知相隱理不顯故于如來所說一味真實決定了義之法障蔽不聞況千思萬慮不益道理徒為亂動失本心王今一念悔過向佛發露惟願加被令罪障消滅普為四恩三有法界衆生悉願斷除諸障歸命懺悔我與衆生無始至今一念心動五陰俱生五陰生中具五十惡多行不善溺于欲刺繫于業緣常被纏縛失于自性本覺失于如來出世智寶不發四弘誓願不發無上道心今者幸得如來金剛三昧智力知三界虗幻諸法空寂無我我所能所身見內外結使皆悉寂靜惟是識心妄見而有願從今已去心住中道而不傾倚六塵緣影而無流易于一切法無著無求不取不捨性等金剛不壞自性三寶清淨光明之體四緣如順三戒具足以自在智入于實際得佛智慧法義皆空自利利人過三界地不住二乘入菩薩道亦如諸大菩薩化度衆生而無化度之想我願如是唯願如來慈悲攝受衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成比丘某甲與現前衆等及法界衆生心常清淨性本空寂妄念忽起諸見橫生起三毒根造衆罪業流轉惡道備歷苦趣不自訶責弗求解脫今幸得聞攝大乘金剛三昧尊經實能發我本覺妙心於諸煩惱方便摧破無明實性慧除電覺由是歸向本師釋迦牟尼如來令我一念無生衆緣斷滅排諸障難出離蓋纏五陰六入悉令空寂現識不生淨心清白專念受持金剛三昧出世智寶如法修習得金剛喻定得金剛喻心住金剛心地入空無相如解脫菩薩摩訶薩證無生行如心王菩薩摩訶薩得本覺利如無住菩薩摩訶薩智入實際如大力菩薩摩訶薩總持衆法如地藏菩薩摩訶薩發明性空如舍利弗尊者入如來藏如梵行長者唯願如來金剛三昧及諸大菩薩摩訶薩令我等世世同得修出世因得出世果常依三佛發菩提心不同二乘味著靜樂於有為法如避火坑於六度行無為無相深入陰空心處無住轉諸情識入白淨性引諸情智入薩婆若得法真空常樂我淨超於二我大般涅槃然後住於生死住於煩惱不捨可衆入不調地方便教化來而復來令法界一切衆生捨離妄心修空斷結九識明淨得法真源三化勤修入佛智地又願彼諸衆生亦同此願願未來世一切衆生得心空眼得法空心超然出世無礙解脫常行精進住不退地不生無化如佛無二已度今度俱登正覺懺悔發願已歸命禮三寶南無十方佛南無十方法南無十方僧南無清淨法身佛南無圓滿報身佛南無百億分身諸佛南無本師釋迦牟尼佛南無攝大乘金剛三昧尊經南無解脫菩薩南無心王菩薩南無無住菩薩南無大力菩薩南無地藏菩薩南無十方一切諸大菩薩摩訶薩南無十方一切大阿羅漢賢聖僧自歸依佛當願衆生紹隆佛種發無上意自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆凡持是經者當日夕敬禮其起止稱本師佛號餘準常儀茲不贅閣筆記余初入道嘗聞禪宗頓悟佛心教乘漸明佛語學佛者但悟其心何愁語之弗解耶遂耽玩禪苑薄視講肆逮有以發明欲少探教網奈緣會不諧終未能就洎乎濫廁禪列謬當推舉雖宗說無礙心猶缺如故唱道之暇循翻藏祕而後知百丈黃檗說法直從教海流出又信昔人謂玄沙提唱與修多羅冥契誠然不虗因歎談禪者不諳義學有實功演教者不識禪家有真悟得少為足之徒往往矜宗教兼通或座主妄意談禪或禪者謬為說教甚至執法鬬諍互相非毀欲求彼此和會不其難哉抑自嘆智識暗短百無一長既弗克博論貫通秪宜退潛守拙而已況年將五旬語云五十曰艾艾者言髮之蒼白如艾色也又嘗謂人曰吾年五十當卷衣擲鉢棄絶筆墨此言每每自出於口今不覺忽焉而至豈可不踐其言乎哉遂於戊午秋散衆入山靜掩一室游心禪寂倐逾歲星兩周其猶且暮頃耳一日有吳門北禪寺僧來求給侍袱中有金剛三昧經在焉自憶始初尋訪曾識此經是時志在禪宗弗及披究頃於禪寂中屢獲異徵得非承佛祖之靈欲將啓發於豫者乎時二三子索為說之余默允其請乃曰此真為一大藏教中樞紐是末世衆生修行法程也夫如來說法始於華嚴圓教圓者諸法統攝也止於涅槃終教終者理行已盡也又華嚴明平等佛性涅槃言本有佛性而於中渠渠論金剛三昧茲略舉其說如云佛性即金剛三昧即般若波羅蜜又云若住此三昧雖修六度不見有六度之相雖見衆生不見衆生之相雖見一切煩惱亦無煩惱相乃至見菩提無菩提相見涅槃無涅槃相既爾一切皆無相可見豈不明見當人本有佛性哉由是觀金剛三昧乃兼并包括華嚴般若涅槃之法而無遺矣且金剛三昧以本始二覺為宗以實相無相為體以宗通說通為用實能統一大藏教之義兼攝不立文字別傳之宗初祖雖曰楞伽可以印心是誠不若此經也奈何意句難悉幽祕罔知若非直指疏通云何俾初機獲益余故捨於禪寂隨閲隨說二三子筆受之釐為一十二卷名命通宗記是皆得佛祖加被之力而乃有此然深味厥旨猶渴飲醍醐睡夢咸得恬樂昔所云悟佛心明佛語可一舉而兩得矣雖然倘執此經不求悟自心則為依經解義三世佛冤徒逞狂禪不求解此經則又為離經一字同於魔說得不慎乎是記也始於庚申八月望前三日至辛酉夏五之朔而卒業焉復書此於華頂般若壇中華頂仁叟震禪師書目述金剛三昧經通宗記一十二卷性相互融宗說兼唱為末世修行之法程輯西天佛祖洎東土達磨祖師串珠而下訖於天童悟和尚凡六十七代宗祖之傳各系以表曰禪宗正傳燈史二十五卷輯四祖下法融及六祖下二支五宗大尊宿止於第十五世佛鑑佛眼一輩凡一百六十四家曰名宿分化燈史四十卷輯臨濟宗第十二世至三十世自東山演及昭覺勤下旁出法系除徑山杲餘皆指月録所未載者凡一十九世計四百八十四家曰濟宗補續燈史一十六卷輯三峰鄧山祖父兩世及法門諸父輩共為一編曰三峰燈史八卷輯天童下兩世尊宿及洞宗先輩并嗣法世數未詳者合成一編曰濟洞燈史續略六卷編集古今尊宿唱明宗旨之語及天童三峰授受事實并法中先輩交誼如序跋簡牘詩銘筆記法語機緣之類曰法苑獻徵録五卷較定周昭王甲寅至明崇禎甲申傳燈中考年紀事曰燈史紀年三卷
