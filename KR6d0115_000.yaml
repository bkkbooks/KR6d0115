front:
  text: 金剛三昧經序天台山華頂嗣祖沙門寂震述金剛三昧經者一乘圓頓之教諸佛真實之宗妙絶羣經該羅萬法廢權顯實大收法華殿後之功寄滅談常先展涅槃鋒前之陳特暢五時玄旨博施上味醍醐諸地頓超祇在事先一覺羣生共得奚分中下二根凡聖位齊智愚道一誠菩薩利生祕鑰乃衆生成佛要樞以法印心無以尚矣真修密行其在斯乎始自靈山示默全機獨露無言苾芻代宣唱偈力為勸問由茲發起依智咸興解脫啓無相法門悟般若逈超乎三界心王證無生法忍泯言説默契於一心無住獲本覺之利轉諸識而性海無波大力入實際之𭏟具智辨而心源流淨得真性體空鶖子以滿地而獨任入如來藏海梵行以等覺而自居總持為諸品義宗妙觀圓成正覺品末示弘通法眼囑纍唯有斯經信乎得之者他外永絶希求悟之者本末咸歸一致觀其原始要終條分縷析如華貫為鬘燦爛可觀珠走於盤光𦦨難矚自得諸佛護念不入餘衆生手是故久扄祕藏弗妄宣傳知之者希聞亦難信矧夫文奇義密語簡理備僅萬有一千五百言而統乎一大藏教之義海又且能攝不立文字別傳之宗斯誠為像法中出世之良導者也震幸遇聖言深心研究雖罔窺幽祕而矢願流通定此生他生之法程為利己利人之妙行願見者聞者頓悟心空今世後世永沾法乳云爾辨字音義凡實體疑似及轉音者先為注明以便檢閲祇音支但也祇如祇有皆用此今為秖非又音岐神祇也凡祇夜祇陀本此扺音止側也擊也扺對之扺當用此蓋以手擊節而對今作秖祇皆誤別便入聲為別異別離之別又音鱉為分別辨別之別稱凡稱譽稱歎則平聲凡名稱相稱則去聲行如行止運行音衡德行言行音幸行列行布音杭行其事以利人音恨解几結解解説則上聲又去聲音械曉也如曉了自脫曰解脫曉悟其義曰解義治池稚二音凡未治而治之則平聲已治之治則去聲切音竊是切當真切之切又去聲音砌衆也又大凡也離凡別離支離皆平聲又去聲音利漸相違也離欲離垢皆從此旋如周旋折旋旋轉皆平聲又去聲乃逐旋之旋度濟度之度則去聲又入聲音鐸計度之度那懦平聲禪那檀那從此又上聲奴可切為那裏那事之那又上聲奴臥切語餘之聲也養下奉上曰養則去聲生養畜養自養皆上聲去來去則去聲除去則上聲語上聲言語也又以言告人曰語即去聲金剛三昧經通宗記序堪忍學人魏學渠撰豫閲首楞嚴經觀世音菩薩言我昔供養觀音如來彼佛授我如幻金剛三昧得悟耳根圓通又云此方真教體清淨在音聞言乎東土學道者定從聞入也自教典西來三藏十二部炳然如日星常垂江河行地舍此何以為登聖之階破暗之燭哉初祖直指人心見性成佛超越漸次捷成圓頓宗風弘暢大乘有人二家並立宗盛教衰而一知半解未見實相宗亦凌遲矣參禪者求之於機緣習教者求之於佛語機緣固能悟入佛語豈便欺人要使宗教融通自然圓頓立至紫柏老人有云習教以佛語為本明宗以機緣為本弘闡宗教以道德為本以戒行輔之以學問大之不爾踞法王之座披如來之衣而傳我佛之言者所謂狐嘷耳豫佩斯言者久而未見其人聞有仁山大師為當今龍象私心嚮往之癸亥仲冬過天平之白雲古寺猝遇之蕭然數椽弊衣糲食淡如也談次出所為金剛三昧通宗記見示讀一二則文儉義豐指約理該正如取大海中水一滴而味具百川矣因以經記相授而乞豫言序其首經意大約總華嚴法華涅槃大旨而微言雋語有類楞嚴從聞思修其在是乎梵經遠集蓋以化導羣生使知佛道然慮其著有也初祖面壁不立文字慮其著無也則天台賢首為疏為鈔不憚條分縷析以為之説今師之作是記也慈悲心切務令宗雷大振教雨滂沱不著有不著無不著有不可得不著無不可得不著有無亦不可得則佛語在是機緣在是何圓頓之難臻哉因序以歸之金剛三昧經通宗記目次卷首序懸談科分欠之卷一序品第一卷二無相法品第二之上卷三無相法品第二之中卷四無相法品第二之下卷五無生行品卷三卷六本覺利品第四卷七入實際品第五之上卷八入實際品第五之下卷九真性空品第六卷十如來藏品第七卷十一總持品第八之上卷十二總持品第八之下卷末修習行法閣筆記金剛三昧經通宗記目次終品義開合圖懸談夫台教釋經演五重玄義謂因名顯體由體明宗依宗辨用後乃發明教相賢首疏華嚴則首啓十門分別此二家立教之旨也今金剛三昧經具攝華嚴中後五地奧義當從十門略為分演初教起因緣二藏教分攝三義理幽深四法被機宜五宗分體用六教迹前後七翻譯時代八疏注感通九解釋經題十疏義通宗初教起因緣者我佛出世説經三百餘會祇為一大事因緣開發一切衆生入佛智地故正如東土聖人垂六經以示後世之意同也六經者易極深研幾著天地陰陽四時五行之理書紀聖王治天下之事詩敦人倫美教化移風易俗禮以經紀倫序樂以發天地之至和春秋懲惡勸善推三代之德而為天下儀表此治世之事也今如來為出世大事觀機逗教自淺至深於四十九年説一代時教皆有緣起如始初成道在寂滅道場中為四十一位法身大士及宿世根熟天龍八部一時圍繞世尊現千丈盧舍那身為説十住十行十回向十地及等妙二覺法名曰華嚴是為大化之始賢首判為一乘圓教台教判為頓教又謂兼別説圓如經中初發心時便成正覺為圓機而説圓教又處處説行布次第為權機而説別教也當時二乘聲聞猶如聾聵不聞不見所以法華經云我始坐道場觀樹經行思惟三七尋念過去諸佛皆以方便説三乘法由是為諸衆生脫珍著弊説四阿含此云無比法初增一阿含明人天因果二中阿含明真寂深義三雜阿含明諸禪定四長阿含明四諦法賢首判為小教台教判為藏教為第二鹿苑時其次彈偏斥小歎大褒圓故説維摩思益楞伽解深密金光明勝鬘等經四十餘部台教謂之第三方等時於中廣談四教即藏通別圓曰方均被衆機曰等賢首判為頓教再次説般若等經賢首判為大乘始教台教判為第四時法華合涅槃為第五時賢首判為大乘終教然法華授記聲聞作佛涅槃明佛性常住義以終大乘之始也今此經實乃和會一大藏教五時五味之法亦可解分八台教分頓漸祕密不定藏通別圓也分五賢首分小始終頓圓也之諍所以非藏非通非別於中即漸而頓即頓而圓即始而終即權而實俾利鈍咸得小大共證者也又此經緣起之義有五一為現在地位菩薩深入一乘知佛法綱領故二為將來學般若菩薩頓超後五地得等妙二覺法故三為令末世衆生得修行徑捷法程位位圓攝故四為欲顯示一味真實無上醍醐真菩薩乘故五為欲斷除文句言説會教通宗得一念相應妙慧悟實義故如華嚴合論云一念相應一念成佛一日相應一日成佛不須劫數漸次而修有此五義乃説是經二藏教分攝者既明緣起須知如來所説教義總攝三藏十二分教中舊稱十二部經今此金剛三昧本是修多羅藏即經藏然經中言三聚戒則攝律藏其始末酬問皆辨核深理則又兼攝論藏故三藏俱攝也十二分教中此經兼攝九分如直示一乘實相是契經法本偈語問答義不重復是孤起頌如來出定宣示是自説菩薩發問是因緣為末世衆生廣説一味之法得廣大利樂是方廣授舍利弗成菩提記是授記向所未説今乃説是未曾有以喻合法以法合喻是譬喻以真理甚深研核辨詰是論議唯不攝本事説往事本生説昔受生及重頌重宣其義等三也又謂家所立教相各各不同而此經融會貫通祇顯圓實如賢首大師立小乘教者依六識三毒少分為説我空法空而不明顯大乘始教但説諸法相空未盡大乘法性義大乘終教亦名實教少説法相多説法性縱説法相亦會歸法性始盡大乘至極之説然此始終二教依位進修是漸非頓第五為一乘圓教謂法界性海圓融互攝如十信滿心即攝住行向地及等覺五位而成正覺也又智者大師化法四教謂如來為決定聲聞説三藏教為退大聲聞説通教為漸教菩薩説別教為頓悟菩薩説圓教又四教儀云凡諸大乘經論不共三乘位次總屬圓教又引華嚴經初發心時便成正覺維摩入不二法門般若明最上乘至於涅槃經有人入大海中浴已用一切諸河之水又娑伽羅龍澍車軸雨唯大海能受餘地不堪又搗萬種香為丸燒一丸則衆香咸具如是等類並屬圓教今金剛三昧經義正合四教儀所説又正合為頓教菩薩説圓教況經中屢説一乘一味更不用開三顯一又法華玄義云自鹿苑開權歷諸經教至於法華始得合實今觀金剛三昧經義而法華一實之理至此乃始得圓況又能總括大乘諸經之義如經中具修六度則本乎般若發明五法則通乎楞伽證法忍則攝乎維摩明地位則同於華嚴説九識則類於解深密舉一乘則合於法華扶律談常則表大涅槃又論相實該唯識論性兼於起信故凡大乘諸法靡不攝入宜乎稱為攝大乘無量義宗也三義理幽深者既知藏教所攝又應知如來説法其意云何蓋始教廢實開權分三乘漸次終教廢權立實會三乘而示一乘所謂前前淺後後深也然台教以法華為後教後味又云法華為聲聞根熟者説其餘鈍根未熟者則又以涅槃為後教後味今此經為法華涅槃二經後教後味之樞鈕其意淵深難以意解又據台教稱法華為一乘開前頓漸會入非頓非漸正顯圓教約味稱醍醐故説開示悟入佛之知見授記聲聞作佛大暢如來之本懷然設三車以示權授聲聞遠劫成佛之記正欲誘進行菩薩行䇿令入佛無餘涅槃故今此經正闡法華一乘一味一實之圓理明地位中菩薩所行之行證等妙二覺之法捨此無以加焉至若賢首以華嚴為一乘圓頓猶大海之攝百川舉一法而法法具備然則文豐義廣學者未免茫如望洋今此經即是華嚴十地中後五地及等妙二覺法然文略義周句語古簡非他經可比蓋經中言無相法即真如自心之法又明六波羅蜜皆無相無為解脫之法無生行即無生法忍得忍之義即宗門所謂向第八識下一刀截斷本覺利即轉第八本覺識入唵摩羅第九白淨識乃是得本覺中所出之利入實際修四無礙辨之智以利生真性空直下顯示五位進修俾後世衆生各得一生成滿智地如來藏契證如來自性清淨之藏以盡識藏中微細之相與毗盧遮那同體總持品總持前六品之法妙契佛心以明生佛共有根本智體即是妙覺果滿也四法被機宜者此經幽玄之理既明且被於何等機器然約法有二種一被當機大乘菩薩化度衆生二被後末世衆生修出世因得出世果因者即序品發衆生正信示一乘法故果者即後七品經文初示第六地中般若法故二示七地中證無生法忍故三示八地中轉諸識入唵摩羅法故四示九地中入實際法故五示真性空體成滿十地法故六示入如來藏證等覺法位故七示妙覺法圓滿佛果故又華嚴會上善財初見文殊悟得涅槃妙心而文殊復令南詢參五十餘員知識善財白云我已先發阿耨多羅三藐三菩提心但未知云何學菩薩行修菩薩道於時知識各各示誨自證自悟之法已復云我唯得此解脫法門若諸菩薩摩訶薩之所修習而我云何能知能識彼功德行此入法界品之語也今此如來親口所説六地至十地及等妙覺法真是末世學菩薩行修菩薩道之法程而菩薩大功德行舍是而終不可得也五宗分體用者既知所被之機應知法之所宗有體有用夫台教先舉名體宗用後示教相此則不然蓋昔世尊初覩明星而成正覺歎曰衆生具有如來智慧德相但以妄想執著而不證得此明佛之始覺與衆生本覺一體不二然諸佛證此而後乃有藏教之名又實從覩星證其體觀樹得其用又如來入定放光是宗通以言説發明入定放光之義即屬説通又宗通即拈華示衆説通即世尊道吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉是也故此經以本始二覺為宗實相無相為體宗通説通為用體用互陳宗説兼暢是一大藏教中極頂之妙法也六教迹前後者既立宗以分體用又應定此經時分據台教分五時初華嚴時二鹿苑時三方等時四般若時五涅槃時又立八教以頓漸祕密不定四教為化儀藏通別圓四教為化法又頓分二種一稱華嚴為頓兼別説圓二以方等大乘部不定先後時分為隨機顯體之頓屬不定教又以鹿苑説四阿含方等般若三時為漸教又合前四時中或説頓或説漸彼此互不相知能令得益是祕密教又以前四時中佛以一音説法衆生隨類得解或説漸得頓或説頓得漸互相得益不同亦名不定教此為化儀四教也又以鹿苑説阿含為小乘三藏教又以方等般若部為通教謂通前藏教通後別圓又以華嚴及瓔珞金光明等經中住行向地等菩薩行位次第並屬權乘為別教謂別前藏通別後圓教也最後以法華為一乘實相開佛知見授記作佛是頓是圓此以如來説一代時教至法華會上始得圓滿故為圓教此為化法四教也法華合涅槃為第五時約味稱醍醐以明見佛性為義又教中言五時多據阿含十二方等八年般若二十二法華七年涅槃一日半夜若考諸經中如佛所説釋種被流離王殺害因緣乃在説法華經之第五年間却載入長阿含經又優填王造像在涅槃前三月內却載入增一阿含經若謂收阿含部中可也不可必指阿含會上止於十二年也餘四時亦不必泥其説至若謂最後七年止説法華一經者如淨飯王泥洹經亦在説法華之第四年流離王殺釋種亦在淨飯王既歿之後此法句喻經所説又涅槃之前佛在毗舍離國大林精舍告諸比丘却後三月我當般涅槃即為説普賢菩薩行法經即普賢觀經升忉利天為母説法經此並戴佛祖統記又藏中有大悲經四童子三昧經亦收涅槃部內蓋判教者略而不言止説法華涅槃為第五時耳再詳涅槃不應言一日半夜當以三月為卒至若法華涅槃之前隨機即説理所必然今詳閲金剛三昧於中究盡一乘實相而開寄滅談常之旨是必在法華後涅槃前者矣昔長水法師判首楞嚴為法華後涅槃前後代諸師多闢其謬謂是般若後法華前也顯聖澄師判此金剛三昧亦謂般若後法華前二時不定為教相今據此經雖與華嚴同一奧義且與法華同在耆闍崛山所説況舍利弗初在法華會上自亦未了聞佛説法始斷疑悔今此會中竟以滿地自任則此經應在法華後矣又解脫菩薩有若佛滅後之問如來藏品中復有涅槃寄滅談常之説此必應在世尊唱滅時矣且法華既合涅槃為第五時今金剛三昧亦可與法華同例而合于涅槃也夫此經最簡最要蓋世尊實因四十九年言説已多茲欲以略該廣特於涅槃前總括三百餘會精義頓超四十一位圓機故一時與實教中大菩薩等説此金剛三昧直與華嚴法華始終同一圓頓統攝諸法曰圓直入佛地曰頓廣而推之頓見頓悟頓超頓入至於理圓行圓智圓位圓因圓果圓事事法法皆圓所謂圓圓矣若依此修行真是圓教中菩薩大藏聖教法寶標目云金剛三昧經乃諸菩薩問佛無生實際一味真實法佛説此經後付囑云是經能入如來智海持是經者則於一切經中無所希求攝諸經要無量義宗種種心地法門云云我輩今幸得遇正宜自慶潛心研究必期頓超直入請勿以前後時分為疑可也七翻譯時代者既明説法時分須詳何代所譯夫譯有交易之義謂翻梵天之語轉成漢地之言也初佛經從天竺五印度而來印度正居南洲之中劫初光音天人降於此故語言文字皆同梵天既傳流此土必翻譯始明按禮記中王制通四方之語各有其官東曰寄南曰象西曰狄鞮北曰譯注者云寄者謂寄託其意於事物以通之象者以意倣像其形似而通之狄與逖同遠之也鞮即履也言遠履其事而知其言意之所在以通之譯者以彼此兩土之語相騰釋而通之周總謂之象胥胥者佐也今俗稱通事當時像法初至漢國值北譯之官兼善西語即稱為譯六朝翻譯諸師皆非淺識之士翻譯場中有譯語者有譯義者有潤文者有證梵語者有證義者有唐梵相校者此經書失譯師名附北涼録按梁慧皎撰道安傳有云自漢魏迄晉經來實多而傳譯之師不言其名後學追究莫知年代安乃總集名目表其時人詮品新舊撰為經録衆經有據實由其功又隋朝費長房昔漢亦有費長房乃地仙也先為沙門周武沙汰反俗隋興文帝詔為翻經學士開皇十七年進歷代三寶録十五卷於中載金剛三昧經是梁僧祐新集道安涼土異經而目録中為失譯源今還附入涼世又如三慧經等皆標僧祐録安公涼土異經今附北涼録云考安師入滅於晉孝武帝太元十年乙酉明年丙戌呂光稱後涼又越十五年辛丑沮渠蒙遜始稱北涼今據附入涼世應作涼州張氏稱國時必非北涼也又三寶記載苻秦道安亦嘗譯經二十四部況稱僧祐新集道安涼土異經必為道安法師之所譯矣八疏注感通者此經傳譯既明復顯感通之迹考宋贊寧高僧傳載元曉法師新羅國人初與義湘法師發志航海求法至唐州抵暮遭雨宿於土龕間達旦視之乃古塜骸骨旁也已而致疑恍然悟三界惟心之旨即還國中著華嚴疏大弘圓頓教義一日新羅國王因夫人腦嬰癰腫醫者莫瘳禱之靈祠覡者曰應往大國求藥王即遣使渡海舟行將半倐見一人從巨浪中出邀入龍宮須臾見龍王語之曰汝國夫人是青帝第三女我宮中先有金剛三昧經乃二覺圓通示菩薩行也今託夫人之病為增上緣可持此經至彼國流布即出經以授使者復云此經出海恐有魔事用蠟紙纏束割裂腨腸以納其中仍取藥傅之如故龍王又言汝去上白國王當請元曉法師造疏講演夫人之疾自愈使還具陳其事王大喜即供奉法師造疏曉乃悟是經以本始二覺為宗白王具角乘將几案在兩角間置其筆硯始終於牛車造疏成五卷夫人之疾果愈王剋日請曉於黃龍寺演義又因簿徒盜其疏去復重録成三卷名為略疏後廣略二本俱行本土略本傳入國中後有翻經三藏改為論云宋覺範禪師林間録中亦載前事明萬曆末顯聖澄禪師有注逮後又得慧開朗法師因注講演余嘗閲華嚴懸談宗鏡録智證傳等皆引用金剛三昧經語圓覺略疏又引海東疏釋略見一斑第不獲全書為憾又翻譯名義集中載僧遁法眼嗣有注亦未獲見九解釋經題者前八門明一經大旨後二門初解經題後疏正文圭峯圓覺疏中合為一門此從華嚴懸談仍分為二金剛喻也取堅利之義堅是體利是用又堅則無物能壞利則能壞一切此法亦然其堅能破諸障其利能斷疑悔又云金剛寶乃帝釋之杵與阿修羅戰則執之三昧法也此云正見正定無見之見為正見無定之定為正定或作正受於三昧中不受諸受是為正受圓覺略疏引東海論釋云三昧此云正思審正思察故名正思又云無正不正忘思非思但為別於分別邪念又不同於虗空無思所以強號為正思耳余意不然夫金剛三昧是諸佛心體如首楞嚴經觀世音菩薩言我昔供養觀音如來彼佛授我如幻金剛三昧得悟耳根圓通又云是諸大衆一切普獲金剛三昧又涅槃經云金剛三昧即佛性正因即般若波羅蜜首楞嚴三昧師子吼三昧名異體同隨所作而得名也又大般若經云如金剛寶置之日中色則不定金剛三昧亦復如是若在大衆色亦不定諸經皆言之涅槃引説特廣又是經有三名一日攝大乘一日金剛三昧一曰無量義宗今此稱金剛三昧者取法喻並彰之義然此三昧非權教中住行向地菩薩所知唯實教中一乘菩薩登後五地及等妙二覺乃能證入故佛言惟佛菩薩乃能知之經中唱明後五地及等妙二覺法又無相法品中具攝後六品法而最後總持品即融會前六品法以成妙覺果滿然總不出此金剛三昧之全體大用故稱為諸佛智地也經者衆生修證之徑路又訓典法於常無有變易如織之有經緯緯變而經常今佛示真常之法垂教後世故曰經又稱契經者謂契理合機之經也又經首相教中云此陀羅二字右為執持義左為流布義或又作相昔人曾以漚和二字釋之或問披雲寂禪師雲門嗣寂示以頌云以字不是八不成森羅萬象此中明直饒巧説千般妙不是漚和不是經又有問地藏琛禪師云以字不成八字不是未審是甚麼字琛云看取下注腳後來諸師每每以宗乘中意頌之如羅漢南雲居祐嗣頌云以字不是八字非滿琅函載絶毫釐看經到此須開眼玉軸分明兩畔題余今亦有一頌以八俱非漚和罔測梵語乖真唐言失實若云字義炳然眼裏早生荊棘饒他信受奉行也是循行數墨左看却成魔右看翻成賊明暗雙雙知不知好向當來問彌勒十疏義通宗者夫教為義學宗為玄學教乃言説可通宗非文字所及此經正顯教義兼明玄學如達磨初祖辨大乘四行理入行入之法曹溪六祖禪性無生離生禪想經作相字禪性無住離住禪寂經作動字百丈祖師回神住空窟解脫魔所縛皆經中之語然其法義實乃可通於宗者余故作是記經文上下兩卷凡八品而品品圓融互攝依法修行雖有八位皆於無漸次中作漸次耳今釋此經釐為九分初序品為生信分發起一乘妙法乃佛果始因位二無相法品為般若分説現前地法證般若現前位三無生行品為法忍分説遠行地法證無生法忍位四本覺利品為轉識分説不動地法證轉識成智位五入實際品為辨才分説善慧地法證智辨無礙位六真性空品為滿地分説法雲地法證受佛智職位七如來藏品為實智分説等覺法證具足實智位八總持品為滿覺分説妙覺法證佛果究竟位品末流通是為弘化分茲將略述管見故先列科分後明正文雖然幸毋以教義責之蓋此經誠為末世修行之要訣入佛智地之規度凡在宗門悟心之士尤宜體究焉仁山寂震述音釋寂同寂殿去聲軍後曰殿鑰音藥鎖鑰樞音樗戶樞又樞機也苾音初苾芻西域香草以僧況之遂為名今稱比丘義同鶖音秋水鳥似鶴析音昔分也如斤破木之義鬘音蠻以華作冠曰華鬘今音瞞矚音祝視也扄涓熒切回平聲祕藏也矧申上聲況也僅音覲才也祇有也研音延研磨也詰音乞問也復音福重也核音核考之使實也音皮謄音騰移書傳鈔也沮音疽沮渠氏復姓苻音扶草名晉蒲洪之孫名堅背有草付字遂改姓苻建國號秦故稱苻秦航音杭渡也癰音雍腫音冢瘳音抽病愈也覡音檄能齋肅以事神者在男曰覡在女曰巫倐音叔倐忽俗作倐腨音善腨腸即足肚傅與敷同剋音客約定日期也簿蒲上聲以簡策記言曰簿徒第但也憾含去聲恨也訓釋義曰訓緯音位縱曰經橫曰緯又定者為經動者為緯懸談終
