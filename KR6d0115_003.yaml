body:
  text: 天台山華頂嗣祖沙門𧧌震述無相法品第二之中解脫菩薩而白佛言尊者若有衆生見法生時令滅何見見法滅時令滅何見此問滅見發起性空義意謂如佛言若心之生滅則令滅其妄心若見法生時一切法相念念出生見法滅時剎那不住念念遷滅又當令其滅何等見耶佛言菩薩若有衆生見法生時令滅無見見法滅時令滅有見若滅是見得法真源無入決定性決定無生此示其性源謂正當見法生起之時便好識取本有之性若二乘執法本無者知畢竟非無即可令其滅此無見矣又如正當見法遷滅之時便好識取本無之性若凡夫執法本有者知畢竟非有即可令其滅此有見矣若滅此有無二種妄見則知前塵自相有無於我何預如此便得法性真源達法本空知心妄計滅心妄見於有於無何有定執若謂有不應無云何剎那不住若謂無不應有云何念念出生由是而觀亦無有所入於決定之性此乃為決定而住於無生者矣此與真性空品為張本也解脫菩薩而白佛言尊者令彼衆生住於無生是無生耶北藏作也此揀問誤解佛言住於無生即是有生此順遣其非何以故無住無生乃是無生菩薩若生無生以生滅生生滅俱滅本生不生心常空寂空寂無住心無有住乃是無生此徵明其義言自應無所住於無生乃是無生若生心住於無生即以能生而滅所生殊為不可直須生滅二種妄心俱乃寂滅使本生之妄更不復生如是則心體常自空寂既得空寂則無所住若心既無有所住乃真是無生矣解脫菩薩而白佛言尊者心無有住有何修學為有學耶為無學耶此問修學之功發起如來藏義修者修於德業學者學其道法上古之世無文字記識若欲成一大業先於木上以刀斫痕計其數名之曰業凡一功成即修去一痕故聖人皆言修業以木痕修盡為卒業其義如此又學字謂童稚初授書時兩手捧持如玩卦畫爻象而已此學之義也又學未滿謂之有學至無所學地為無學又研真斷惑名為學真窮惑盡名無學解脫謂心無有住即同空寂既是空寂有何所修有何所學又問得此無生之心為是學未滿之有學耶為是至無所學地之無學耶佛言菩薩無生之心心無出入本如來藏性寂不動此示如來藏性言無生之心無有所住亦無出入即是衆生本來自性清淨如來之藏其性體本自空寂不動有出纏在纏二義在諸佛證得為出纏如來藏衆生不了為在纏如來藏又在纏名如來藏出纏號淨法身此為如來藏品之張本其義在後品中發明亦非有學亦非無學無有學不學是即無學非無有學是為所學此明非學不學言其不同二乘四果有學無學之比汝言有何修學殊不知此中無有學與不學是即無學非無有學是即為所學也解脫菩薩而白佛言尊者云何如來藏性寂不動此問其名義佛言如來藏者生滅慮知相隱理不顯是如來藏性寂不動此示相揀過夫如來藏本無生滅本自空寂皆由前七識無始名言有支及業三種虗僞惡習所熏而為生相無明轉為識藏含藏一切種子為善不善因又依此藏識復生住地無明起前七現行此住地無明即與前七和合由此現種相生因生而有滅因生滅而有慮知因有此四相故隱覆真理不得顯現然此生滅根源實從如來藏轉為識藏而起於七識也今衆生但為四相隱覆而不知如來藏性本無生滅本自空寂故不為其所動也解脫菩薩而白佛言尊者云何生滅慮知相此問揀過之相佛言菩薩理無可不若有可不即生諸念千思萬慮是生滅相菩薩觀本性相理自滿足千思萬慮不益道理徒為亂動失本心王此示四種過言如來藏中真性之理本無可之與否若有可否即有是非有是非即諸念紛飛而起遂有千種思萬種慮由此有菩提煩惱更互相侵不知此皆是生滅之相若返觀於本性之相其理本自滿足若隨意識思慮則不能益於至道之理徒為其所動亂而使心王失於所守矣若無思慮則無生滅如實不起諸識安寂流注不生得五法淨是為大乘此明五法淨釋前修學之功效也言若心無思慮則無有生滅便得入於真如實際之地妄念決定不起諸識安住空寂流注之識不生則五法皆淨是謂之大乘也楞伽經云諸識有二種生住滅謂流注生及相生流注住及相住流注滅及相滅起信論中謂第八中現識三相微隱是細中之細名為流注此流注全是真如不生滅性因無明不覺忽與生滅和合轉而為識名流注生長劫相續名流注住至等覺金剛道後得一念相應慧頓斷生相無明此是業識動念念中最細者斷已即轉第八識為大圓鏡智轉前五識為成所作智方滅第八中現識之相名流注滅此流注邊際極為細微唯佛及住地菩薩真斷我法二執證法性身者方能知耳其餘大乘資糧加行位中以善巧方便觀察遠離分別我法二執轉第六識為妙觀察智轉第七識為平等性智觀生死涅槃平等得證如來平等法身初獲無分別智者亦知之既知此已即以無分別智觀察微細流注若上品修頓超十地中品修頓超八地下品修從地至地漸斷漸證直至十地始能見自心微細妄想流注耳此第八現識中生住滅三種流注也若生住滅三種相乃前七識中相但就前流注住中分而為三有細中之粗是前五與七了境粗中之細粗中之粗是第六了境此三相為粗顯如七識初生執第八為我名相生即與前境和合相續不斷名相住若大乘從初發正信相應地即斷執取相是滅粗中粗相即是斷第六我執分別以第六分別事識因第八現識計度而生執取故又從初地證遍行真如斷相續相得隨分覺而見道謂覺於念住念無住相以離分別粗念相故即是斷第六法執分別此亦是第六依第八現相計度而生相續故至七地斷智相此亦是第六因現識而成智相故此斷第六法執俱生此法執以與身俱生任運而起故是滅粗中細相總為第六了境自八地斷現相以第七唯內執第八為我而無法執此空第七俱生我執又以前五識依第八轉相而轉現相故九地即斷轉相以第七依第八業相而轉轉相故此二乃前五與七了境是滅細中粗相是為相滅然相即流注中相流注即相中流注若流注識滅即得滅盡定苟或微細習氣不滅流注識亦不能滅今觀衆生心中剎那剎那念念生滅以何治之其必觀生也猶石女之懷胎觀住也若陽𦦨之翻波觀異也同浮雲之萬變觀滅也類狂華之謝空觀剎那也於真如心中未嘗動著一纖毫意念如是則流注與相一切都盡所以八地中菩薩於滅盡定能念念入念念起此滅第八識轉現二相中生住滅三種相然尚有一分無始無明業相未斷故十地悟入微細祕密愚等覺金剛心斷微細所知煩惱障此所知與煩惱名為二障即從我法二執根本上生煩惱障大涅槃所知障大菩提唯識中謂染法障所知境令智不知名所知障故曰所知不是障被障障所知至等覺方斷此二障且於境上猶有微細執著愚及微細礙愚所以云等覺菩薩猶坐在無明窟中至妙覺解脫道第八依真相而轉業相及前五所依轉相而轉現相一時滅盡此是空第八及前五中法執而得入於佛地即前所謂流注識滅是滅第八中一分無始無明業相此業相滅即流注滅若流注滅第八真相方顯真相即心真如相乃亘古亘今不斷不滅雖則隨緣而生本未嘗生隨緣而滅本未嘗滅此即本覺心體自古自今不變不壞其流注滅者唯滅心相而心體常存以故謂之真常流注因衆生迷此故流轉三界諸佛證此即成等正覺但相宗論我法二執有粗有細粗者是分別細者是俱生又唯識百法中前九十四種是衆生分上我法二執後六種無為是二乘菩薩我法二執又八識中以六七皆有二執五八俱無性宗則五八唯法執七唯我執六我法二執俱有若無相無見無分別無二執者真如也又五法者即楞伽中所云相名妄想如如正智是也又云五法三自性及與八種識二種無有我悉攝摩訶衍夫世間萬有皆名相所攝故凡有相即有名皆吾人強為安立者也然一切有形色者是相即相而稱謂是名因名相而生分別是妄想知此名相自性本空實無一法可立亦無一法可遣知一切法其體空寂離於所作是如如從如如之體返觀一切名相妄想猶如過客來去不停求其實相了不可得是正智又楞伽別示三性八識二無我亦以此五法收盡蓋三自性一緣起自性即名相二妄想自性如其名三成自性即是如如正智又八識是名相妄想若轉八識而成四智即是如如正智又二無我謂人無我法無我我與法是名相執我執法是妄想證二空無我即是如如正智以故一切佛法總不出此五法且名初本無名相初本無相皆由妄計謂此名非彼彼相非此若知其不實無思慮計度生滅之相即如智亦是假名何有相之可得若謂實有如智亦屬妄想如此則五法皆淨盡無餘矣菩薩入五法淨心即無妄若無有妄即入如來自覺聖智之地入智地者善知一切從本不生知本不生即無妄想此明入佛智地夫自衆生至於佛地無非皆欲空此五法而已蓋衆生流轉六道只為執著名相妄想而起毀譽愛憎種種意言分別若得名空則毀譽不動相空則憎愛不生名滅則言語道斷相滅則心行處滅若妄想滅則一心獨顯若得如如之體則熾然作用而常在寂滅若得正智住煩惱即是菩提處生死不異涅槃如是則一切心識所不能緣名本無名相本無相名相既無妄想非有亦無正智亦無如如亦無佛無衆生此所謂入五法淨心即無妄若無有妄即入如來自覺聖智之地此自覺聖智是妙覺所證境界如佛言思惟無所有佛地無生到自覺聖趣又云此則是我地自在最勝處故知此即是佛智地然入此智地善知一切世間出世諸法從本不自生既知本不自生又何有於妄想耶此章總結無相中無生覺利實際性空如來藏總持品之義也楞伽中佛嘗示七種第一義即是此七品法一謂心境界第一義即心自性更無分別即是無相二謂慧境界第一義觀一切法無不通達而實無所有即是無生三謂智境界第一義採集業說心不採集是智即是本覺利四謂見境界第一義得佛正知見知一切色是佛色一切聲是佛聲即是入實際五謂超二見境界第一義離有無一異俱不俱一切對待即是真性空六謂超一子地境界第一義初說三乘法住一子地今說一乘一性故超一子地即是如來藏七謂如來自到境界第一義即自覺聖智不由他悟通達佛法此即諸佛善知之妙但衆生迷本即以此知而變為妄想矣故曰知之一字衆妙之門亦衆禍之門也後地藏菩薩首問法不緣生以收此中之義解脫菩薩而白佛言尊者無妄想者應無止息此問無妄無止即從前品中不生二字轉出此無止息句來佛言菩薩妄本不生無妄可息知心無心無心可止無分無別現識不生無生可止是則無止亦非無止何以故止無止故此明止無止義正顯入如來自覺聖智境界夫一切衆生皆由前七識執取五陰自相共相乃有因緣生滅之法而為妄想計著相續不斷耳所言自相者謂自身現量證知觸火則熱入水則寒非言說所及是也共相者乃比量之境是言說所及如言一法則貫通多法共有此相猶一切火同一熱性一切水同一濕性是也又如假智以詮自性之名亦屬言說亦是共相中收故凡心生滅相總只因自共二相而有妄想計著之相續耳又即於五法中觀之不特名相妄想是計著相續之相若執如如正智為實有者亦為妄想相續矣何故以如如正智良由對治名相妄想而設究竟何有如如正智之可得耶此所謂一真法界纖塵不立非凡愚所知須是住地菩薩證平等法性始能知耳以平等法性中既無凡情亦無聖解觀察自心現量境界知自共二相心及心所一切諸法本來空寂雖從自心顯現猶如鏡現形本無留迹當處出生隨處寂滅於妄想計著相續本自不生亦無妄想計著相續之可以息固知心之本無其心無起無動亦無心相之可止如是則無分無別即得第八現識流注不生當體空寂更無有生之可止是則謂之無止然則亦非無止以止於無止故篆書以為步字猶夫舉左足復進右足斯謂之步若左足已停而右足不起乃謂之止昔嘗論大學止於至善之義猶夫人之前念後念妄惑競生逐惡流染而不知止若知自己靈明性德而止於至善更不容有第二念即謂之止至者極盡之稱善者精微之謂是必當止於極盡精微明德之奧耳吾固曰此心一止便得其正又何有於私欲之萌念乎此是孔門下手用功處也且吾宗以第一念為現量境界故黃檗和尚云頓超等妙二覺之表決定不流至第二念始似入我宗門蓋宗門全提大用直下截斷意識分別此是真止如臨濟立第一句法云三要印開朱點窄未容擬議主賓分何容心識籌度於其間耶若向未舉已前撩起便行略較些子才生第二念即落意識分別便成妄想執著相續不止是為比量此由外緣五塵而比度其長短好惡等相故為從上諸聖所訶謂毫釐繫念三途業因瞥爾情生萬劫羈鎖至若比度不著如夢中境及病中狂亂所見名為非量此三量是能緣之心與五塵所緣之境而為對現於境有好惡長短而心則依之起於憎愛取捨至乎耽染習成善惡二性以感苦樂二報故流轉三界不已奈何衆生迷此不知皆從意識而起若乃勘破妄心妄境直下能所俱亡分別不起是真得無生可止即能轉根本無明為般若智光於塵勞生死顯大機大用處處自在無礙一一任運縱橫如此真得入自覺聖智之境界者也解脫菩薩而白佛言尊者若止無止止即是生何謂無生此徵止生之義言若生止於無止之心非可為之止矣蓋生心求止止即是生如三祖信心銘云止動歸止止更彌動然今若求止之心已生何以謂之無生耶佛言菩薩當止是生止已無止亦不住於無止亦不住於無住云何是生此示不住無止之義然此但答止即是生一句謂正當止息之時而心雖是生且念念無住此止亦已無其所止矣況亦不住於無止亦不住於無住云何而言止即是生耶解脫菩薩而白佛言尊者無生之心有何取捨住何法相此問無生取捨徵前何謂無生一句之義佛言無生之心不取不捨住於不心住於不法此示無住之義夫一切法若有所住即有取捨蓋取捨者只為五陰中識陰未破內取識藏謂之我外取識所分別五塵而為我之所此是我執也若既捨識藏則又取能捨者而為我所證者為我之所是則名法執矣此二執即是心法二種今言無生之心於一切法不取不捨無生之相而住於不心不法則我法俱空能所皆泯乃為自覺聖智之實義也解脫菩薩而白佛言尊者云何住於不心住於不法此問不心不法徵前所示之義佛言不生於心是住不心不生於法是住不法善男子不生心法即無依止不住諸行心常空寂無有異想譬彼虗空無有動住無起無作無彼無此得心空北藏作空心眼得法空心五陰六入悉皆空寂此重釋不生心法因前問無生住何法相故答住於不心不法其實即不生心法一句既不生心法即無可依止既無依止即不住一切有為諸行心常空寂無有取捨可否是非及一切異想譬彼虗空無有動相住相無起相無作相亦無彼此之相果能如是即得心空悟四大之無我得法空悟一切法無我故曰得心空眼得法空心夫心空之眼即如來正法眼藏法空之心即如來涅槃妙心從上佛祖惟契證此心眼而已所云五陰者四大積聚是色領納資貪是受取相馳求是想微細遷流是行熾然分別是識此五能覆真性故名陰然生因識有滅從色除六入者眼耳鼻舌身意內六根取著色聲香味觸法外六塵有互相涉入之義故曰入然今既契證此心此法而陰入等相自然悉皆空寂者矣後地藏菩薩問諸法云何不一以收此中之義善男子修空法者不依三界不住戒相清淨無念無攝無放性等金剛不壞三寶空心不動具六波羅蜜此明空法具攝六度夫空為大乘之初門也然修此空法不依三界以出於三界有為法故不住小乘有為戒相以三輪體空故自性清淨無有念慮離於散亂無有攝心離於懈怠無有放意性體等於金剛不壞自性三寶清淨光明之體夫自性常覺不昧是佛寶自性軌執不失是法寶自性清淨和合是僧寶又自心清淨念念無染即是佛自心光明無不照燭即是法自心清淨光明處處無礙即是僧總不用外求只在自性一心之中也若信此一體三寶即得空心不動具六波羅蜜梵語波羅蜜此云到彼岸又云度蓋謂世間有為法祇在此岸不得到彼岸如人修施以能施所施及受施者為三輪此三輪空寂名無相無為是到彼岸若三輪不空則因果不忘如輪之回轉是世間有為法矣六度中皆具三輪若不空不得稱為六波羅蜜又二乘人與菩薩同行六度但自利利人不同又權教只修六度為因實教先求悟明自心既得明了止息一切惟修本性惟欲度生是名發菩提心既已發心應修諸行成萬德莊嚴法身妙果也音釋預與豫同干也在也及也卒畢也稚音治幼小也玩同玩閒觀取適也窟坤入聲窟穴萌音盲草始生芽也籌音酬計算也瞥篇入聲忽然一見也羈音雞羈繫鎖音瑣俗作鎖耽都含切答平聲愛戀也奈音耐勘堪去聲軌音癸法也循也
