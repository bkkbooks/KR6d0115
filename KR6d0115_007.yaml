body:
  text: 天台山華頂嗣祖沙門𧧌震述入實際品第五之上此為辨才分夫欲得大辨才智者非入實際何以能之所以第九善慧地中為度衆生修無礙智一法無礙二義無礙三詞無礙四樂說無礙在聲聞祇得少分以其不能知詞知義又且無三種善巧不能隨衆生根性用軟語粗語不軟不粗語而為衆生方便說法故也若在緣覺樂修寂滅其所化導惟現神通而已故菩薩住此九地中得無量善巧無礙智知一切佛法名字性相差別平等而不取著是法無礙又知一切諸佛法義名義性相差別平等義了知如來隨八萬四千衆生心行根解差別音聲而不取著是義無礙又知一切法隨其言音定其文字善識字體解其真義廣說地道無差別相而不取著是詞無礙又能以第一義智善巧方便隨衆生信解以如來智清淨行圓滿說然雖樂說如是最上而亦不著是樂說無礙是皆於一切法無所取著故得無礙又了達一切法無礙故得義無礙知義無礙故得詞無礙知詞知法知義得不思議說是為樂說無礙如是則善慧地中之能事畢矣又菩薩住此地中晝夜精勤專求智明更無餘想唯入佛境界親近如來故諸佛皆隨其性欲而與法門也今此如來無問自說起發其問亦猶是耳又此地行力波羅蜜為勝以故大力菩薩當機然總只發明入實際義而已所謂實際者於一切法俱不可得此不可得亦不可得雖不可得而又修於智辨以利生也又入實際三字先出於無相法中為此品張本於是如來作如是言諸菩薩等本利深入可度衆生若後非時應如說法時利不俱順不順說非同非異相應如說引諸情智流入薩婆若海無令可衆挹彼虗風悉令彼庶一味神乳此垂法弘化以明利生之行言菩薩得本覺之利深入唵摩羅始可利生若於吾滅後至非正法住世之時皆應如斯說法即使衆生未能信解或際會不時又且根性不利者可以順說而善化可以逆說而折伏此實非可以同亦非必求其異但取其相應而如法說之引一切邪見鈍根衆生之情識與利根衆生之心智皆流入於薩婆若此云一切種智海中夫般若為因薩婆若是果為令得此智果也無令可化之衆生徒為挹彼虗風而已挹之為言酌也酌挹其風猶俗言吸風然必當令彼衆庶悉䬸一味神妙之法乳乃為是耳世間非世間住非住處五空出入無有取捨何以故諸法空相性非有無非無不無不無不有無決定性不住有無非彼有無凡聖之皆而能測北藏作惻隱此示五空之法言若世間若非世間若住於世間相若不住於世間相於此住非住處觀於五空若出若入無有取捨之相生於其心以此諸法空相其性非屬有之與無亦非無非不無既不無不有則無決定之性故不住於有無然非彼有無之情凡聖之智而能測其隱微之旨也諸菩薩等若知是利即得菩提此明其法利然此法空性相之體亦乃本覺之利若知是本覺之利即得於菩提矣爾時衆中有一菩薩名曰大力即從座起前白佛言尊者如佛所說五空出入無有取捨云何五空而不取捨此咨請如來空義佛言菩薩五空者三有是空六道影是空法相是空名相是空心識義是空菩薩如是等空空不住空空無空相無相之法有何取捨入無取地則入三空此答名示義明其空相之無取也然佛說法或稱菩薩或稱善男子各有所表凡切實緊要欲令其直下順理剛斷則必曰善男子若為後世衆生唱明其義即稱菩薩而此經中佛與大力地藏二大菩薩酬問並無善男子之稱三有欲有色有無色有皆屬有漏有為六道天人阿修羅地獄鬼畜生皆妄心所成不實如影法相名相該世間出世間皆由意識妄生分別心與識皆是假名本無實義如是五空之義亦皆為利生之故詮表曰空須知空亦不住於空空亦無空相總成無相之法又何容取捨於其間耶若能入於無取之地則又更進一步而入於三空矣大力菩薩言云何三空此又問三空之義佛言三空者空相亦空空空亦空所空亦空如是等空不住三相不無真實文言道斷不可思議此示名顯義此三種空唯九地十地與等妙二覺所知他不能解蓋言如上所舉五空之相亦空又空空亦空所空亦空入於如是之三空并不住此三種空相則其間豈不無真實之理至此文言道斷真乃不可思議大力菩薩言不無真實是相應有此揀誤解為有相佛言無不住無有不住有不有之法不即住無不無之相不即住有非以有無而詮得理菩薩無名義相不可思議何以故無名之名不無於名無義之義不無於義此示真實名義言無且不住於無有且不住於有故凡不有之法即是無不即住於無不無之相即是有不即住於有然此不住之中不無真實之性此亦非可以有無而為詮表得盡其理既不可以詮表則本無名義之相可得是真不可思議然無名之名名不自名因義表名故不無於有名無義之義義不自義因名顯義故不無於有義大力菩薩言如是名義真實如相如來如相如不住如如無如相相無如故非不如來衆生心相相亦如來衆生之心應無別境此菩薩領解因義明如言如是名義既互無自性即是真實如如不動之相亦即如來之如相如是如相俱是假立亦不住於如以如中本無如相若相中既無如相則非不同於如來矣至若衆生之心相是相亦同於如來以此推之衆生之心又豈不如自應無有別境也佛言如是衆生之心實無別境何以故心本淨故理無穢故以染塵故名為三界三界之心名為別境是境虗妄從心化生心若無妄即無別境此印如明淨謂衆生之心本自清淨以理觀之實無垢穢但以貪染情塵背真離覺故名為三界遂成三界生死垢穢有漏之妄心是即名為衆生心中之別境也雖有是境本自虗妄乃從清淨心中幻化而生若心無妄念本自如如心境一如境外無心心外無境如此即無別境也大力菩薩言心若在淨諸境不生此心淨時應無三界此明心淨即土淨佛言如是菩薩心不生境境不生心何以故所見諸境唯所見心心不幻化則無所見菩薩內無衆生三性空寂則無己衆亦無他衆乃至二入亦不生心得如是利則無三界此明心境空寂印成淨義言心不妄生諸境如懸鏡然境亦不生於心本不相到若能如是則所見諸境唯所見心宗門下說到者裏便截住口却云正當與麼時且道此心畢竟在甚麼處見切莫擬議若擬議便屬意根卜度設或有不識好惡漢下個注腳道境從心現見色便見心祇是說道理直須向語默外當體覿露處轉得一機直下便與釋迦老子一同鼻孔出氣教乘中不會只得注腳下重添注腳道若心不幻化則外無諸境之可見內無衆生善惡無記三性皆本空寂如是則無我見人見衆生見壽者見故曰無己衆亦無他衆乃至二入亦不生心則并無法見非法見所以般若經云發阿耨多羅三藐三菩提心者應如是知如是見如是信解不生法相得於如是即得本覺之利自無有三界而超然出乎其外矣大力菩薩言云何二入不生於心心本不生云何有入此揀問二入之義佛言二入者一謂理入二謂行入此顯二入之名後別示二入之義昔達磨大師略辨大乘四行有云夫入道多途要而言之不出二種一謂理入二謂行入理入者謂藉教悟宗深信含生同一真性但為客塵妄想所覆不能顯了若捨妄歸真凝住壁觀無自無他凡聖等一堅住不移更不隨於他教此即與理冥符無有分別寂然無為名之理入行入者謂四行其餘諸行悉入此中何等為四一報冤行謂修道行人若受苦時當自念言我從往昔無數劫中棄本從末流浪諸有多起怨憎違害無限今雖無犯是我宿殃惡業果熟非天非人所能見與甘心忍受都無冤訴經云逢苦不憂何以故以識達故此心生時與理相應體冤進道故說言報冤行二隨緣行衆生無我並緣業所轉苦樂齊受皆從緣生縱得勝報榮譽等事是我過去宿因所構今乃得之緣盡還無何喜之有得失隨緣心無增減喜風不動冥順於道故說言隨緣行三無所求行世人常迷處處貪著名之為求智者悟真理與俗反安心無為形隨運轉萬有斯空無所願樂知彼功德黑暗常相隨逐三界久居猶如火宅有身皆苦誰得而安了達此處故捨諸有息想無求經云有求皆苦無求乃樂了知無求真為道行故說言無所求行四稱法行即性淨之理目之為法此理衆相斯空無染無著無此無彼經云法無衆生離衆生垢法無有我離我垢故智者若能信解此理應當稱法而行法體無慳於身命財行檀捨施心無吝惜達解三空不倚不著但為去垢稱化衆生而不取相此為自行復能利他亦能莊嚴菩提之道檀施既爾餘五亦然為除妄想修行六度而無所行故說言稱法行此四乃為行入也按初祖此說即依此經而立者也理入者深信衆生不異真性不一不共但以客塵之所翳障不去不來凝住覺觀諦觀佛性不有不無無己無他凡聖不二金剛心地堅住不移寂靜無為無有分別是名理入此示理入言順其真性之理以利生也故曰深信衆生原不異佛之真性今生佛體殊而不能一凡聖位分而不能共者但以客塵之所翳障耳然須知心性是主本來清淨如明鏡然其妄念如客因相續而起汙染心性有塵垢之義此猶鏡上所積塵垢而翳障其光明也若能磨瑩而去其塵垢則光明之體仍在焉然今以此修治心性之法而利生先應今其坐斷意根前念不隨之而去後念不使其復來直用當前一念凝住覺觀諦觀此本有佛性於相不有於理不無無己無他體原是一無次無餘凡聖不二如是則於金剛心地中堅住不移得寂靜無為之智體悟無分別之智用是令其從理而入於法空也行入者心不傾倚影無流易於所有處靜念無求風鼓不動猶如大地捐離心我救度衆生此示行入言住於真心之行以利生也此行字指一切日用中應緣遇物之心行故曰心住中道而不生傾欹依倚之念於六塵緣影而無遷流變易之想於日用中一切所有作為處想念寂靜永絶馳求縱遇境風鼓撼而不動猶如大地之奠安雖得如此抑且原無住著所以捐離無妄心我唯與慈運悲以利生也無生無相不取不捨菩薩心無出入無出入心入不入故故名為入此明入字之義言理性本自無生心行本自無相故不取一法亦不捨一法蓋以真性之理不可取故真心之行不可捨故然心行無相本無所出理性無生本無所入是以菩薩利生之心本無出入然得此無出無入之心則知入而不入以入而不入故強名之曰入菩薩如是入法法相不空不空之法法不虗棄何以故不無之法具足功德非心非影法爾清淨此結成前義以明入法之功言若能入此理行二法則知此法之相實本不空然則何以謂之不空之法其法今已顯著是必不致於虗浪棄擲者也既不虗棄必自知其不無若既知此不無之法是則具足法性之真實功德者矣此非妄心亦非緣影實乃法性固爾清淨也然其從不取捨無出入轉出不空不虗棄不無方乃出此具足功德四字昔達磨祖師初見梁武帝帝問朕造寺度僧有何功德祖曰並無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝遂問如何是真功德祖曰淨智妙圓體自空寂是為真實功德帝又問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識帝不悟祖遂渡江入魏然當時天下人咸稱武帝為佛心天子嘗御注大品般若又親為四衆講放光般若實能依教修行只為未知真實功德所以不悟初祖之言後來聞法道大著深悔之及祖示滅後又聞魏使於蔥嶺上遇祖手攜隻履而返益加追慕乃御製文記之有云嗟夫見之不見逢之不逢今之古之悔之恨之朕雖一介凡夫敢師之於後又為作贊有心有也曠劫而受沉淪心無也剎那而成正覺之語雖然設或當日武帝知此經之義決不當面錯過達磨老子大力菩薩言云何非心非影法爾清淨此咨請未解之義佛言空如之法非心識法非心使所有法非空相法非色相法非心有為不相應法非心無為是相應法非所現影非所顯示非自性非差別非名非相非義何以故義無如故無如之法亦無無如無有無如非無如有何以故根理之法非理非根離諸諍論不見其相菩薩如是淨法非生之所生生非滅之所滅滅此發明空如清淨法義言如向所說三界惟心萬法唯識只為外道邪見不信自心故今此空如之法非心能知非識能識此先破心識之能此能即藏識見分也故曰非心識法又衆生因心識之能遂有心所謂恆依心起與心相應繫屬於心具此三義名為心所其數共有五十一心所法而心法唯一是皆為心識使令之所有者此破心識之所即藏識之相分皆因小乘我法二執所有若大乘頓悟法空即無此執故曰非心使所有法又不屬於斷見之無故曰非空相法又不屬於常見之有故曰非色相法又非世間有為之心一切不相應法又非出世間無為之心本是相應之法非同幻化之所現影非是言說之所顯示非自性真體非差別智用非有名字非有相狀非有義理蓋此清淨法中誰與安名義本空寂亦無如故今強詮之而為無如之法亦本無此無如之名既無有無如之名即非為之無如而可有此無如矣若更究竟此根源之義理亦非實有義理可求亦非實有根源可得故離於一切言說諍論實不可見其無如之相如是清淨之法非生之所能生而生亦非滅之所能滅而滅者也佛說心識名相皆為破二乘外道邪見如楞伽中五法三自性八識二無我種種分別科揀無非為顯一心之法故經云佛語心為宗又云大乘諸度門諸佛心第一後代祖師依唯心立性宗依唯識立相宗是皆同顯一心之法耳後學宗之或執相以難性或執性以破相性相角立而是非生滅之妄心生矣達磨大師斥相指心嘗以楞伽授二祖謂可以印心蓋指佛語心為宗之語也又傳載二祖每常舉楞伽論說輒自歎曰此經四世之後變為名相一何可悲此乃言後代不知此名相之建立為顯一心心法未明唯知名相執名相為實有皆屬妄想即是衆生境界若知名相本空妄想非有獨顯一心則為正智如如是諸佛境界矣大力菩薩言不可思議如是法相不合成不獨成不羈不絆不聚不散不生不滅亦無來相及以去相不可思議此乃深領法義亦先歎不可思議而後言之曰如是法相吾今已知其不為衆法所合成亦不可言一法之所獨成不為一切有法所羈不為一切無法所絆不可言其有所積聚不可言其有所散失不見有一法可生不見有一法可滅亦無來去之相可得體本如故言已復歎之曰不可思議其深領佛意可知矣佛言如是不可思議不思議心心亦如是何以故如不異心心本如故衆生佛性不一不異衆生之性本無生滅生滅之性性本涅槃性相本如如無動故一切法相從緣無起起相性如如無所動此印成重釋明心真如義佛言如是此又不同乎前蓋言其所歎不可思議者固應如是但更須知諸佛不可思議之心與一切衆生心亦乃如前之不可思議也蓋如前所言空如之法順理推之本不異於諸佛衆生之心以心體本同於如故雖則衆生佛性流轉不一而歸源本不異也以故衆生之性即空如之性其體本無生滅可得然今目前所見有生滅者乃是相耳相中之能生滅者性也此生滅性本與涅槃之體同故言此性與相本同於如此如者即寂滅之性寂滅即是如故如之性本無生滅之動相故然世間一切法相雖皆從緣而起而無起相可得蓋以緣起之相其性本如如之性本無所動也因緣性相相本空無緣緣空空無有緣起一切緣法惑心妄見現本不生緣本無故此明因緣空義言如衆生妄見有十二因緣之性之相不知其相本自空無然今雖則見有能緣之性及所緣之相須知能緣亦空所緣亦空其性本無有能所緣起之相一切因緣相續之法皆由衆生發業潤生煩惱惑亂於心妄生所見雖有相現而性本不生蓋以緣起本自無故心如法理自體空無如彼空王本無住處凡夫之心妄分別見如如之相本不有無有無之相見唯心識此明心如法理言心與如相及因緣之法真性之理推其自體皆是空無如彼空王蓋以虗空之性廣大自在喻之為王然其體性圓融無礙本無有所住處而凡夫之心於此妄生分別知見豈知如如之相本不屬於有無然今衆生但以能所分別有無之相不知其能見所見乃是唯心唯識而已菩薩如是心法不無自體自體不有不有不無菩薩無不無相非言說地何以故真如之法虗曠無相非二乘所及虗空境界內外不測六行之士乃能知之此結明心法義言如是空如之心與緣起之法究竟亦不無自性之體何也若推其自性之體固乃不有逆而觀之雖是不有亦非不無以緣起而自現故須知此說乃是菩薩無與不無之實相而非言說可到之地也蓋真實如相之法虗無曠大無有相狀非二乘之所能及猶如虗空境界無有內外限量不可以測識唯六行之士乃能知之後地藏菩薩問相本空無收此中之義音釋軟與軟同挹音邑酌也測音惻度量也該改平聲括盡也覿音狄面見也藉音謝借也又與籍同如狼藉從草典籍從竹凝音寧不散貌吝音藺慳也構音姤結構瑩榮定切去聲潔也一作摩瑩皎然也鼓音古吹撼也欹音溪不正也撼含上聲搖動也蔥音匆斥音尺黜也輒音出忽然也絆彼卷切近變限間上聲
