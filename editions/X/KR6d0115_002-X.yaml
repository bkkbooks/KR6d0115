body:
  text: 天台山華頂嗣祖沙門𧧌震述無相法品第二之上此為般若分夫般若為諸佛之母諸法中王一切諸佛從茲出生一切萬法從茲建立雖則能生能立而般若之法本自無相故謂之無相法也然無相之法即真如自心之法能含攝一切以故此無相法品中先為發起無生覺利實際性空如來藏總持六品之法品末別明六波羅蜜又總攝前六地法而獨顯般若現前以發明第六地行相又初地至五地未能久住無相法中六地專修無相法七地始證無相獲無生法忍便入第八地得無功用道方得滿地方得覺滿以故無相法品總攝前六地又發起後四地及等妙二覺故直至妙覺位亦不出此無相法也又無相即法身義今以般若收歸解脫則圓成涅槃三德祕藏也爾時世尊從三昧起而說是言諸佛智地入實法相決定性故方便神通皆無相利一覺了義難解難入非諸二乘之所知見惟佛菩薩乃能知之可度眾生皆說一味此出定自述乃如來方便開化之端夫三昧是宗言說是教宗無教不顯教無宗不立故今別開第二義門以言顯無言即從序品中入佛智地說起所謂佛智地者唯明性相而已葢相為萬法唯識之宗性為萬法唯心之旨唯識摧外道小乘迷謬之執唯心顯如來藏真如自性之體然必須性相互融心識俱泯方得為究竟覺也又他經不明性相於義亦通此經不明性相其義不顯然性相二宗皆依大乘經義造論葢自佛滅度後天親菩薩依解深密經造唯識論親勝火辨同時造釋論至佛滅度千有餘年有護法陳那等約前頌論造成唯識論此名法相宗馬鳴菩薩應如來懸記於佛滅度六百年後而生依楞伽經製大乘起信論廣說阿賴一作梨耶中三細識六粗相一心真如生滅二門此即名法性宗後龍樹菩薩製摩訶衍論引一百本大乘經證八識心王性相微細等義此性相二宗之始也然二宗立論既各本一經為主自不能契同若約成唯識論以現識與分別事識和合為宗若約起信論以真識現識分別事識和合為宗真識即如來藏寂滅一心現識即第八阿梨耶識能隨五塵對至即現故分別事識即是第六意識能隨事攀緣分別六塵故然不言第七末那識者謂有八六兩識必有末那以末那緣於第八又依第八而轉六又以七為根故末那之細分通於現識而粗分通意識也古德以日中設水器為喻水器猶第八識日猶六識然日以器中之水為緣乃有壁間浮動之影影猶末那也又約相宗立義言心及心所法四分合成有相分見分自證分證自證分如證自證分為不迷之真如自證分真如一分迷中佛性即本覺心體以眾生雖迷有真如自體可證故云自證真如體上有二種用一能緣用謂之見分二所緣用謂之相分攝用歸體唯一自證分所以山河大地是心相分心外無法故曰唯識此實為名相之宗也但後學惟宗名相祇益多聞不名學道必須悟自本性方得解脫以故必當先明性宗之義如云真如心體本不屬迷悟迥超生滅不變不壞而真如相用全在生滅識中顯現所謂真如不守自性故隨緣變現真如不壞自性故不變隨緣由此立心真如門心生滅門若眾生修證必從生滅門悟而證真如門故以生滅與不生滅和合非一非異為阿梨耶識以起根身器界如地水火風而依於空為器界五法見聞知覺而依於識為根身五法於此十法顯示一心迷悟之源若了悟一心即得根本實智故曰萬法唯心為正宗然唯心一宗實乃統攝始終圓頓四教而為眾生成佛之要門也今此佛說金剛三昧發明諸佛智地故先唱言入實法相決定性故夫入實者入於實際也若悟心法無際則入於實際今入實法相則入於實際之法得實際之相皆決定知一切法緣生無性此直示真如寂滅之體真如之體即無相法即是根本智所有方便神通皆從無相法中所出之利然此乃是一念相應頓然覺悟了義之法故難解難入非諸二乘之所知見知見有四種如地前異生不見不知初地至九地知而不見十地見而不知惟佛與大菩薩亦知亦見故云惟佛菩薩乃能知之雖然若見可度眾生皆當為說此一味法也曉法師論釋云皆說一味者令入一覺味故即是大乘欲明一切眾生本來一覺但由無明隨夢流轉皆從如來一味之說無不終歸一心之源如此說終自不了何故總輸他歸宗禪師接大愚用得直截昔大愚欲往諸方學五味禪歸宗云我者裏只有一味禪大愚便問如何是一味禪問聲未絕即被歸宗打出大愚即於棒下頓悟其旨須是恁麼始得爾時解脫菩薩即從座起合掌胡跪而白佛言尊者若佛滅後正法去世像法住世於末劫中五濁眾生多諸惡業輪迴三界無有出時願佛慈悲為後世有本無世字眾生宣說一味決定真實令彼眾生等同解脫此因勸而問發起無生行品之法葢自既解脫欲令一切眾生同得解脫也稱佛為尊者以明出世之法故不稱世尊佛之正法像法初皆住世千年後又增住正法四百年像法千五百年共計三千九百年此載法苑珠林中按佛入滅自周穆王壬申至今康熈辛酉閱經之歲凡二千六百三十年耳劫者此云時分亦以初中後分之末劫乃對劫初而言也正法是諸佛所覺所說一切法空佛入滅後則正法流布住世及去佛遙遠必取象示法為像法住世圓覺經云末世眾生不了人我眾生壽命四相雖經多劫勤苦修道但為有為終不得成聖果是故名為正法末世又釋曰末世修證無相還同正法若正法中取證於相亦同末世也夫眾生由五陰妄想而成五濁如色陰堅固四大所纏有劫濁受陰虗明旋生異見有見濁想陰融通動搖妄情有煩惱濁行陰幽隱情隨業遷有眾生濁識陰顛倒眾塵隔越有命濁若五陰盡則超五濁又命濁連相以色心為體以摧年減壽為相眾生濁見慢果報立此假名惡名穢稱為相煩惱濁五鈍使為體三災為相見濁五利使為體諸見轉盛為相劫濁約四濁立此假名四濁增劇聚在此時也由五濁中造諸惡業生於三界欲界希須樂欲色界未出色籠無色界祇有受想行識四陰而無色陰此皆因果不忘有生有死如輪之迴轉無有出時又此三界不出身心及諸塵境為迷真性故即有濁辱生其妄氣者澄清微為無色界所謂心也澄濁辱為色界所謂身也散滓穢為欲界所謂塵境也古德云但內一不生則無諸有欲如是則三界五濁本自空寂廓然無際唯一真心耳又諸佛四無量心各有三種緣一者生緣緣一切眾生相二者法緣緣五蘊差別相三者無緣不緣前二相故是以佛行無緣慈為眾生說法自不見有佛道可成他不見有眾生可度故其所說法無說無示使聽法者無聞無得此佛之大慈悲也若於菩薩則修慈斷貪欲修悲斷嗔恚修喜斷不樂修此三者即住一子地若修於捨則斷貪恚及眾生相然今為後世眾生請說一味之法得決定真如實際與圓覺會中菩薩為未來末世眾生求大乘者請其意同也圭峯作疏引此一節以證頓為此經與末世凡夫便說究竟深法不同漸教中先小次權後方說實至若執漸迷頓者謂凡夫不合便悟佛地之法此不可以語頓也佛言善男子汝能問我出世之因欲化眾生令彼眾生獲得出世之果是一大事不可思議以大慈故以大悲故我若不說即墮慳貪汝等一心諦聽為汝宣說此贊可能問也夫順理者為善有剛斷者可稱男子出世之因即眾生本覺出世之果即諸佛始覺又稱始覺為本覺之果然始覺即是了因會緣方了故以六度行與菩提分法為緣因緣此以為因方能了故了者悟本覺正因佛性也據我宗門下學般若菩薩只將一句本參話頭為緣因又只在聞聲見色處便是了因所以香嚴聞擊竹靈雲見桃花與如來睹明星悟道一般故稱為從緣薦得永無退失也以故宗乘中只在日用邊繁興大用此真是轉八萬四千塵勞為八萬四千波羅蜜門是以從上諸祖或於棒下成等正覺或於喝下成等正覺或於言下成等正覺或於拈椎舉拂處成等正覺此真是圓頓法門今此經實乃通貫諸經中圓頓之理故曰是一大事不可思議前菩薩求佛慈悲而說法今佛即以慈悲轉讚菩薩之能問正顯主伴同德同心以大慈拔後世眾生世間之苦以大悲與後世眾生出世間之法樂又且明唯佛菩薩乃能知之然此中理極玄微實難言說雖然我若愛法不說即墮慳貪今翻慳貪而為喜捨故有此七品玅法真是無中生有愈出愈奇游心其間如觀海上蜃樓究竟無有一法可得持是經者當作是觀善男子若化眾生無生於化不生無化其化大焉此明無化之大昔曉法師論釋云初句牒能化後一句歎化大中二句明正觀相言無生於化者初修觀時破諸有相於幻化相滅其生心故其不生無化者復遣空於空於無化空亦不生心故如金剛般若四生九類皆令涅槃實無眾生得滅度者亦如淨名觀眾生如第六陰等為一切眾生說如斯法名為真實慈也觀此數語終成義學見解殊不知佛因解脫菩薩既欲令後世眾生平等同得解脫又恐其目前眾生之相未空心中度生之念不忘則令所化之眾生亦皆著於相念故先明化而無化之體乃曰汝若化於眾生無自生於能化之心若不生能化之心亦無所化之眾猶如天地長育萬物而不以為功則其化大焉如華嚴經云設一切眾生於一念中悉成正覺與不成正覺亦無有異何以故菩提無相無非相故即般若亦云若謂有一眾生得滅度即非菩薩此說方是明顯所以百丈祖師示眾云若道我能解能說謂我是和尚汝是弟子者個即同於魔說此真得於金剛三昧之義者矣令彼眾生皆離心我一切心我本來空寂若得空心心不幻化無幻無化即得無生無生之心在於無化此言轉化之法夫菩薩開化門以利生必當先破其無明不覺之妄根此只在心我二字然眾生之心是妄心而我亦是妄我約起信論中以依真如法故有無明為諸染因即是業相此從無明不覺一念心動而成以有無明染法因故即熏習真如故有妄心即是轉相此從一念之動轉成能見之相以有妄心即熏習無明不了真如法故不覺起念妄現境界即是現相乃依於能見故有此塵境妄現此以無明為因不覺而生三細又於此三細不知因心所現妄取染淨依境分別執以為常此即法執俱生名為智相又依前境而起愛憎念念不斷此即法執分別名相續相依於相續而妄執著計我我所此即我執俱生名執取相依於妄執分別假名此即我執分別名計名字相眾生依此四相而起於惑至於發動身口造一切業名起業相依業受報名業繫苦相此是境界為緣長六粗略而言之依於染心一念之動能見能現是為三細妄心取境念念不斷執我我所分別假名造業受報是為六粗此乃一切眾生妄心妄我之所由生也若唯識中止取熏習轉變而言謂以前七為能熏第八為所熏第八為能變第七為所變前七相見現行熏第八第八轉變相見二分種子前五能熏第八相分種第六能熏第八相見二分種第七能熏第八見分種故第八復變起前七現行此則前七為現識之因故頌云以展轉力故彼彼分別生也然其能取種種塵者悉由第八含藏前七種子念念受熏所以眼能見色乃至意能取法如外無六塵現行熏內無無明種子熏則眼等六識不生心分別於六塵矣由是觀之葢性之所以為性相之所以為相豈不歷然而分於斯耶但今佛之所說性相俱泯直顯真心然真心無相亦無實性無性無相是諸佛談心要訣無相則無妄我之可執無性則無妄心之可取既無執無取何有三細六粗及熏習轉變之過患乎如是則可令彼眾生皆離六塵緣影之心與四大幻質之我矣雖眾生以心為我義須知此一切虗妄心我其體本來空寂若得此空寂心體則知此心不同於幻化矣且余觀過去七佛偈皆發明幻化無相無生之義即迦文本師亦云幻化無因亦無生皆即自然見如是諸法無非自化生幻化無生無所畏其義亦同今此而言心不幻化則直指心體其意更深若人果能知此無幻無化之心體則一切法無生滅相之可得如是即得無生然無生之心者只在於無能化所化之心耳此章先開陳無生行品為心王菩薩問無生法忍之張本也解脫菩薩而白佛言尊者眾生之心性本空寂空寂之心體無色相云何修習得本空心願佛慈悲為我宣說此問修習之要發起本覺利品言心性體空者即眾生之本覺也得本空心者諸佛始覺乃本覺之利也佛言菩薩一切心相本來無本本無本處空寂無生若心無生即入空寂空寂心地即得心空善男子無相之心無心無我一切法相亦復如是此示心空之義然解脫問其體佛答之以相葢欲得心空先當明其相也如楞伽經云諸識有三種相謂轉相業相真相也夫不生滅者名真識而相名真相第八名業識而相名業相依無明力不覺心動故前七名轉識而相名轉相依於動心能見相故又此轉相有二若就無明所動轉成能見者在本識中若為境界所動轉成能見者在事識中此三種相是一切法相之根本而又通乎八識凡一起心即是轉八識皆起皆有生滅又心動即是業八識皆動又八之真性俱名真相故曰通乎八識又業相統於六粗轉相通於三細此業轉二相有二種生住滅而真相無生住滅也又諸識皆依相而轉展轉為因者也葢依真相而轉業相即第八識依業相而轉轉相即第七識依轉相而轉現相即前五識復轉現相而成六粗之相即分別事識此起信論中義若明此法相之根本一切過患不生當體空寂所以云一切心相本來無有本之可得此本亦無本之處所如是則其心空寂而無有生矣若心既無有生即入於空寂既入於空寂心地中即自得其心空之妙然此心空即是無相之心體而實無心之可取亦無我之可執也故禪宗有言心不空則不悟又曰但得心空境自空智者除心不除境又云若入我門來祇要將平生是非得失善惡取捨及見覺聞知與有無生滅等見盡底放下直放到無可放處自然直下頓證諸佛心體正所謂選佛場中心空及第此先開陳本覺利品無住菩薩我從無本來今至無本所而為張本也解脫菩薩而白佛言尊者一切眾生若有我者若有心者以何法覺令彼眾生出離斯縛此問離縛之法發起入實際義然前問修習從諸佛真如門立此問離縛從眾生生滅門起所言我者如起信中由第七內執第八為我又因真如隨緣而成第八因第八一轉而成能見為第七因第七而生前五識因前五復引生第六也若成唯識論以第七執第八見分為實我實法第六執第八見相二分為實我實法故曰六七二識深生計著又以我執必依法執起故曰六七二識二執俱生以先執法而為實有故有我執而施設我法如四大非我以為我緣慮生滅以為心此二是我執四大如幻本無而見為有緣慮生滅之相如影而執為實此二是法執乃眾生之四倒見因而有三界生死之縛只為以真我之本有迷而謂無妄我之本空執而為有也教中欲為眾生除此二執費若干言論其奈藥多病甚今時若有人問未審以何法出離只對他道快向父母未生前道取一句來若眼目定動劈脊便打他後自有透脫分佛言善男子若有我者令觀十二因緣十二因緣本從因果因果所起興於心行心尚不有何況有身此示因緣本空之義言我法本無皆由一念無明迷背自心妄執為有而以內識為因外境為緣相合共起祇於一念中具攝十二因緣法初因眼見色而生愛此即是無明心因愛造業是行此心專念是識識共色行曰名色六處生貪為入因入求愛是觸貪著心是受纏綿不捨為愛求所受法是取法從心生名有次第不斷為生次第斷為死又次第而成三世相續如無明行是過去因識名色六入觸受是現在果愛取有是現在因生老死是未來果又識名色六入觸受生老死是苦諦無明行愛取有是集諦即是見思二惑又名四住地煩惱四住者開思合見見惑為一思惑分三見惑為一者謂見一切處住地即是見三界八十八使然八十八使只從十使中出開見合思見八十八使思十使共九十八使妄計為身有身見執斷執常有邊見以見為是有見取執取邪戒有戒取以邪自執有邪見此為五利使眾生妄認四大為身即是身見知身是幻則身見斷身見斷則邊邪二取自除此四皆從身見起故又同於己法者則愛是貪非己法則嗔不知見惑即是集諦能招集生死是癡自謂我解他不解是慢猶豫不決是疑此為五鈍使然利使若去鈍使亦亡以其推利使方生故眾生因此十使驅役心神以致輪迴六道又此十使歷三界四諦下有增有減合為八十八使茲不及備舉須知此見惑從法塵起能障真性若見性明心則能截斷意根自不被其所驅使故見道斷見惑又思惑分三一欲愛住地即欲界有貪嗔癡慢九品思二色愛住地即色界四地三無色愛住地即無色界四地各有貪癡慢九品思祇除嗔習已斷九品上中下品每品具三故有九品共成八十一品此見思俱開見八十八使思八十一品總是三界九地中然此思惑從五塵起眾生因思惑為三界生死纏縛若見道復修道便於色聲香味觸永無繫思故修道斷思惑此二惑俱以無明為根本潤有漏業若以修道是務雖不求斷而見思自隕也若觀無明滅等是滅諦對治因緣方便是道諦苦集是世間因果道滅是出世間因果然別說名十二因緣總說即四諦開合異耳如聲聞聞佛聲教依四諦觀苦諦為初門緣覺緣十二因緣而覺觀集諦為初門菩薩以道滅二諦為初門又大涅槃經云此十二因緣法下智觀之得聲聞菩提中智觀之得緣覺菩提上智觀之得菩薩菩提上上智觀之得佛菩提是皆隨根器大小而得也然觀此因緣之法皆從無明不覺之妄心而以興起若妄心滅我見亦滅故曰心尚不有何況有身宗門則又不然汝今此身四大本空五陰非有心性假名將甚麼喚作我只消如此一問自然氷消瓦解若有我者令滅有見若無我者令滅無見若心生者令滅生性若心滅者令滅滅性滅是見性即入實際此言對治方便以明實際有我滅有無我滅無則有無二見俱不立矣然我見雖除而心法未泯若心生則法亦生心滅則法亦滅以故心若生即滅生性心若滅即滅滅性如是則斷滅二性亦俱不存矣若滅此有無二見生滅二性則心同虗空身等法界而入於實際矣此與入實際品為張本也何以故本生不滅本滅不生不滅不生不生不滅一切法相亦復如是此徵明實際之義葢本生自不滅者謂其性真常無滅可滅也本滅亦不生者謂其性空寂無生可生也如此則一切法相莫不皆然既不滅亦不有生既不生亦不有滅而性相如如之體固如是也音釋摧摧上聲折抑也劇音極尤甚也滓音子濁也恚音惠怒也蜃辰上聲大蛤也雉入海所化能吐氣化為樓臺牒判也豫音裕猶豫獸名性多疑者隕音允亡也墜也
