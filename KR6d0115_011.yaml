body:
  text: 天台山華頂嗣祖沙門𧧌震述總持品第八之上此為滿覺分謂覺行圓滿而能總持眾法為一經之樞紐也且夫此經如無相法發明第六地無生行發明第七地本覺利發明第八地入實際發明第九地真性空發明第十地如來藏發明等覺地至此品地藏菩薩當機分明顯玅覺果滿然玅覺原不離前六品法所以云諸佛始覺即是眾生本覺本覺為因始覺為果又前品為等覺因圓此品是玅覺果滿又因行果行終始同源以明生佛共有根本智體故即參合融會前六品法以成佛果玅行也又總者徧攝之義持者操執不捨又具能所二義能持如地所持如藏又離能絕所如地之持物含育萬有如地之能藏人法兼攝其義有此然地藏菩薩本是華嚴會上法身大士又嘗問佛十地法門名地藏十輪經又占察經中佛言地藏菩薩發心已來過不可思議阿僧祇劫久已能度薩婆若海功德滿足但依本願自在力故權巧現化影應十方且於五濁惡世化益偏厚從十一劫來莊嚴此世界成熟眾生唯除知來無能過者又於此世界所有化業唯除遍吉即普賢觀世音其餘諸大菩薩皆不能及今以玅覺自任為眾決疑故廣申其問耳今池州九子山俗名九華有地藏菩薩姓金乃新羅國王之裔唐至德初來此示現成大伽藍至年九十九而入滅乃是菩薩之應化身也爾時地藏菩薩從眾中起至於佛前合掌胡跪而白佛言尊者我觀大眾心有疑事猶未得決今者如來欲為除疑我今為眾隨疑所問願佛慈悲垂哀聽許此菩薩為眾決疑求佛聽許也其請法之儀同於解脫菩薩者葢明初後不移之意從眾中起以明無有特異也至於佛前表玅覺行周果滿直達於佛道也心疑未決等覺未至於玅故猶有疑耳然佛本欲為後世除疑菩薩亦是為眾生決問願佛之聽許也佛言菩薩摩訶薩汝能如是救度眾生是大悲愍不可思議汝當廣問為汝宣說此佛之允可也已下所問乃收前六品中之法以合明之地藏菩薩言一切諸法云何不緣生此問法不緣生以收無相法品中善知一切從本不生之義爾時如來欲宣此義而說偈言若法緣所生離緣可無法云何法性無而緣可生法此明法非緣生若乃一切法從緣所生離緣則歸散滅而可無其法矣此則是生滅法云何可以法性本無非生非滅而謂之緣於可生法耶爾時地藏菩薩言法若無生云何說法法從心生此問法從心生以收無生行品中法本無生之義意謂法若無生應無說無示今者如來云何說法又說法從心生耶於是尊者而說偈言是心所生法是法能所取如醉眼空華是法然非彼此明法本無生言向者為眾生迷本無生欲令其明心所生法故說法從心生乃隱實施權而不知法從心生則屬能所二取猶如醉眼之見空華而非實有是皆不得已隨眾生所見且欲因邪打正然今此云法本無生正是廢權顯實然非同於彼之所說也爾時地藏菩薩言法若如是法則無待無待之法法應自成此問法應自成以收本覺利品中一覺者不毀不壞之義於是尊者而說偈言法本無有無自他亦復爾不始亦不終成敗則不住此明法離對待凡有無自他始終成敗皆對待法也若本來無此有無二法自他之相亦無亦不有其始亦不有其終又何成敗之有故曰成敗則亦不住矣爾時地藏菩薩言一切諸法相即本涅槃涅槃及空相亦如是無是等法是法應如此言法應是如以收入實際品性本涅槃性相本如之義謂一切諸法生滅之相即本涅槃寂滅之相又涅槃相及空相亦然空即是涅槃涅槃即是空若併無寂滅與空等法可得是法應合於如矣佛言無如是法是法是如此印成如義言若無寂滅與空如是等法是法真是如矣地藏菩薩言不可思議如是如相非共不共意取業取即皆空寂空寂心法俱不可取亦應寂滅此言寂滅即如以收真性空品如相諸相已寂滅寂滅即如義謂如是如相中非共相不與生滅法共故非不共相言非離生滅而別有法又非意之能取亦非業之所取即此不離而皆得空寂併此空寂心法俱不可取亦應寂滅此乃是真時空品羅紋結角處於是尊者而說偈言一切空寂法是法寂不空彼心不空時是得心不有此明心法不空義言一切空寂之法是法雖寂而本不空若彼諸眾生知自心之不空是即得於自心之本不有也爾時地藏菩薩言是法非三諦色空心亦滅是法本滅時是法應是滅此揀問法應斷滅以收如來藏品常法中之義但恐後世眾生作斷滅見故反作此問夫三諦者一真諦二俗諦三中道諦又配三止觀及三種如來藏一者體真止止於真諦謂體無明顛倒即實相之真又即是奢摩他此云止乃寂靜之義即真空觀會色歸空觀真空理破一切有空非空故曰真空即空如來藏也二者方便隨緣止止於俗諦以實相徧一切處隨緣歷境安心不動又即是三摩提此云等至一云即三昧乃觀照之義即玅有觀明空即色建一切法觀玅有理有非有故曰玅有即不空如來藏也三者息二邊分別止止於中道謂生死涅槃靜散休息又即是禪那此云思惟修又曰靜慮即中道觀中道即指一心真俗俱泯色空無礙故即空不空如來藏也又云即慮而靜非散亂是定即靜而慮非無記是慧定慧通明為禪即寂照不二之義又三觀之體即是一真法界如來藏心故具攝三如來藏義又諦者理歸實際止者諸漏永盡觀者明一切法又一念無相是空無法不備是假不異不一是中今此云是法非三諦色空心亦滅謂前如來藏品中如來所說常法非同於三諦之理然曰色曰空曰心本亦皆滅若言是色空心等法本來是滅則如來說是常法亦應是滅矣意謂何故乃曰若得寂滅即得於阿耨菩提耶於是尊者而說偈言法本無自性由彼之所生不於如是處而有彼如是此明性非是滅言如來所說常法本無自性由彼色心妄緣之所生起若不住於如是色心妄緣處而何有同彼如是色心妄緣之永滅耶已上於前六品中法每品舉一節問答竟後再舉前六品中義以申明之爾時地藏菩薩言一切諸法無生無滅云何不一此申諸法不一之問又收無相法品若無思慮則無生滅中之義也言諸法皆融會於無生無滅云何又不能歸一而有種種名相法數耶於是尊者而說偈言法住處無在相數空故無名說二與法是則能所取此言名說幻立夫法性住處但有名本無在所其相數本空但有說故亦是無然因法性之名相數之說此二與法性相緣因是則有能取所取法相森然而生矣爾時地藏菩薩言一切諸法相不住於二岸亦不住中流心識亦如是云何諸境界從識之所生若識能有生是識亦從生云何無生識能生有所生此問無生識義又收無生行品末那阿梨耶之義言一切法相不住二岸不住中流實無三際之可得至若眾生心識亦不住於三際云何而言一切境界從識之所生也又云若謂識能有生於諸境是識亦從境之所生矣若然者云何無生識而有能生所生耶於是尊者而說偈言所生能生二是二能所緣俱本各自無取有空華幻此先明能所之幻夫所生是境能生是識總為八識相見二分是二能所皆因七識妄執為緣俱推其本亦各自無若眾生取此而為實有者其猶空華之幻生矣識生於未時境不是時生於境生未時是時識亦滅此明識境有異言識生於未時者猶言識之未生已前也然識之未生前其境決不同在是時而生也境生於未時者猶言境之未生已前也然境之未生前是時識性亦本自寂滅也此答若識能有生是識亦從生二句彼即本俱無亦不有無有無生識亦無云何境從有此明識境俱無言以彼識境觀之即此是識境之本然二俱是無亦乃不有於無之與有須知為度眾生權立無生識之名究竟本亦是無云何而言境乃從識而有耶此答云何諸境界從識之所生二句宗門先德有言佛說三界唯心萬法唯識祇為外道不信自心者說正合此意修鍊之士以識神出入名為得道首楞嚴云是皆別修妄念存想固形總成飛昇變化斯亦輪迴妄想流轉耳然以虗無寂寥為道忘情絕智為修是執八識空昧之體又云恍恍惚惚其中有物杳杳冥冥其中有精此但認於識神而昧乎一心矣夫既不即一心而為道則道非我有苟不即諸法是心則法隨異見所以古德云學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來身今之以識神出入為修鍊之極功者不亦愚乎爾時地藏菩薩言法相如是內外俱空境智二眾本來寂滅如來所說實相真空如是之法即非集也此言非有採集以收本覺利品中猶有採集之義言法相如是即指本覺利品入佛智地一段精義也此中內根外境俱為空寂不必言矣至於眾生之塵境與諸佛之智地二種眾多法相本來亦自寂滅所謂智與境而俱泯此即是如來所說實相真空如是之法即非有所採集也楞伽經云採集業為識不採集為智疏云採謂採取集謂招集以根對塵而生取著起善惡業招集生死是為識能了根塵絕待物我兩忘不生取著是則為智矣佛言如是如實之法無色無住非所集非能集非義非文一本科法深功德聚此釋成非集言真如實際之法本來清淨故無色不著處所故無住非所集外境空故非能集心識空故非義不可詮表故非文言說不及故即此一本科法真乃超出世間為淵深功德之聚矣本科二字即前如來藏品中大義科葢以本識為科目而統攝大義等法也地藏菩薩言不可思議不思議聚七六北藏誤作七五不生八五北藏誤作八六寂滅九相空無有空無有無空無有如尊者所說法義皆空入空無行不失諸業無我我所能所身見內外結使悉皆寂靜故諸願亦息如是理觀慧定真如尊者嘗說實如空法即良藥也此明法義皆空又收入實際品中七六不生一段義也不可思議不思議聚此二句讚入實際品中心如空法之玅七六不生者七識與六識同一比量有為法中收有為本有生滅今住於無為則不生矣八五寂滅者八識與前五識同一現量無為性中收無為則本自寂滅故言八五寂滅而北藏中誤作七五不生八六寂滅葢不知入實際品中先有七六不生一句在焉則其傳寫之誤明矣九相空無者第九識相其體本自空無然此空無二字亦是假名詮表何故名雖有空無二字皆因詮表而有其實此中原無空無二字詮表之有也如尊者與大力菩薩所說法義皆空入於空無行相中則空有不空義故雖空無而不棄失諸善法業抑且能斷諸有漏如七識執第八見分為自內我然見非真我既妄為我即生我所唯識取喻如王臣謂王之所至臣即隨至既有所即有能能者從內根起能見聞知覺所者從外塵起著見聞知覺之所也能見為我所見為相又因有我身即有身見有身見即有內根外境九結十使等迷覆真性今但破其我見則一切法俱破故曰無我我所能所身見內外結使悉皆寂靜夫如是則上無攀仰下絕己躬無道可成無生可度即得無願解脫故曰諸願亦息如是理觀之中慧定真如之法無不圓具尊者嘗說實際法中心如理淨諸法空相今我諦思此中心與理以相符即所謂度生之良藥也佛言如是何以故法性空故空性無生心常無生空性無滅心常無滅空性無住心亦無住空性無為心亦無為空無出入離諸得失陰界入等皆悉亦無心如不著亦復如是菩薩我說諸空破諸有故此印成空義又以空性發明心如之理也夫法性同於虗空即以虗空為喻故曰虗空之性無生無滅無住無為亦無出入得失之相亦無陰界入等然虗空之性無可取著而心如之理亦無可取著法性本空亦不可取著且能隨順一切法而為建立猶如虗空體非群象不礙群象發揮其空性之義如是後又申明藥病對治之言正答即良藥也一句葢因眾生躭著於有故為說空若其有既破則空亦不立矣此即真性空品中義也地藏菩薩言尊者知有非實如陽𦦨水知實非無如火性生如是觀者是人智也此言實智非無乃真性空品末之性空智海亦即是如來藏品中四智之義如梵行長者偈云若說法有一如𦦨水迷倒若見於法無如盲無日倒今此謂眾生皆執迷為有若能知有是幻本非是實如陸地之生陽燄知非是水此如來說空破有之義也其有既破空實不空以眾生自性中各各具有真如種子此即是如來藏然離自性亦無真如離真如亦無如來藏若捨生死亦不能見真如故勝鬘經云依如來藏故有生死故有真如以如來藏即生死門之真如也若能悟自性真如而入於如來藏中是則知實非無如火性生於木中此喻先已出於無生行品然知有非實乃隱實以施權此知實非無則廢權而顯實若能作如是觀者是人亦可謂之智者也佛言如是何以故是人真觀觀一寂滅相與不相等以空取以修空故不失見佛以見佛故不順三流於大乘中三解脫道一體無性以其無性故空空故無相無相故無作無作故無求無求故無願以是業故淨心以心淨故見佛以見佛故當生淨土菩薩於是深法三化勤修慧定圓成即超三界此印成重釋佛言是人得入真如觀中觀一寂滅性而於目前一切相上及不在相上者皆得平等以空而為取用若空一切相即一切心覺一切心即覺自心覺自心故即明見佛性故曰以修空故終不失見佛之利此是地中之因然以求見於佛故決不隨順世間三有之遷流而於大乘中能順入三解脫道此即入實際品中虗空解脫金剛解脫般若解脫也亦即是前六現前地行相如六地中知自性空無作無受即得空解脫知自性滅無法相可得即得無相解脫入空無相無有願求即得無願解脫乃至得百千空無相無願三昧門又此空無相無願即是法身解脫般若為涅槃三德祕藏也今此三解脫道正發明此義如經云一體無性以其無性故空空故無相無相故無作無作故無求無求故無願然前如來藏品中以空無相無作為三三昧菩薩自六地至十地皆依無作門建立一切諸行又菩薩皆依無作四諦所謂陰入皆是如無苦可捨煩惱即菩提無集可斷邊邪皆中正無道可修生死即涅槃無滅可證觀一切法如虗空等正是諸地中行相然菩薩發四弘誓願修六度行若不行六度其願則虗故雖行而入於空無相中本不著於行此以無作而作者也如是則無求而求無願而願皆依於無作故但言無作而無求無願之意含攝其中矣然以此無作行業故得清淨心以心清淨故即見佛前不失見佛是因此心淨見佛是果今覺心清淨即真見佛性既以見佛故當生淨土乃心淨而土亦淨也於是甚深之法三種化門精勤修習即修前空無相無作三解脫門也修此三者自然慧定圓成般若是慧解脫是定慧定均等圓成法身三德具足即超三界此又結最初解脫菩薩求出三界之問地藏菩薩言如來所說無生無滅即是無常滅是生滅生滅滅已寂滅為常常故不斷是不斷法離諸三界動不動法於有為法如避火坑依何等法而自訶責入彼一門此言真常不斷結明如來藏品中所說常法之義葢無生無滅為對生滅而言一涉對待即是無有其常矣若滅是生滅直下令生滅二見滅已更不復生得住於寂滅乃真為常矣得此真常寂滅乃是不斷滅法是不斷滅法能出離三界動不動法言動者即一切世間法相言不動者即二乘禪定此皆住於三界皆是有為法中收當觀於有為如避火坑方不被其焚陷此乃當時回顧在會大眾而言後又回身向佛而問意謂世間一切見覺聞知凡有名相盡是有為之法離此則無可修習矣今者當令後世眾生依何等法而自訶責入彼一門此言化門有三先當從一門而得入也佛言菩薩於三大事訶責其心於三大諦而入其行此先示事諦修治之要地藏菩薩言云何三事而責其心云何三諦而入一行此乃申問其名義也佛言三大事者一謂因二謂果三謂識此示三事之名夫眾生以緣業為因受報是果如無明緣行是因生老病死是果此因此果是皆依識而有也如是三事從本空無非我真我云何於是而生愛染觀是三事為繫所縛飄流苦海以如是事常自訶責此示訶責之義若以如是三事返而觀之則識心非實從本空無皆由無明不覺妄生分別而執為有此實非我之真我也云何於是以識心妄取而生愛染復更深心觀察三事須知皆為心之繫念不斷遂被所縛以至飄流入於苦海當以如是訶責其識心是為初學之要訣也菩薩最初緣無量四諦而發四弘智願觀苦諦有無量相知十法界業報不同故發度眾生願觀集諦有無量相知五住地煩惱不同故發斷煩惱願觀道諦有無量相知河沙佛法不同故發修諸法門願觀滅諦有無量相知諸波羅蜜不同故發成滿佛道願此正明菩薩法又教中分四種四諦隨眾生根器進修如聲聞依生滅四諦而修佛又進之以無生四諦言苦無逼迫相集無和合相道無二相滅無生相菩薩緣無量四諦而發心佛又進之以無作四諦也生滅無生二種唯行六波羅蜜無量無作二種統攝十波羅蜜此優劣之所分也今佛作此最後明誨仍是最初無相法品中觀十二因緣之義以明初後不二位位頓超不由階級而漸通漸入者也三諦者一謂菩提之道是平等諦非不平等諦二謂大覺正智得諦非邪智得諦三謂慧定無異行入諦非離行入諦此復示三諦入行之法一者言應知菩提道法即生佛共有平等覺性故曰是平等非不平等也二者言此菩提之道必當得大覺悟如佛入正三昧覩明星廓然大悟成等正覺是也此是得諸佛正智之諦以正揀邪故曰非邪智所得三者言此大覺正智不出慧定二學如二乘外道皆有定無慧因先得定而慧不行菩薩先以慧淨治其心而定在其中矣既慧且定即得金剛心地戒體故雖不言戒而戒體無不圓成故佛為二乘初學先說防非止過守護威儀於大乘中唯以應為最定亦次之所以不言定慧而言慧定除此慧定別無他行故曰無異行而入亦非離於慧定二行而可以入也以是三諦而修佛道是人於是法無不得正覺得正覺智流大極慈己他俱利成佛菩提此結成正覺然此雖云三諦究竟只是一諦若能以是三諦而修於一佛道者我說是人於是法中無有不得其正覺者也若得此諸佛正覺之智則流入於大乘三解脫中興無量慈自他俱利而成佛菩提之道矣有本以大極慈三字作句於義未妥必當以流大極慈作句為是極者即無量也音釋操草平聲操守裔以制切惚音忽恍惚不定也妥唾上聲安怙也
