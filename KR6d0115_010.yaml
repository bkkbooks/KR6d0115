body:
  text: 天台山華頂嗣祖沙門𧧌震述如來藏品第七此為實智分菩薩得此實智則證於如來自性清淨藏矣夫如來二字具體用二義自性之體即是如自性之用即是來藏者一隱藏真性故二含攝衆德故三出生正智故有是三義故稱為藏如經云佛以二乘諸地惟斷捨六識證於我空不知識藏甚深微細之相又不知識藏即如來藏如來藏從性上立名識藏從相上立名由前七藏起生滅慮知等相過惡熏習故如來藏即轉為識藏是性變而成相若不受過惡熏習則此相原是如來藏性何有轉與不轉蓋因前七識生而識藏生若前七識滅而識藏自轉以如來藏性寂不動故所以云寂滅者名為一心一心者即如來藏又云如來藏入於一切衆生身中本無有我亦不見有生滅之相一切二乘皆以心想見如來藏此以心見心不知反為心想動亂之所染污又何能見哉又云即至等覺猶如隔羅縠見月尚有微礙若欲勝進滿足如來地當淨如來藏中識藏之名以故有名相妄想正智如如五法此五法只在寂滅此一心則五法自淨五法淨則識藏淨識藏淨則如來藏顯又隱為如來藏而顯即為法身故又謂之在纏法身又勝鬘經說空如來藏不空如來藏今以此經較之悟法本空是空如來藏真空不空是不空如來藏一切法本空本不空是空不空如來藏然此是如來所證清淨境界證此即證淨法身與毗廬遮那同體然毗盧本體不涉修證一切衆生本自具足由是之故當寄位於凡又前品既是舍利弗以滿地自任今此若不得長者當機後世又將謂此是十力大弟子所能而非居塵者所堪任也以故梵行長者更不捨俗趣真即從本際起而住於諸佛智地發明如如正智之義如此按華嚴十地品後當說等覺法名曰佛華品瓔珞經云吾先於第三禪中說一生補處菩薩入佛華三昧說十一地等覺位中行普賢行入俗利生之門有百萬億偈合論云第七會在三禪天說前十地法超化樂於他化天說之等覺法越二禪於三禪天說之以初禪離憂二禪滅苦三禪惟是法喜禪悅妙樂依此說十一地表進修功成迥超諸苦常亨法樂也謂之佛華者初登佛地果行未滿又華對果而言等覺是佛華妙覺是佛果決疑論云此佛華品令十地菩薩入普賢行令十地菩薩捨涅槃三昧上煩惱稠林方始入普賢行門蓋為普賢是修入世間同衆生行前十地菩薩是出世間成佛之行和會此二行令處世間自在故但今華嚴大經尚闕佛華一品諸師疏注中皆言之今此如來藏品即是佛華品之義以長者當位即是入世間同衆生行信不誣矣又此品實因無相法品中之義而發起也爾時梵行長者從本際起而白佛言尊者生義不滅滅義不生如是如義即佛菩提菩提之性則無分別無分別智分別無窮無窮之相惟分別滅如是義相不可思議不思議中乃無分別此從本發明如智之義然此長者聞無相無生以及真性空義已得深契法旨至此忍俊不禁獨任頓超佛地之職故從本際而起本際者即一切衆生無礙涅槃之性也然即承上偈義而言曰如佛所說如實所生之義本不有滅若因緣所生乃是滅義本不是生以此觀之得如是如義即為佛果菩提矣然佛以一切法空說為法界即此法界說為菩提今此菩提之性本同於法界則亦無有分別此即是如來藏性常自清淨一切衆生在諸趣中不知煩惱身中有如來藏性本無污染德相具足如佛無異而反依煩惱種子獨頭無明即是意識中為因取六塵境界為緣於是心意意識妄生種種分別由心及心所遂執我及我所而我我即人也法二執俱生二乘但得人空證人無我未得法空故由前七識執取自相共相而生陰界入等因緣生滅之法故有名相妄想正智如如五法約修證而言非正智不能契如如當先智而後如若約法體上說如如是體了知名相皆空離諸妄想諸識不生是為如如若乃正智則為用蓋由證此如如實相能隨順覺性一切心識所不能緣是為正智然非如如亦不能得正智必以如如智而契如如理此即自覺聖智所證境界即名無分別智但衆生由前七識而起種種分別故能分別者識也諸佛達無分別義故名為智然得無分別智則能分別衆生心識中無窮微細之相然分別此無窮之相惟欲令衆生心中分別之識滅盡無餘而已如是如實之義無窮之相真是不可思議而此不思議中實乃無分別之可得也分別有三種一自性分別二隨分分別三計度分別然自性分別乃第八識中現量境界任運自然分別所云現者謂現在即現不待他時又現前即見不在他處量者是決定之量也尊者一切法數無量無邊無邊法相一實義性唯住一性其事云何此因義發問言一切法相之數總攝於一實義性今我唯住此一性中其事又當說於何等耶前乃先言如而後言智又先言性而後言相此則攝相歸性故先言法相而後言性然性不外乎相相不離乎性其實性相本不二也但衆生說性便著於性說相便著於相故於性相上又轉出一事字來即從佛口中所說是一大事及如是一事上得來如宗門中開口便說若論此事又云目前事向事上薦則疾意根下卒摸索不著所以絶不說心性禪因衆生著於心性道理則不能發悟故今云其事云何而性相亦俱泯矣佛言長者不可思議我說諸法為迷者故方便導故一切法相一實義智何以故譬如一市開四大門是四門中皆歸一市如彼衆庶隨意所入種種法味亦復如是此設喻印成以明權實言我說諸法為衆生真如不守自性隨緣遷變迷其本故乃以方便權巧而導引故故說一切法相及一實義智譬如一市而開四門四門皆歸一市市者即城市也令衆庶隨其意之所便而入佛今亦然因衆生利鈍不同故以方便權立三乘乃有種種法味及其究竟終歸一實義智也梵行長者言法若如是我住一味應攝一切諸味此言一攝一切而自陳己解也佛言如是如是何以故一味實義如一大海一切衆流無有不入長者一切法味猶彼衆流名數雖殊其水不異若住大海則括衆流住於一味則攝諸味此以法合喻印成其解凡佛之設喻必法喻互顯先以喻顯法後必以法合喻前之譬如一市以喻顯法也此一味實義是以法合喻也此總明一攝一切義梵行長者言諸法一味云何三乘道其智有異此揀問三乘智異之疑佛言長者譬如江河淮海大小異故深淺殊故名文別故水在江中名為江水水在淮中名為淮水水在河中名為河水俱在海中唯名海水法亦如是俱在真如唯名佛道此以喻顯同夫衆流入海已失江淮河水之名衆法歸如已亡三乘小始之義唯一佛道更無餘乘得此一味諸味具攝故涅槃經云有人入大海中浴已用一切諸河之水又云如持萬種香為丸但燒一丸衆香皆具足矣長者住一佛道即達三行此示名梵行長者言云何三行此問義佛言一隨事取行二隨識取行三隨如取行長者如是三行總攝衆門一切法門無不此入入是行者不生空相此發明三行言住一佛道方得通達何也菩薩既等於覺住金剛心中則目前一切事相皆隨順覺性指月拈華頭頭是道此隨事取行也衆生由前七識起諸現行轉如來藏而為識藏故有顛倒妄想菩薩住金剛心中得無分別智分別一切微細識相令滅知三界萬法唯心唯識則世間一切識心皆隨順覺性應緣遇物處處明宗此隨識取行也衆生為妄想生滅剎那剎那前念滅後念生新新不住相續而起菩薩住金剛心中念念清淨動靜俱離則於一切諸行雖或從因從緣而起皆隨順覺性當處出生隨處滅盡雖云生而無剎那生相可得即滅而無剎那滅相可得所謂我為法王於法自在此隨如取行也然此三行本不離衆生尋常日用中衆生隨逐妄念即成八萬四千塵勞煩惱諸佛隨順覺性則成八萬四千解脫三昧門所以云如是三行總攝衆門一切法門無不從此三行而入設或無此三行則撥置一切事相斷捨一切識心離於一切諸行而惟住於一切法空則佛法成世間無用之法而佛果乃為寂滅無為之佛又何有接物利生之法施以嘉惠於當世乎所以必當入此三行方不住於空相始有利生分故曰入是行者不生空相湛師注云此句乃舉一略二應云不生空相不空相空不空相然勝鬘經但云有二種如來藏空智所謂空如來藏脫離一切煩惱藏不空如來藏具過恆沙不思議佛法論中亦說如實空如實不空義楞伽中祇云如來藏而已但其義有空不空非空非不空三法今此云不生空相即是空不空如來藏義似亦不必更重出二句矣然三行即三身隨如即法身隨識即報身隨事即應身也如是入者可謂入如來藏入如來藏者入不入故此結成入如來藏之義謂如前入於三行隨取而行則於世出世事事無礙處處通達心心自在法法圓融如是可謂入如來藏然雖云入而本不有所入也論釋云在有情數中名如來藏在非情數中名法界性此即智論中佛性法性之說然華嚴初會中普賢菩薩入如來藏身三昧出生一切諸三昧法又第六會十地品金剛藏菩薩說法雲地菩薩種種無量神通智力大衆皆疑於是金剛藏入一切佛國體性三昧時會皆見自身在金剛藏身中又見其中菩提樹師子座上有佛號智通王諸相莊嚴說不能盡論云一切佛國體性即無作法性身菩提樹即法性中覺體智通王即法性中妙智也人人本具惟不自加行故不得顯發耳蓋此二種三昧即本如來藏法界性中所示現者也梵行長者言不可思議入如來藏如苗成實無有入處本根利力利成得本得本實際其智幾何此贊法領解復咨智益言我今已知如來藏性衆生本自具足非從修得如苗無異只因妄想執著所迷覆故今惟去其妄執而返其本非外有所得如禾苗之成實耳只此一句是喻此即承上入不入故一句而言謂入如來藏本無有入處今以兩句中插入如苗成實一句以明其意也又言此如來藏即衆生本覺之根源必得始覺之利為力若始覺之利已成而後乃得衆生自覺之本性矣但得此本有覺性之實際不審其智有幾何耶佛言其智無窮略而言之其智有四何者為四一者定智所謂隨如二者不定智所謂方便摧破三者涅槃智所謂慧除電覺四者究竟智所謂入實具足道此示四智之義謂其智無窮略言有四一定智令衆生得諸佛平等體性隨順於如一切自在二不定智令衆生得諸佛善巧智用隨機適宜摧破諸障三涅槃智令衆生得諸佛始覺本智凡有一切無明之惑以慧除之如夜見電光即得見道此二句出遺教經中又別載電光三昧謂初心聞法乍解如暗夜電光乍見山川人物頃爾還暗然亦因此得辨前境此是教乘中說宗門又且不然如德山和尚云有言時據虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂又巖頭禪師云此是向上活計只露目前些子如同電拂如擊石火臨濟大師又云大道絶同任向西東石火莫及電光罔通所以有三要印開朱點窄未容擬議主賓分之語此等俱是電覺三昧亦即是剎那際三昧如華嚴會上將說十定品明等覺因圓而如來入剎那際三昧示生佛共有根本智體無古今延促始終遷動之相又如來八相成道乃至入滅皆不離剎那際三昧又阿難入電光三昧斷最後思惑亦名金剛三昧教中云金剛三昧喻小乘無漏之智此應是錯蓋不知阿難最後已入大乘實智地中矣由是觀之從上佛祖出世皆以此自覺覺人所謂得涅槃根本智也四究竟智令衆生究盡諸法實相之義入於實際具足諸佛之道也定智即平等性智不定智即成所作智涅槃智即妙觀察智究竟智即大圓鏡智前三行即是三身由三身而發明四智如曹溪六祖示僧智通云清淨法身汝之性也圓滿報身汝之智也千百億化身汝之行也若離本性別說三身即是有身無智若悟三身無有自性即名四智菩提聽吾偈曰自性具三身發明成四智不離見聞緣超然登佛地又教中說轉識及智然六七因地中轉五八果位上轉但轉其名而體未嘗轉也又云空六識我法得入初地空七識我法得入八地空八識法執得入佛地以分別我法二空智觀察俱生名相妄想證俱生我法二空智乃得入等妙二覺後地藏菩薩言是人智也收此中之義長者如是四大事用過去諸佛所說是大橋梁是大津濟若化衆生應用是智此結示先佛遺範以智利生也轉智字而作事用者蓋目前一切皆是事用衆生總被事用所轉鹿鹿空過豈止一生若棄却一切事用則又墮於二乘無為坑穽所以佛祖出世利生只貴在目前事用上發明其自性之智而已言大橋梁大津濟者為三賢十聖所同登上智下愚而共涉此乃等覺入妙覺之利生智用也長者用是大用復有三大事此補示三事然應在四智之前今逆推而上以補明之上用字指能用之人下用字即所用之智今又稱為大用者謂大智之人所能用也此即宗門所云大機大用然自馬大師始有大機大用之名如百丈得大機黃檗得大用至今稱之夫機用而謂之大者不住於一事一法其中有權實有照用有收放開合一一縱橫任運自在無礙者也今前四智皆顯目前機用泄盡言說所不及處真足當大用之稱然佛真是婆心為人恐後世衆生聞此智用便生狂解故復申此一救謂若欲用此四大智用以利生復有三大事必當行之於先而後可也一者於三三昧內外不相奪二者於大義科隨道擇滅三者於如慧如定以悲俱利此約示其義三昧此云正見正定若住於正見則內心空寂能以智觀照住於正定則外境寂滅能以定自持如是則心不住境境不住心心境俱亡而內外不相奪此即是慧定二學大義科三字釋義詳見後謂於一切色心諸緣隨衆生所行之道而為其揀擇斷滅蓋即前品中作擇滅力取緣此是戒學夫戒是正順解脫之本又為三無漏學之首佛昔因事制戒防非離過故有毗尼藏此云滅能滅衆生過故又翻為律乃從法得名又五分法身始以無作戒為戒身其次無漏禪為定身無漏智慧為慧身三解脫為解脫身無生為解脫知見身又此五分即轉五蘊所成故戒定慧是從因顯德解脫解脫知見乃就果彰能今此隨道擇滅即攝律儀戒然因戒生定因定發慧故隨後即云如慧如定夫如慧者不離智照分別法義而方便調機也如定者攝心靜慮不起寂滅而現諸威儀也果能如是則以悲運用自他俱利矣如是三事成就菩提不行是事則不流入彼四智海為諸大魔所得其便此揀除魔便謂戒定慧三缺一不可具如是三事即成就菩提若不行是事便不能流入彼四智海而斷於慧命矣既斷佛慧命則必為諸大魔所得其便蓋深言後世衆生若不務三學而自恃狂解者其害有如此不可不自慎也昔天魔波旬常欲破壞正法至佛滅度後二百年值西天第四祖優波毱多尊者法化遠被振動魔宮於時波旬乃伺尊者林中入滅盡定即持瓔珞縻尊者頸尊者知魔所為從定而起取人狗蛇三尸變成華鬘軟言諭波旬曰吾以華鬘酬汝瓔珞即以神力而繫其頸須臾尋復為三尸蟲蛆腐壞臭不可聞盡其魔力莫能除去即升忉利求帝釋又求梵天解除僉曰此十力弟子所作神變我輩凡陋何能去之波旬曰然則奈何梵王曰如人因地而倒還從地起離地求起終無其理波旬聞已還至尊者所禮足悔過以求免脫尊者即與要誓云汝從今以往乃至法盡能更勿來我佛法中生嬈害乎波旬曰我當誓向佛道尊者曰若然汝可自唱歸依三寶波旬合掌三唱三尸悉除遂踴躍作禮且嘆曰我昔種種惱佛佛竟不報我尊者曰吾佛大慈大悲而汝不知妄生惱害耳從此波旬斂迹實由尊者降伏之力所致也長者汝等大衆乃至成佛常當修習勿令暫失此垂誡修習三學是因成佛是果因該果海果徹因圓直至妙覺究竟不離於三學也梵行長者言云何三三昧此問其名數佛言三三昧者所謂空三昧無相三昧無作三昧如是三昧此重為釋名然菩薩在第六地中即得此三種解脫門若依次增進修行不必重說只因此經中位位頓超又恐妄自躐等故不惜重言之也梵行長者言云何於大義科此又補問未明佛言大謂四大義謂陰界入等科謂本識是為於大義科此示大義科夫身中堅相為地潤濕為水暖氣為火動轉為風此名四大陰即五陰界即六根六塵六識共為十八分別辨析各有界畔入即內六根對外六塵有交互涉入之義本識即第八識一名本覺識此等總名為色心諸緣因衆生執身為我故說四大迷於自心故說五陰為色塵等所迷故說十二入因色心俱迷故說十八界因二乘外道不知識識微細之相故說本識皆隨其所行而為其揀擇斷滅以成戒學夫三學成就方可用四智利生此如來金口所出之明訓也梵行長者言不可思議如是智事自利利人過三界地不住涅槃入菩薩道如是法相是生滅法以分別故此揀分別之過先贊而後揀也雖然若粗讀去竟不知此為揀過語蓋言佛雖說如是四智三事若菩薩自謂我能自利利人我能超過三界之地我能不住涅槃入菩薩道為利他故方便智巧扶習潤生如是則又生於法相仍是生滅之法以其起於分別之心故也若離分別法應不滅此明離分別智言一切事用法相皆是空無相無作不可以識心而生分別若離於分別之法則應住於不滅而歸於實相矣此深明佛意故有是言耳後地藏菩薩又補問法應不滅之義於後云爾時如來欲宣此義而說偈言此敘述佛意印成其解并結前所問一味攝諸味義法從分別生還從分別滅滅諸分別法是法非生滅此明法非生滅言一切法相雖從能所分別而生還從分別而滅蓋微細分別此識藏之相皆不可得即自滅耳既滅此一切分別之法則分別都無法亦無有如是則知此無分別之法實非有生滅可得而歸於一真實義矣爾時梵行長者聞說是偈心大欣懌欲宣其義而說偈言此敘聞法欣懌自述偈意諸法本寂滅寂滅亦無生是諸生滅法是法非無生此明不生寂滅義言諸法本自住於寂滅即此寂滅亦無有生若生於寂滅依然是一切生滅之法皆是虗妄故知是生滅之法而非無生之義也明矣彼則不共此為有斷常故此則離於二亦不在一住此明不住於一法言彼者指生滅法言此者指寂滅法蓋謂生滅則不共寂滅為一為彼生滅之法有斷常二見故而此寂滅法離於二見亦不執定住在一法也若說法有一是相如毛輪如𦦨水迷倒為諸虗妄故此明一法亦不有若言有一即為常見且法有何相可見而言有一耶此猶目中有翳妄見毛輪毛輪即空華也又如逐陽𦦨為水此皆是意見顛倒為一切虗妄所迷故耳妄見喻見分毛輪喻相分即第七妄執八識相分也若見於法無是法同於空如盲無日北藏作目字倒說法如龜毛此明亦非無法言若見於法謂畢竟是無即同頑空是斷見如盲人不見天日乃謂之無唯自生倒見耳則所說此無法猶如龜毛何有於實義哉考北藏作無目今依論釋中作無日其義亦通我今聞佛說知法非二見亦不依中住故從無住取此明法本無住言二見本非中亦不住三相俱離取其無住而為住也如來所說法悉從於無住我從無住處是處禮如來此明申無住禮言佛說無住之法我申無住之禮無住則無處不住故云是處禮如來此即是處是彌勒無門無善財也敬禮如來相等空不動智不著無處所敬禮無住身此明佛無住相言如來之相等於真空不動之智亦不著於無處所何有身相之可住耶故我即禮如來無住之法身已耳我於一切處常見諸如來惟願諸如來為我說常法此乃請佛說法言我塵塵剎剎觸目常得見諸如來願諸如來為說於真常之法爾時如來而作是言諸善男子汝等諦聽為汝衆等說於常法此特言告誡先䇿發敬聽之誠如來凡說前所未說之法必特起告誡之語況自涅槃已前從未嘗說及今得長者一問正撥動欲發未發之機便將最後涅槃會上寄滅談常之法對衆吐露故不得不特言告之善男子常法非常法非說亦非字非諦非解脫非無非境界離諸妄斷際是法非無常離諸常斷見了見識為常是識常寂滅寂滅亦寂滅此揀非以顯常夫所云常法者乃如來出世非常之法此非言說可到非文字可表非有諦義可得非有解脫可求非虗無而乃實有非外有境界而自心具足但離一切妄念而坐斷三際是法則不屬於無常蓋因離於斷常等見則能了然明見此識性而為常矣然是識之性常自寂滅即此寂滅之相亦乃寂滅而了不可得也善男子知法寂滅者不寂滅心心常寂滅得寂滅者心常真觀知諸名色唯是癡心癡心分別分別諸法更無異事出於名色知法如是不隨文說心心於義不分別我知我假名即得寂滅若得寂滅即得阿耨多羅三藐三菩提此顯寂滅即覺言即或知此識性真常寂滅之法者尚不能寂滅一心以彼所知之法及能知之心猶未能忘若一心常自寂滅俾心法一如能所俱泯而後乃得然得此心常寂滅者則此心自然常住於真觀之中體性本自寂滅即能知一切名色唯是癡心癡心即妄想名色即名相總言即色心諸法但衆生為一念之迷而起妄心及種種顛倒然此妄心從一而起一又從不思議起不思議者即無所起故曰道始生一即無為一生二即妄心既緣無為而有心復緣有心而有色是以一切業緣皆由色心而起又云內有一生即外有無為內有二生即外有有為內有三生即外有三界皆由衆生癡心妄想分別名相而有蓋不知分別於諸法更無特異之事出於此名色之外若知此色心之法如是更不用於分別亦不隨文字言說而心心契於實義不分別我法知此我法俱是假名即得住於寂滅之地矣昔如來始成正覺坐寂滅菩提場中謂寂於五住地煩惱滅其分段變易二種生死而覺道成今此若得證於寂滅便與如來無異故云即得阿耨多羅三藐三菩提後地藏菩薩言法應是滅及真常不斷皆收此中之義爾時梵行長者藏本作長者梵行聞說是語而說偈言此敘說偈之意名相分別事及法名為三真如正妙智及彼成於五此顯五法名即名相妄想如如正智五法也所云分別事指第七識即妄想法即名相妄想之法真如正妙智即如如正智言正智者謂從正性中所顯現之智又心無所依名之為正復言妙者謂心無所依有神化不測之妙故能顯現其智也然佛如上所說總不出此五法而五法該盡一切法皆由衆生癡妄分別計度一切名相不知本來如幻如化何有實義而妄執為我及我所耶且名相本非二法因相立名因名顯相又即是色心二法因名色迷心而有相因癡心分別而有名色色心俱迷即成妄想起信論云所言法者謂衆生心又云心能為一切法作名若無心則無一切名字當知世出世間一切名字皆是從心建立故名意言境本是假名也前此無相法品中先舉得五法淨是為大乘今佛說於常法即是五法淨長者體會佛意故特發明之我今知是法斷常之所繫入於生滅道是斷非是常此揀非斷常言我今知是五法皆屬於對待因衆生有幻名幻相故諸佛有真如因衆生有事識分別故諸佛乃有正妙智但既涉於對待即為斷常二法之所連繫而入於因緣生滅之道是則為斷滅之空而非是真常之法矣如來說空法遠離於斷常因緣無不生不生故不滅此明法不生滅言佛說空如之法本離於二見然因緣本無而不生然因不生故亦不滅因緣執為有如採空中華猶如石女子畢竟不可得此揀執有之非言若以因緣而執為實有如狂人欲採空中之華猶如求石女而生子此畢竟不可得者離諸因緣取亦不從他滅及於己義大依如故得實此明如實之義言當離諸因緣而取生相亦不從因緣取其滅相亦不取於己義大己謂本識義是陰界入大是四大即前大義科於此一切不取惟依於真如故得入於實際耳是故真如法常自在如如一切諸萬法非如識所化此明如如之法又揀其識化言既依如而得實是故真如之法常自在於如如而無變易矣若乃一切萬法此皆第七執第八相分見分而生色心諸法也故云非是如乃識所化耳離識法即空故從空處說滅諸生滅法而住於涅槃此明涅槃法空義言若離於識法相即空以故從空處而說滅諸生滅之法而且令其住於涅槃也意謂佛之說空祇為破有耳大悲之所奪涅槃滅不住轉所取能取入於如來藏此結成如來藏義言雖則住於涅槃終屬化城非可云久故必當得大悲願力之所侵奪蓋奪其涅槃寂滅不令住著而轉所取寂滅之法及能取涅槃之心皆入于如來藏中則能事畢矣此偈亦非對佛對佛自陳直是為大衆說法也後地藏菩薩問入如來藏收此中之義爾時大衆聞說是義皆得正命入於如來如來藏海此結聞義咸益教中謂比丘乞食謂之正命食以破四種邪命食故今此以受於一切法即名邪命若不受一切法為正命如前偈中所說即是此義故云皆得正命於此明自性體用即是入於如來得諸佛究竟智圓滿清淨法身是為如來藏海也昔曹山寂禪師取正命食立三種墮謂食者即是本分事知有不取故曰尊貴墮若執初心知有自己及聖位故曰類墮若初心知有己事回光之時擯除六塵境界寧謐即成功勳後却不執六塵等事隨分而昧任之則礙故立隨墮如外道六師是汝之師彼師所墮汝亦隨墮乃可取食食者即是正命食也亦是就六根門頭見聞覺知祇是不被他染污將為墮且不是同近來諸師多不明此墮字或者直以墮為墮落又曰作借義說非實義也一曰乃權立也而曹山自謂將為墮且不是同此一語可知然以披毛戴角為類墮者言其執初心知有為是同於聖位是即二乘墮於頂結必須是披毛戴角直向異類中行始得以故立類墮之名又不斷聲色為隨墮者若知有之後必欲斷於聲色此人祇坐在潔淨處若乃隨分而又昧任之則為礙必須一一騎聲蓋色頭頭任運縱橫始得自在無礙如彼之所墮汝亦不妨隨之而墮然終不被其所染污以故立隨墮之名又不受食為尊貴墮者以知有不取一切不受則凡聖情盡尊貴頺然以故立尊貴墮之名夫墮者即菩薩登法雲地亦云墮在佛數然曹山立義乃本於大乘經教今此中正命二字恰與尊貴墮合故特為表出耳音釋縠音斛細紗也鬘瞞髮美貌又夫人名勝鬘括官入聲包括些寫平聲少也穽音淨掘地為陷也毱音局伺音四潛候其隙也縻音縻繫也諭音預以言慰之也尋仍也忉音刀忉利天名在須彌山頂要平聲勤也嬈音擾亂也躐簾入聲踰跨也謐音密靜也
