body:
  text: 天台山華頂嗣祖沙門寂震述序品第一此為生信分蓋舉佛所説此最上一乘妙法令人生實信故又應信此是圓頓中最圓頓之法務令後世大根器人直入佛智地故首稱序品者總提一經之綱領也然經中舊分序正流通為三殊不知序內即是正宗如金剛般若只在世尊食時著衣持鉢入城乞食飯食訖收衣鉢洗足敷座而坐正是覿體顯示般若處如須菩提讚言希有早屬流通蓋以語言文字流通此般若也又法華會上入無量義處三昧放眉間白毫相光世尊説法竟即與華嚴會上入定放光一般又世尊入師子頻申三昧文殊作象王回顧勢亦祇是欠呿盼視而已此等皆是正説法若有言説盡是方便盡屬流通以故法華會上從三昧起無問自説又云止不須復説皆是方便接引之詞所以結集直稱為方便品雖然又不可廢方便而絶權機是以俯順衆生為欲顯諸佛所證心體示一乘圓頓祕旨而説此從前未説之法耳品者猶字三點非並非縱非別蓋結集此法義有先後明其不可移之意也如是初舉法生信從無言詮處立言詮也夫佛之説法但為顯如唯如為是故曰如是又華嚴合論云如者諸法如故即是佛故言如是雖然若人向言前薦得即此二字早已重添注腳何必更説百千萬言而後為得哉我聞謂我從佛聞然能聞是我所聞是法佛示以無説而説我以無聞而聞無聞之聞是為真聞無説而説是為真説如是而説如是而聞我法不立能所俱泯所言我者乃是我無我不二之法身真我也如是會得方知四十九年終未嘗説一字若云三乘十二分教是有不知總是如來糟粕一時若悟此一時二字便能坐斷三際更無第二時別生第二念起諸法見直下許伊見性成佛豈不聞宗門有云欲識佛性義當觀時節因緣且道觀甚麼時節秖如坐時立時經行時飯食時一切作為時無有不是者個時節因緣既然如是即今如何識得佛性義古德又云佛法遍在一切處行住坐臥處語言抵對處迎送賓客處穿衣喫飯處雖然才舉心動念便不是了也若不舉心動念當體即是脫或不然且向第二義門説此正是法華殿後機涅槃鋒前陳以始覺契本覺明始本不二之時也佛宗門中直指説即心即佛如將黃葉為金權止小兒啼若啼止時又應説非心非佛蓋以衆生識情計度説佛便著佛説心便著心遂致障塞悟門所以祖師云佛之一字吾不喜聞又訶説心性為惡口以故説心説佛總是藥病對治句必須向言語道斷處頓悟佛性直下與釋迦老子見處不別方得真見佛而後可轉是經在王舍大城耆闍崛山中王舍城乃摩竭陀國之屬境昔有千國王遭飛行羅剎之難後既得脫同願修道共立舍於此故曰王舍一云彼土人民七次作舍七度被焚僉曰我等福薄王有大福其舍不燒今當請王舍居之於是各書王舍字於其門得免故遂稱王舍大城耆闍崛此云靈鷲以山形似鷲故名又山有五峯而鷲峯居中即佛説法華經處也若據宗乘中塵塵是佛剎剎是佛心心是佛念念是佛奚止靈鷲山中黃面老瞿曇也與大比丘衆一萬人俱皆得阿羅漢道其名曰舍利弗大目揵連須菩提如是衆等阿羅漢比丘含怖魔破惡乞士三義一能令一切衆生出三界外天魔怖其境空二破衆生三惡業轉煩惱為菩提三乞食以資身乞法以濟世阿羅漢亦含此三義一殺貪嗔癡賊斷見思二惑從破惡以得名二不見有一法生不見有一法滅故不受後有從怖魔以得稱三堪為福田受人天供因乞士以成德此為四果聖人證五分法身登無學位無法可學故舍利弗此云鶖子智慧第一目揵連此云采菽氏神通第一須菩提此云空生解空第一此經正顯實際之體故絶無表德之詞但以智慧明般若以神通明解脫以解空明法身故惟舉三名而已又阿羅漢有三種一得決定寂滅聲聞羅漢如佛在世時聞法漏盡即趣涅槃此同於聲聞只求自度而已二修行菩薩行羅漢如楞嚴圓通會上雖證四果為化他故入菩薩乘名為回心大阿羅漢亦即涅槃所稱第四依人名阿羅漢此住於十地為後學所依止故三應化佛所化羅漢如過去佛退位利生以本願善根方便力故現諸佛土生大衆中內祕外現莊嚴諸佛大會衆故又如佛之大弟子及繼祖嗣化傳佛慧命之聖師皆是也復有菩薩摩訶薩二千人俱其名曰解脫菩薩心王菩薩無住菩薩如是等菩薩菩薩為半梵語具云菩提薩埵此云覺有情乃上求佛果下化有情之義摩訶薩此云大有情僅舉其三亦用表三德解脫表悲心王表智無住表行也夫菩薩乘略説有五一修空無我菩薩二漸見佛性菩薩三頓見佛性菩薩四以如來自性清淨智由住行向地及等覺五位加行起差別智滿普賢行成大慈悲留惑潤生住世菩薩五一乘菩薩前四俱屬三乘為權教後一乘菩薩為實教權教以諸行為本實教以明自性根本智為先證差別智為資權教中十地位終方始見性雖見佛性未彰智業猶假名菩薩又十地中次第證十真如復有十真如障故論云真如既成障明知權教施設假真如非本真也十地中菩薩得三種意生身初二三地得三摩跋提樂一云三昧樂正受意生身明住三昧樂從定發正慧故四五六地得覺法自性意生身明通達自性法故七八九十地得種類俱生無作無行意生身明示現種類無功任運猶如意生自得樂相故此皆屬權教祇得意生身未得智生身又經云十地差別如空中鳥迹如是地位權施增減皆為順世引接之説若一乘實教始發信心時於十住初心便悟根本無明住地煩惱即是諸佛不動智蓋以自本覺自覺本心身心性相與佛無二故如論云權教小見樂欲希奇菩薩稱根粗施接引令生樂學方授實門然不可執化為真恆迷智眼識權就實遷入法界之門有作之法難成隨緣無作易辦作者勞而無功不作隨緣自就無功之功功不虗棄有功之功功皆無常多劫積修終歸敗壞不如一念緣起無生超彼三乘權學此如來實教法門之明訓也台教分藏通別圓四教以圓教為最今此會中菩薩不滯三權惟登一實者也復有長者八萬人俱其名曰梵行長者大梵長者樹提長者如是等長者梵此云離欲以離欲而修清淨行故大梵例此可知樹提此云火其母食毒果已死火焚其尸腹裂而生其父請佛命名佛云是兒有大福德故生於猛火中可即名之事載涅槃經中然梵行表解脫大梵表法身火表般若長者表真俗不二如維摩詰雖為白衣奉持沙門清淨律行雖處居家不著三界雖明世典常樂佛法是地位菩薩示現長者身助揚法化耳復有天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等六十萬億此上總為通序常儀也天梵語提婆龍梵語那伽夜叉含勇健暴惡輕捷三義是天之唱報神乾闥婆此云香陰其身出香以香資陰是天帝樂神阿修羅此云具縛嘗與天戰敗受縛故迦樓羅即金翅鳥神緊那羅此云疑神似人頭有角是天帝法樂神摩睺羅伽即大蟒神人首蛇身人非人等總結前八部之衆八部之中唯天最勝餘者乘急戒緩即墮其類已上舊稱通序又名六種成就一信成就二聞成就三時成就四主成就五處成就六衆成就有此六種佛乃説法又以一時在會之衆證阿難所聞之法令後世生信故稱證信序臨入滅時阿難請問一切經首當安何語佛言當云如是我聞一時佛在某處與若干衆等説某經教及入滅後摩訶迦葉告衆云如來弟子得神通者宜赴結集於是俱至耆闍崛山畢鉢羅窟中畢鉢羅乃樹名佛於此樹下成菩提道故得是名然因山窟中有樹遂名其窟結集如來大法眼藏時阿難獨習漏未盡初不能入因是激發於後夜欲過疲極偃息却臥就枕頭未至枕廓然得悟如電光出暗者見道出大智度論當下即證阿羅漢果迦葉復告衆云此阿難比丘有大智慧所聞佛法如水傳器無有遺餘可請彼結集大衆默然迦葉告阿難言汝今宜宣法眼阿難承命禮衆僧足升於法座忽現相好如佛時大衆悉皆生三種疑一疑佛重生二疑他方佛來三疑阿難成佛而阿難唱如是我聞衆疑頓釋乃至衆等歡喜作禮奉行迦葉又問諸大衆云阿難所言不錯謬乎僉曰誠不異如來所説昔佛又言諸佛經首並同立此所謂佛佛道同也然序中有師資主伴內外護之義又明世出世間無有不信受者又須知三界內外若干種性總只在一心變現此心同於佛心即成佛此心同菩薩心即成菩薩至於八部天龍優劣莫不皆由一心變現而成故此經以本始二覺為宗本覺謂衆生覺性本自具足始覺謂諸佛始成正覺能自覺覺他覺行圓滿也又自覺者覺知自心本無生滅覺他者覺一切法無不是如覺一切衆生皆同是佛覺滿者覺自他無異理事圓融心境交徹一一遍滿法界又云諸佛成正覺窮盡萬法性源故能透過法界法界即法性即一真如心若權教十地菩薩猶坐在法界量裏以未能窮盡故然今以始覺契本覺而知本始之不二故説此一乘實教圓頓之法直令博地大心凡夫頓見佛性實乃羽翼教外別傳直指人心見性成佛之宗者也爾時世尊四衆圍繞為諸大衆説大乘經名一味真實無相無生決定實際本覺利行此別序經中大旨先述金剛三昧智用之利也稱佛為世尊者道為三界之獨尊德具十種之嘉號非此二字不足以盡至極之稱然佛常觀機逗教今當先説大乘而發起一乘之法如法華前先為説無量義也藏中大乘經凡四十餘部皆為教菩薩法此經獨為佛之心印以佛心印一切衆生之心使一切衆生皆得契證於佛心且義備而無缺語簡而不繁可謂至極矣梵語摩訶衍此云大乘大者當體立名乘者運載之義如起信論依於一心顯示摩訶衍義故云是心真如相即示摩訶衍體故是心生滅因緣相能示摩訶衍自體相用故蓋其體即如來藏性相即八識之相用即八識生滅因緣其立摩訶衍義謂如一微塵破為百分九十九分是無一分是有摩訶衍不能勝出以尚有此一分在故直須百分俱無摩訶衍始能勝出以能滅盡一切衆生心意識中微細之相方為大乘耳今云一味即指一心之法佛説一切法祇為欲令衆生明此一心故自小乘入大乘分始分終論權論實説頓説圓如涅槃經中嘗取醍醐為一味謂𤛗乳於牛從乳出酪酪出生酥生酥出熟酥而後成醍醐以醍醐喻涅槃佛性義謂其從三乘十二分教而出是教乘之極談但涅槃祇為二乘鈍根及末後根熟者説猶未能暢佛本懷今此是大菩薩特為後世上根利智者請其所説又不同經中屢稱一味又云無有諸雜味是真一味醍醐之心法也然心法無形言説莫及故曰我宗無語句實無一法與人若謂有法可説並屬虗謬非為一味真實所以佛囑大迦葉偈云法本法無法無法法亦法今付無法時法法何曾法由此宗門尊宿不立文字直提向上有入門便棒進門便喝惟以機用接人此從釋迦老子最初睹明星末後拈華示衆迦葉破顏微笑處得來是一大藏教中真骨髓四十九年三百餘會説不著唯有此經略較些子經云真實者真如實相也諸佛皆以權實二智立教此經一例顯實蓋真如之心本自無相無相之相是為實相所以金剛般若經云信心清淨即生實相當知是為第一希有功德夫信心清淨者謂信得此心清淨即生實相之功德矣又須知實相之相為衆相所依而衆相以無相為本也須知無相本即法身無相之心即是無生又一切法空即無相一切心空即無生無生即解脫義決定者不移易也於一切法俱不可得此心不可移易是為實際即般若義法身般若解脫為涅槃三德祕藏又此三德由翻三雜染故翻結業為解脫而縛脫不二翻煩惱為菩提而煩惱菩提不二翻幻化為法身而心體離念本即法身若得此法身解脫般若即同諸佛始覺夫本覺是衆生之正因有因必有果猶從本必獲利如人種禾成熟以刀刈取是必得之物故利字取以刀刈禾之義然衆生既有本覺之因是必獲始覺之果而法身解脫般若皆由本覺所出之利而行故此為金剛三昧之用而明一切智智之境界也若聞是經乃至受持一四句偈是人則為入佛智地能以方便教化衆生為一切衆生作大知識此明悉檀之益悉遍也檀梵語具云檀那此云施華梵兼舉故曰悉檀有四種一世界悉檀令衆生得歡喜益如陰界入等一切名相隔別名為世界佛隨衆生樂聞分別而説令得正見二為人悉檀令衆生得生善益如佛説法必先觀衆生心行然後為説令其信樂生善三對治悉檀令衆生得滅惡益如佛所説法皆應病與藥令其破惡四第一義悉檀令衆生得道如佛知衆生根熟為其説法即得開悟佛以此四法遍施一切衆生故名四悉檀也大論云四悉檀具攝八萬四千法藏十二部經故台教以之釋法華也今此經如無相無生覺利實際性空如來藏等各各名相隔別即世界義聞持悟入以之轉化即為人義以一乘破三乘之法一味除諸味之異即對治義若聞一心之法廓然頓悟即第一義然第一義中聞者無法可聞受者無法可受持者無法可持所云一四句偈亦是為人方便究竟無一字可得此是四悉之正意若失此意即著於法不名大乘若得此意但為衆生故隨時説法自他俱無所著方是入佛智地然亦實無佛智地之可入是為真入如是始能以方便教化衆生也夫義之所在曰方俯順機宜曰便以正道誨人曰教躬行於上風動於下曰化衆生者以三緣五陰四大衆法相生得名又曰衆共生世故名衆生又佛之方便大約不出三種正方便説三乘法巧方便説大乘法異方便顯第一義若無方便絶無開口處即拈華微笑與從上宗祖拈椎豎拂行棒用喝亦屬異方便又此方便佛從觀樹經行悟過去諸佛説法儀式將自己睹星所悟之道始而從實開權終則廢權顯實中間演出三乘十二分教如樹本是一因分枝發幹以成其大而終歸乎一故三乘十二分教皆為枝末皆是方便又須知時識宜知真識妄知病識藥方可用此方便為人如經云善知教化之法善知修道之人善知教化之過善知修道之過知此四法名善知識又經云善解空無相無作了達諸法究竟平等性相如如住於實際於畢竟空中熾然建立是名真善知識故稱善知識為天人師大不容易所以黃檗和尚云諸方盡是噇酒糟漢還知大唐國裏無禪師麼時有僧問諸方匡徒領衆又如何檗曰不道無禪祇是無師佛説此經已結跏趺坐即入金剛三昧身心不動此示三昧之體乃是世尊正説法處一經之大宗大旨從此而立然此金剛三昧實為一切三昧之母前以用發明此依體建立其體即法性身所謂實相無相是也其用即一切智智所謂宗通説通是也又從體立喻如大圓鏡從體發用則隨事應現又立此金剛二字為名非取喻也以其法性之身體本堅密故曰金剛又以情亡智現凡聖俱盡心無動亂無得無證無生無滅即是金剛正見若心稱此理是則名為金剛正定此三昧中境界非可以言語形容直須心與理合智與境泯方始相應故清涼疏云理顯故見法性身智明故見佛智身理智冥一見無礙身此三種身真所謂如人飲水冷暖自知若在言説盡是方便開權只此無言説處真是顯實正與摩竭提國掩室一般所謂全提正令時也當時只有文殊大士與迦葉頭陀識得黃面老子做處所以一日見世尊才升座大衆集定文殊便白椎云諦觀法王法法王法如是世尊便下座又一日世尊升座迦葉白椎云世尊説法竟世尊便下座如是方得勦絶文字言説實義始顯然則事無一向前此已顯語祕密今此結跏趺坐是身祕密入金剛三昧是心祕密身心祕密故曰不動今人若向此處識得黃面老子全身獨露底面目方見靈山一會儼然未散爾時衆中有一比丘名曰阿伽陀從座而起合掌胡跪欲宣此義而説偈言此請佛宣化先敘發起之端夫如來雖已默示法旨一衆罔知今乃請佛再轉法輪即屬方便即是流通矣比丘以諸法空為座此從法空而起也合掌表一心敬順胡跪表折節欽承教中以左右表邪正右順為正左逆為邪如云菩薩禮敬諸佛當發願言我今五輪禮佛足為斷五道離五蓋願令一切諸衆生安住五通具五眼願我右膝著地時令諸衆生得正覺願我左膝著地時令諸衆生離邪見願我右手著地時如佛坐於金剛座右手指地為震動一時疾證大菩提願我左手著地時攝諸外道入正道願我頭頂著地時令諸衆生離憍慢成就如來無見頂義出普賢行願中諸經之偈有二如十二分教中祗夜伽陀是也祇夜此云重頌頌前長行為增明其義或者為鈍根重説或因後至未聞重為宣説此會無此三種故無重頌伽陀此云諷頌節略其義言簡理備以便諷誦故又云孤起頌義不重復故名孤起即此偈是也今比丘即以命名蓋亦表此又翻譯名義云阿伽陀藥名此云普去能去衆病又云阿者入無生義又翻無來無去又云無底此以多義故不翻其所説偈深得如來三昧之義所以起悲濟之用申勸問之偈以發起一乘悉檀法益也大慈滿足尊智慧通無礙廣度衆生故説於一諦義此讚美佛德言如來大慈實為萬德滿足之至尊其智慧能通達一切而無所礙今為廣度三有衆生故説於一心諦實之義耳皆以一味道終不以小乘所説義味處皆悉離不實入諸佛智地決定真實際聞者皆出世無有不解脫此稱頌大乘言如來今者不同餘時皆示以一味醍醐無上之道終不以小乘法而為化度也且今所説一實之義一味之道皆離於虗謬不實直令衆生入諸佛自覺聖智之地至於決定不移真如實際而後已今世後世有聞此法者皆得出於世間更無有一衆生而不得解脫者也無量諸菩薩皆悉度衆生為衆廣深問知法寂滅相入於決定處此勸衆廣問言菩薩皆以度生為懷自雖無疑何不為後世衆生問於出世之道又須極其廣遠甚深非止淺少而已必當令諸衆生知一切法性本來寂滅之相入於決定實際而後可也如來智方便當為入實説隨順皆一乘無有諸雜味猶如一雨潤衆草皆悉榮隨其性各異此請佛垂訓言如來具足大智一切皆隨宜俯順善為方便若有所問必當為後世衆生分別其入於實際之説令一切法無不隨順皆歸於一乘醍醐之味則無有諸雜味間錯於其間矣然從前法立三乘性分五種總為權教今言一味一乘正顯其實又今此一雨所潤蓋言無大無小皆獲一乘之法雨也一味之法潤普充於一切如彼一雨潤皆長菩提芽入金剛三昧證法真實定決定斷疑悔一法之印成此明得法轉利言菩薩若得此一味法雨之潤則普充於一切衆生亦如一雨之潤衆草則必同得敷榮擢曜今法雨之潤衆生則皆能長菩提智慧之芽又且能令其同入於金剛三昧而證法身真如實際之定矣夫如是則後世衆生決定永斷二乘之疑之悔自得一法之印成此義即同森羅及萬象一法之所印教中謂之海印三昧萬象喻諸法相海喻一真如心也然比丘勸衆廣問欲以正法轉化衆生正是第一義悉檀昔佛之説法皆具四悉檀如大智度論龍樹菩薩所説而宗門雖教外別傳亦用此應機説法且夫分四悉檀者緣衆生根器不等聞佛一音演説各各隨類得解故分為四然前三謂之三益是世諦是心所行處後第一義謂之一道是真諦直是言語道斷心行處滅若上根利智淺聞深悟直明第一義則不必用前三悉檀矣中下之機不能領會師家婆心真切只得與其入泥入水故不免前三悉檀也今宗門中欲令人悟道先以人世虗假勉之後以生死二字激之此即是世界悉檀根性有利鈍察其機宜或示以棒喝或示以言句是為人悉檀既而痛下鉗鎚敲骨取髓辨魔揀異奪食驅耕是對治悉檀覿面一機箭鋒相拄豁然㘞地而悟是第一義悉檀然前三悉檀乃為鈍根之所設耳又須知世界中有為人為人中有對治對治中有第一義而第一義中無前三悉檀也若推而廣之凡有言句棒喝皆具四悉檀如若有若無若即有即無若非有非無是世界辨論此四句是為人以有破斷見以無破常見是對治離四句百非直下悟去是第一義又如舉竹篦字話喚著則觸不喚則背是世界令人向無觸背處道一句是為人一切總不得掃盡種種意解是對治若悟才開口便打是第一義又如一切言句棒喝是世界以此應機説法是為人斷人一切文字解會是對治令人向機下契悟是第一義至於五家綱宗旨趣各各不相混亂是世界互相闡揚是為人破人顢頇佛性儱侗真如是對治一句中具玄要分賓主辨權實明照用雙放雙收同生同死一切即一一即一切直下法法透過事事無礙是第一義此又豈非宗門中以四悉檀應機説法者乎倘師家鍛鍊或有不能開發初機者則不能用世界悉檀也或有不能提獎中下根器者則不能用為人悉檀也或有不能解黏去縛出楔抽釘者則不能用對治悉檀也或有不能顯大機發大用開鑿人天正眼者則不能用第一義悉檀也如入門便棒進門便𪡓直用第一義悉檀故中論云為向道人説四句如快馬見鞭影即入正路亦此意也又前三悉檀乃善誘曲導之教如説有説空説漸説頓説始説終説權説實後第一義直顯一心之法故除拈華直指外唯此經契同耳音釋般北末切半入聲若爾者切音惹般若蘭若皆從此欠謙去聲呵欠開口呵氣也又欠伸意闌則欠體疲則伸呿音恰張口貌盼攀去聲目顧也俗作盻即伊字注音著記物曰注與注同粕音朴糟滓也崛音倔鷲音袖鳥名剎音察幡柱也有能得一法即建幡告遠故稱剎瞿音渠瞿曇佛姓揵音乾埵音朵例音麗比也類也闥音獺蟒音莽葉音攝僉音遷咸也博邦入聲博地大也博學廣也逗音豆以言投機也衍音演𤛓音遘取牛乳也酥音蘇牛乳為之酪音洛乳漿醍音提醐音乎醍醐酪之精液刈音藝割也俯音府下也曲也噇音床不擇而食也匡自正正人曰匡勦焦上聲勦除也今誤作勦諦音帝精義入神曰諦如真諦聖諦諦觀諦聽諦當之類擢音濁拔也㘞和去聲猛然自省之聲又與哇同即人初生落地之聲闡徹上聲發明也顢音瞞頇音憨顢頇蒙昧不明之狀儱音壟侗音通儱侗不能辨析也黏音嚴俗作粘楔音屑楔子破木之錐
