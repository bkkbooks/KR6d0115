body:
  text: 天台山華頂嗣祖沙門寂震述無相法品第二之下解脫菩薩而白佛言尊者六波羅蜜者皆是有相有相之法能出世耶此揀世間有為相佛言善男子我所説六波羅蜜者無相無為此明無為法非與二乘所説之義同何以故善入離欲心常清淨實語方便本利利人是檀波羅蜜此徵明六度法夫菩薩修六波羅蜜深解現前真如一心之法修於離相皆以法性為體而惟順性為用也何為法性謂屬法是性故又在有情中名佛性在非情中名法性又此法性屬佛即為法性身屬法即為法性土性隨相異故今知法性體無慳貪故修法施所謂心常善入離欲清淨梵行捨於有為則無取無著而以真實語隨宜俯順方便為説自性本覺能出生法身解脫般若之利而獲始覺之果以此法利人是大乘法施度也至念堅固心常無住清淨無染不著三界是尸羅北藏無羅字波羅蜜梵語尸羅此云戒以知法性無染離五欲過故修淨戒是以至念堅固不為世相動搖心常無住絶於善惡兩途持犯不生清淨無染超諸世間不著三界此是大乘戒度也修空斷結不依諸有寂靜三業不住身心是羼提波羅蜜梵語羼提此云忍辱以知法性無苦離於瞋惱故行忍辱然先修空法以斷愛恚慢無明見取疑嫉慳等九種妄心之固結又離於諸有一曰三有欲有色有無色有又曰九有欲界與四禪四定又二十五有四洲與四趣三途并修羅為四六欲并梵天四禪及四空無想洎那含是也總則名為三界六道又楞嚴中并仙道為七趣若乃心不依此住於無為令三業寂靜外忘所對之境不住身心內絶能忍之念此是大乘忍度也遠離名數斷空有見深入陰空是毗梨耶波羅蜜梵語毗梨耶此云精進以知法性無身心相離於懈怠故修精進然遠離一切諸法假名虗數如二乘修不淨慈悲數息因緣念佛等五種觀為五停心以止貪嗔散亂愚癡多障五種過及四念處四正勤四如意足五根五力等種種名數斷空有二見深入五陰法空此是大乘進度也具離空寂不住諸空心處無住不住大空是禪波羅蜜梵語具云禪那此云靜慮以知法性常定體無動亂故修禪那然具離二乘之沉空滯寂而又不住於諸空如大乘初門中以六根無體為內空六塵無相為外空六識無有為內外空生滅相無為有為空空相亦無為無為空性體本虗為無始空法本常無為性空俱無亦無為不可得空廣説有畢竟空無所有空自相空諸法空無法空有法空無法有法空第一義空空空不住如是等空義而心常處於無住又不住於大空謂身所棲托即器世界十方無量無邊皆悉是空故曰大空此是大乘禪度也心無心相不取虗空諸行不生不證寂滅心無出入性常平等諸法實際皆決定性不依諸地不住智慧是般若波羅蜜梵語般若此云智慧以世人聞般若則生尊重想言智慧則輕故從梵語也知法性體明離於無明故修般若然凡夫執心有相諸佛則心無心相二乘取著空相大乘則不取虗空權教行於諸行實教則諸行不生二乘取證寂滅菩薩則不證寂滅二乘心有出入性非平等菩薩則心無出入性常平等如是則了知諸法實際皆決定性此即是般若真義然得此般若自不依於諸地漸修而又不住著於智慧此為大乘般若度也昔如來為蕩相遣執與二乘人廣談般若實相之義而後方説法華授記作佛蓋非由般若之妙決不能泯法見之執情苟無般若之力又何能受菩提之記莂耶至拈華直指盡掃言説之筌獨顯當機大用惟有迦葉尊者一笑相傳此佛祖授受般若之法印也且夫拈華一著世尊於三百餘會言説不到五千教典詮注不及然非拈華則不能顯示般若之法苟非般若亦無以深悉拈華之旨逮後列祖傳此心印或以機語或行棒喝覿面全提不容擬議是深得於般若者也故達磨一宗惟貴明心見性視一大藏教皆為剩語何有二十餘年之廣談哉嗟末世狂禪撥置教乘妄談般若其行同於凡夫便擬與諸佛齊等實可悲憫夫如來所演法藏聲教皆名為文離一切言音文字理不可説是名為義故經云凡有言説名世俗諦若知無相之相即是實相通達實相即名第一義空如來知世諦知第一義諦以剎那相應般若便能證得一切智智一切微細煩惱習氣皆永不生名無餘斷得名為佛何名為法實法不壞是名為法又於心無所著名為真法於一切法無所求是真求法於一切法皆無取著以諸法實相不可得故於一切法皆不取相亦不思惟無相諸法以相無相俱不可得故是以行深般若都無所見無所得亦無所住亦非不住無變易無分別故云不斷凡夫法不取如來法是修行般若波羅蜜然不為得法故修不為不得法故修不為修法故修不為不修法故修信於般若則不信一切法修行於般若則不修一切法然欲成立一切法應學般若以般若能成立一切法一切法皆般若中生故於一切法不取不捨實相法中無取捨故又善達實相了知其中無染淨故又不應觀一切法若可得若不可得而能住一切法修一切行成一切智所以云若無善巧方便則不能行於般若也然諸相應中與一切諸法空相應為第一如經云或遇惡心以刀割佛左膊者或遇敬心以香塗佛右肩者如來於割者不以為恨塗者不以為恩故永嘉大師云心與空相應譏毀讚譽何憂何喜身與空相應刀割香塗何苦何樂依報與空相應施與劫奪何得何失此實能與空相應者也然能與一切諸法空相應即與般若相應能與般若相應乃最尊最勝最為第一蓋般若相應即是空相應即是無相相應即是無願相應究竟亦無若相應若不相應是以學般若菩薩於諸法門如幻如夢如響如像如水月如空華如變化事如尋香城雖皆無實而現似有故於一切法不取有不取非有不取亦有亦非有不取非有非非有至於不取亦不取故於一切法都無所取由一切法自性不可得以無性為自性故於一切法如是故於般若亦不取行不取不行不取亦行亦不行不取非行非不行至於不取亦不取故於般若都無所取由般若自性不可得以無性為自性故如來知一切法空一切法無我一切法不可得三界所有惟是一心衆生執於有我起於妄行於第一義諦不了自性迷妄乃有衆苦增長諸根不實若能明了第一義諦則知無我無我所無作者無受者既無我我所無作無受亦無無明無明既無餘十一支隨之而滅一切衆生與十二因緣共行而不見知是故輪轉亦不能見其始終十住菩薩惟見其終不見其始諸佛見始見終故了了得見佛性但緣合謂之生生非實生緣離謂之滅滅非實滅若執空則為斷見若執有則為常見此二俱邪見非正見也又衆生因五蘊諸法蓋覆真性不知不見墮於凡夫異生類中不能出離是故菩薩於身五蘊觀色如聚沫觀受如浮泡觀想如陽𦦨觀行如芭蕉觀識如幻事作是觀已則諸識空無分別相諸行空無造作相諸想空無取像相諸受空無領納相諸色空無變礙相如是則不見色與受合受與想合想與行合行與識合無有少法與少法合本性空故又觀身中四大由執見生故有地大由愛見發故有水大由緣見起故有火大由妄見動故有風大此四大者因衆生四見相感而生若形質歸地精液歸水暖熱歸火運轉歸風四大各歸無少法可得本性空故二乘聲聞於五蘊中見身有苦常懷厭離欲斷諸集恆畏其生證於寂滅心契無為勤修道法以求自度志趨涅槃菩薩心雖向涅槃而不取涅槃身雖住世間而不為世間法之所染污蓋以處生死為樂不以涅槃為樂也又邪見外道為求解脫但欲斷死不知斷生若法不生即無有滅菩薩但斷其生而死自滅是故菩薩於苦集滅道四諦無有少法可得不見身有苦亦無集可斷無寂滅可證無道法可修以一念相應妙慧知自性諸法本空行於般若得善方便而於布施心無所著三輪體空無施受故住於尸羅不見戒相及持犯者行內外忍不見能忍及可忍者行於精進不見能行及所行法正念靜慮不見散亂及寂靜者行深般若正智觀察一切法空不可得故以不可得而行六度具修萬行於自身命無所顧惜於世樂具心不好樂知一切法性皆平等永不退捨一切智願知法如空心無所依無所著實無少法可得本性空故是以菩薩行深般若觀如來所説諸法祕藏言語道斷文字性空衆生十二有支由因緣故集無有集者亦無滅者故緣起性空於身五蘊因虗妄而有故五蘊性空所有四大由衆生情見外感以成虗假不實故四大性空至於六入十二處十八界等因五蘊四大故起六根由內六根取外六塵謂之入根塵相生而成謂之處根塵識互相因而立謂之界諸法相因俱非實有故入處界等諸法性空如是乃知衆生無性謂之人空知諸法無性謂之法空人法既空則不見有四諦以至六度萬行亦無少法可得無少法可得故心無所思心無所思故無所著無所著故名漏盡於本性空法真無漏故不墮三界故經云一切墮三界法是名有漏出世間法是名無漏又修習一切法門有生住異滅則名有為若法無生住異滅可得則名無為於一切法著我我所此非菩提覺知一切法平等離我我所名為菩提若不違法相與法相應能入平等顯現義理此是善巧方便説我今於大般若經六百卷中略説其義有如是也且吾禪宗一門稱學般若菩薩如從上百丈黃檗臨濟一輩大善知識説法皆是大乘般若義而後學反謂支離棄而不顧祇取其問答機語謂之真截提持而又有執棒喝言語為實法又認個主人公本來面目為實解者其去般若遠矣然此不住智慧一語可為宗門藥石善男子是六波羅蜜者皆獲本利入決定性超然出世無礙解脫此結明六度法也夫大乘初教中以前五度如盲般若如導為能導引皆歸於實際故又從般若發起方便願力智四度然施忍助戒精進助禪定後四度皆助般若總成戒定慧三學為菩提之資糧也即涅槃終教亦以明見佛性為指歸實教以悟諸法實際為圓頓一乘是皆尊般若為首導也又此六度皆獲本覺中所出之利而入於決定性故得超然出世無礙解脫夫此之解脫者非同二乘修於滅諦離諸苦縛之謂蓋於大乘中悟諸法空相無始虗偽妄想習氣悉皆滅盡且知外性皆自心現不起分別現行無明煩惱已伏即生死中而得解脫離生死外別無解脫也然二乘修習空法尚為空法所礙不知自覺聖智實利而心能離於一切又能通達一切於煩惱生死一切法無礙故解脫無礙知般若如虗空解脫亦如虗空知般若無邊際解脫亦無邊際此大乘無礙解脫境界也善男子如是解脫法相皆無相行亦無解不解是名解脫何以故解脫之相無相無行無動無亂寂靜涅槃亦不取涅槃相此結明涅槃三德教中云即寂而照為般若即照而寂為解脫寂照不二之體為法身然般若以無相為宗解脫以無相為行法身以無相為體總從一無相法中出生又涅槃具云摩訶般涅拌那此此云大滅度大者即法身義滅者即解脫義度者即般若義故以法身解脫般若為涅槃三德祕藏三即一一即三故喻如字三點也今此六波羅蜜以解脫為要終故言解脫之法相皆無相之行苟或取著解脫又被解脫所縛故又云亦無解不解是名解脫後復徵明解脫相義故曰無有相亦無有行無有動亦無有亂身心內外本自寂靜此即涅槃義所以華嚴經云一切諸法本性清淨是為涅槃也若住於涅槃即涅槃縛故云亦不取涅槃相教乘中窮究至此其説已盡縱饒三世諸佛也須口挂壁上不能更著一字唯達磨別傳一宗正要向者裏討分曉所以古德云宗門中事如籍沒却人家財産了更索人納物事秪如即今但問不取涅槃相底是甚麼人向者裏道得一轉語諦當分明方許伊談禪論教解脫菩薩聞是語已心大欣懌得未曾有欲宣義意而説偈言此敘述聞法欣懌欣者歡欣懌者悅懌後偈總述如上問答法義以結成之大覺滿足尊為衆敷演法皆説於一乘無有二乘道一味無相利猶如太虗空無有不容受此贊法化之德前序品贊大慈以求慈化衆生也此贊大覺以聞佛自覺覺他覺行圓滿之法化也隨其性各異皆得於本處如彼離心我一法之所成諸有同異行悉獲於本利滅絶二相見寂靜之涅槃亦不住取證入於決定處此明均獲之利言佛隨衆生性之各異皆令得入於本際之處如彼諸衆生能離虗妄之心我即得一法之所成就至於諸有衆生雖有同異之行悉能令獲於自心本覺之利而滅絶有無二相之妄見得寂靜之涅槃然亦不住於取證若取證涅槃謂之二乘果縛不成增進不為大乘因不住取證故得入於決定處也無相無有行空心寂滅地寂滅心無生同彼金剛性不壞於三寶具六波羅蜜此言無相之妙如佛言無相無行中得空寂之心住寂滅之地心心寂滅頓然流入妙覺果海而此寂滅於心無生同於金剛性體而不壞自性三寶具六波羅蜜是皆未曾得聞之法也度諸一切生超然出三界皆不以小乘一味之法印一乘之所成此述轉化之願言我今始知度諸衆生超出三界皆不可以小乘法唯説此一味真實之法以印之然衆生於此一乘圓頓而必有所成矣爾時大衆聞説是義心大欣懌得離心我入空無相廓曠蕩皆得決定斷結盡漏此總結悉檀歡喜之益所言廓曠蕩乃形容入空無相之心境盡漏者欲界以內心外境而生愛為欲漏色無色二界以內外惡法因緣成一切煩惱為有漏又以三界無明與我見合不能了知我及我所不別內外為無明漏此三漏能令心連流注散故與見思二惑及五住地煩惱同然離於虗妄心我則其漏自盡矣此偈解脫菩薩廣問修行出世之法後五品別明此無相法中之義而最後一品又收前六品中之法義也然華嚴第六現前地云三界所有惟是一心如來於此分別演説十二有支皆依一心而立於是逆順觀諸緣起相知自性空無作無受即得空解脫門現前知自性滅無有少法相生即得無相解脫門現前入空無相無有願求即得無願解脫門現前又欲滿菩提分法念一切有為和合則轉無和合則不轉緣集則轉緣不集則不轉固當斷此和合因緣然為成就衆生亦不畢竟滅於諸行故起於大悲不捨一切即得般若波羅蜜現前名無障礙智光明以其能觀一切自性平等清淨入甚深法門雖修菩提分法因緣而不住於有為雖觀有為而自性寂滅而又不住於寂滅中則得百千空無相無願三昧門悉皆現前於諸法如實相隨順無違得明利隨順忍此無相法品即同一法義也音釋羼音薩洎音忌及也懈音戒懶也怠待上聲慢倦也莂音必受記成佛謂之記莂喻如種禾移蒔也筌音詮取魚器音題兔網膊音博肩膊拌音潘俗作懌音亦音奎大之也廓與擴同張小使大謂之廓曠音纊空濶也蕩唐去聲廣遠也
