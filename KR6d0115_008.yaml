body:
  text: 天台山華頂嗣祖沙門寂震述入實際品第五之下大力菩薩言云何六行願為説之此請示六行佛言一者十信行此別示六行之名夫信以自心愨實為義又信為佛果之始因也初以一念清淨心諦信佛性之理名信心如論云心外有佛不名信心心外見法不成信心佛心與自心無二故方名信心得此信已圓明無礙憶念不忘名念心又能妙圓通達進趣真淨名進心精進不息慧性現前名慧心從慧得定湛寂不動名定心性定明淨唯進無退名不退心安住於法護念無失名護法心護久念淨回光向佛如鏡照鏡名回向心住佛光中心淨無漏名戒心遊行佛剎心隨願住名曰願心然此十心只在一念正信直趣大乘即得圓具二者十住行此十住乃菩薩之智海所謂依真而住住無所住也初心依智發明即入菩薩正位名發心住二增長大悲治心明淨名治地住三觀一切法修於般若名修行住四於法成就紹繼佛種名生貴住五以漚和此云方便善巧設化令衆離苦得樂名方便具足住六安住佛法中讚毀不動名正心住七得不退轉無生法忍心正增進名不退住八得廣大法圓融無礙含真抱一名童真住九善知世出世間一切諸法習法王行業名法王子住十成就一切智以增長諸佛智種名灌頂住此十亦以十波羅蜜為本所言發心者發明本覺心體即得根本實智知自性清淨知佛法差別解無差別解知佛境界體性平等功德智慧從此能修諸佛助道之法得諸佛説法智慧即能説法調伏衆生以故發心之功齊於妙覺果海真不可限量故發心已明見佛性不居惑地住佛所住故名曰住華嚴説十住後即説梵行謂有作有為非為梵行必須於身無所取於修無所著於法無所住於梵行亦不可得如是則心無障礙意無取著於諸法中不生二解一切佛法疾得現前初發心時即得阿耨多羅三藐三菩提知一切法即心自性成就慧身不由他悟三者十行行此十行為菩薩之行海也夫以行利人曰行一平等惠施無相無作曰歡喜行二以戒自淨以法利人曰饒益行三能忍一切心自調攝曰無違逆行四志求佛法心無怯弱曰無屈撓行五定慧圓明正念無惑曰離癡亂行六般若圓照善能示現曰善現行七究竟善巧示無作法曰無著行八以最勝法調伏攝化衆生曰難得行九以平等無礙善辨為人説法曰善法行十以諸佛誠諦之語誓願度生皆入實際曰真實行此正以十波羅蜜為本然欲自利利人必當繁興萬行故以此十行而利生也然於己無所求於欲無所染心淨如佛性無三毒絶生死回流入智慧大海為一切衆生護持諸佛正法得一切佛法海實相源底是為十行中事而此十行無行不攝行行無盡但出世心重悲願未深當行十回向法四者十回向行此十回向為菩薩誓願海也夫以悲願利生回己之功德而向於衆生故曰回向初以所行六度及四無量心一切善根回向衆生令得出世之道而不作我能利生之想名救護衆生離衆生相回向二以所得一切不壞信善根回向一切智願成熟衆生出世間法名不壞回向三修學諸佛回向之道所得法利今復回向諸佛願諸佛得無量樂轉更增勝回向菩薩證薩婆若回向衆生證一切智名等一切諸佛回向四以善根功德力至一切佛所供養回向衆生成就大乘名至一切處回向五以一切懺除禮敬勸請聞法開悟以至隨喜如是功德回向莊嚴諸佛國土普施衆生決定成熟平等教化名無盡功德藏回向六行內外施如資生之物及身分所有悉皆施與以此善根回向衆生住清淨道名入一切平等善根回向七以隨所積集一切善根回向衆生令成就無盡功德之藏名平等隨順一切衆生回向八以深心不壞智力便順真如相回向衆生圓滿一切清淨智慧名真如相回向九以一切尊重心善根回向以此得無著無縛解脫心而住於普賢行大回向心令衆生出生平等無礙智名無著無縛解脫回向十以一切法施善根回向願得廣大無礙境界圓滿一切梵行入等法界無量菩薩回向令衆生如我所得亦如是得到於彼岸名法界無量回向論云此十回向行回真向俗回智向悲又通攝住行地中諸法並修而進以大願力融會智悲生死涅槃成一真法界總歸於菩提實際耳又大般若經云心無自性心性無故心所亦無心及心所既無自性故心亦無回向心義又云菩薩回向心則非心菩提心亦非心不應非心回向非心又云心不應回向非心非心不應回向於心如是二種俱無所有無所有中無回向義是為菩薩般若波羅蜜五者十地行此十地為菩薩地海是菩薩果也夫地以持載發生為義然此十地行法實能發生道果為衆生成佛之基地又通前住行向三融成一法總名諸佛智地更須知此十地非必從住行向依次而進如經云若有衆生發廣大心受一切佛法即超凡夫地入菩薩地若十地行相次第現前則能趣入一切智地又此十地因佛智而有差別且同在一切智唯以差別而得名然地地皆以一波羅蜜為正修九波羅蜜為助修初地修於大捨二地等行十善三地忍苦為樂四地勤修菩提分法五地善修禪定始學世間法而於文筆讚詠圖書印璽一切技藝順世所作靡不該習為令衆生住於佛法故後五地已具釋品中茲不重述再舉台教中謂別教十地為圓教十住別教等覺為圓教初行別教妙覺為圓教第二行蓋以別教但破十二品無明故且曰別教誤以圓教之真因而為其極果也別即權也圓即實也故又云權教雖稱妙覺但是實教中第二行耳此以圓教從十信滿心次第斷四十一品無明始登妙覺位為智斷圓滿故也所以台教判華嚴為頓教兼別説圓而賢首以華嚴為圓教謂明一位即一切位一切位即一位如帝珠網互攝互入是故十信滿心即攝住行向地及等覺五位便成正覺故名圓教又頓教依大乘部中思益經云得諸法正信者不從一地至於一地又楞伽經有初地即為八皆明頓超之義然此總不説法相唯辨真性故為頓教今合舉二家教相以證此經蓋舉此六行者乃舉別以顯圓此依台教所判也位位頓超位位圓攝此賢首教相也然此經真是實成菩薩即圓而頓即頓而圓者也六者等覺行如是行者乃能知之此等覺為第六行又為十一地乃菩薩出離海也又前十信信自心即佛十住得諸佛之智十行行出世之行十回向成滿大誓願力十地成就利他之行功依地滿智以願圓即超佛地乃等於覺得金剛喻定現前又名金剛心菩薩是名等覺行此中唯不言妙覺乃是如來自己境界故然此六行若據華嚴圓頓義總只一念頓證便同等覺故入法界品借善財童子開後學趣進之門不須積劫修證一生便能成辦是謂無功大用自在圓融以顯一時一際一真法界而圓證生佛共有之本智也然佛於此經中略去信住行向又略去前五地只從第六地説起又且圓攝信住行向及前五地之法乃圓頓中之最圓頓者又言如是六行乃能知此真如之法則又明實教中信住行向及前五地皆同住一圓頓中矣又華嚴九地中云菩薩得如是無礙智唯除諸佛及受職菩薩餘無能比乃以所得之智校之此言六行能知正顯位位皆同攝也大力菩薩言實際覺利無有出入何等法心得入實際此問入實際法然入實際三字本從無相法品中發源以標此品之名要且從四無礙智中楔出又須知如上所説皆是四無礙智中精義入神處不得此智辨入神安能入於實際又即是真如之法轉換出實際二字實際乃真如之實際亦即本覺之利本無有出入之相但未審是何等法是何等心而能得入耶佛言實際之法法無有際無際之心則入實際此言心法無際則入矣大力菩薩言無際心智其智無涯北藏作崖無涯之心心得自在自在之智得入實際此乃領解佛意發明智入然從無際心轉出無涯智從無涯智轉出無涯心從心自在轉出自在智正所謂如楔出楔若不得自在智如何而得入於實際耶如彼凡夫軟心衆生其心多喘以何法御令得堅心得入實際此揀問喘患對治之法言凡夫者揀去二乘外道沉空滯寂之定專指世間一切庸常人中有心力軟弱者則其心多見易於喘動未知應以何法御止必令其得堅強猛烈之心方能入於實際耳實際即無生法忍之實際非具剛斷之智者又何能哉佛言菩薩彼心喘者以內外使隨使流注滴瀝成海大風鼓浪大龍驚駭驚駭之心故令多喘此明喘動之原謂心之喘動因五根對五塵有五十一種心所法用分內外有內外煩惱是皆隨物所使耳然隨其所使遂成流注相續不斷初雖點滴滲漏之微積久終乃成海此喻意識起諸現行攀緣六塵諸境而成衆生業海時遇六塵境風大起自然鼓湧識浪排空致使大龍有大威力者亦為之驚駭矣龍喻一心既有驚駭之心故令多諸喘動也菩薩令彼衆生存三守一入如來禪以禪定故心則無喘此示治喘之方言今欲治此喘動但令其存三守一由定而得安心安則無喘矣大力菩薩言何謂存三守一入如來禪此詢問名義佛言存三者存三解脫守一者守一心如入如來禪者理觀心如入如是地即入實際此約示其名注念曰存護念曰守如來禪返於自性清淨之體攝心返視曰觀理觀心如以自性真理返觀一心真如之體也宗門有如來禪祖師禪之分如來禪是明法身邊事即證此一心真如之體謂之法身死水解脫深坑不能任運發大機用故忽若被人問著便眼目定動開口不得此只是緣覺境界何能為人説法若祖師禪者如世尊才拈起華迦葉便破顏微笑時四十九年説不到底一時吐露在面前了也後人稱之為祖師禪此直明法身向上事所謂目前活潑潑轉轆轆物物頭頭無有不是顯發如來正法眼藏處不見龐居士有云神通及妙用運水及搬柴間有私議之曰豈有如來禪反不及祖師禪耶彼惟執如來為佛之嘉號尚未知如來二字之義大力菩薩言三解脫法是何等事理觀三昧從何法入此詳問其義佛言三解脫者虗空解脫金剛解脫般若解脫此示三解脫相即是空無相無作三解脫門又虗空即是法身義金剛即法身解脫之體般若即法身解脫之用然法身般若總成解脫法相三即是一一即是三以成涅槃三德祕藏也理觀心者心如理淨無可不心此示理觀之法言此心依真如自性之理清淨無染猶明鏡高懸物來斯鑒本無可否之心是即三解脫之本也大力菩薩言云何存用云何觀之此別問存觀二義佛言心事不二是名存用內行外行出入不二不住一相心無得失一不一地淨心流入是名觀之此總結存觀發明體用之義言此心於日用事物之中而不二乃是存三解脫之用也夫內從心而行外隨事而行心從內而出事從外而入若出入不二亦不住於一相心無得失之想住一與不一之地以清淨心而流入於自性不動之體是理觀之義也菩薩如是之人不住二相雖不出家不住在家故雖無法服不具持波羅提木叉不入布薩能以自心無為自恣而獲聖果不住二乘入菩薩道後當滿地成佛菩提此明其履踐之實證言若能依法如是而修者則不住於有無生滅內外得失等相雖不出三界無明家亦不住在世俗之家故雖無田衣法服不具持波羅提木叉此云保解脫又云淨命又云成就威儀戒不入衆布薩此云相向説罪而能以自心契悟無為之法為自恣樂而獲於聖果必不住於二乘而直入菩薩大乘之道矣然此的是第九地行相故曰後當滿地成佛果菩提滿地者圓滿十地也梵網經有云波羅提木叉是諸佛淨戒菩薩所應學護持如明珠方便勤莊嚴宜發大勇猛諸佛薩婆若悉由是處出此證大乘金剛心地光明戒非同小乘防非止過執身不行而取法服外相護持威儀而已大力菩薩言不可思議如是之人非出家非不出家何以故入涅槃宅著如來衣坐菩提座如是之人乃至沙門宜應敬養此歎德表敬蓋謂依於如是行相者雖非出家亦非不出家夫出家者所謂入涅槃寂滅之宅著如來智慧之衣坐菩提法空之座今彼皆已得又何異於出家耶吾謂如是人者不但天龍恭敬乃至識心達本之沙門亦宜亦應敬而養之宜者不定之意應者決斷之詞有敬而無養無以表敬有養而無敬則無敬事之誠矣佛言如是何以故入涅槃宅心越三界著如來衣入法空處坐菩提座登正覺一地如是之人心超二乘何況沙門而不敬養此印成其義而又發明心越三界入法空處即登如來無上正覺最妙第一佛智之地而心已超過於二乘直是大乘菩薩為諸佛之所稱歎者何況沙門而有不敬養者乎如維摩詰常為諸佛咨嗟弟子釋梵世主所敬是也大力菩薩言如彼一地及與空海二乘之人為不見也此揀問心超二乘一句佛言如是彼二乘人味著三昧得三昧身於彼空海一地如得酒病惛醉不醒乃至數劫猶不得覺此示二乘耽禪寂之病也味著者耽受不捨三昧者即指四禪四空而言二乘執禪定為身於大乘諸法空海及無上正覺第一智地如得酒病其心惛醉不醒乃至數劫猶不得覺蓋因以定持身經劫不出故也什公云貪著禪味有二障障涅槃及菩薩道故佛初入檀特山修道始於阿藍迦藍處三年學不用處定知非便捨復至頭藍弗處三年學非非想定知非亦捨又至象頭山同諸外道日食一麻一麥經於六年自惟苦行非正解脫遂亦棄捨而後始得睹星大悟成等正覺也酒消始悟方修是行後得佛身此明其覺悟謂其直待定力已盡如酒力之消方能覺悟乃修此自覺聖智之行而後始得如來正覺之身也如彼人者從捨闡提即入六行於行地所一念淨心決定明白金剛智力阿跋致度脫衆生慈悲無盡此直示頓超諸地無功用大行言其悟諸法空登正覺第一地者不須從地入地相續增進次第而得即從退沒善根不具淨信之凡夫梵語謂之闡提者即入菩薩信住行向地及等覺六行之中謂其能於六行地之所發一念清淨心光決定即當明白而具金剛智力住不退轉地梵語阿跋致便能以己之所利救度解脫一切衆生深慈重悲亦何有盡如佛又言一切衆生乃至二乘不信有佛果皆謂之斷善根闡提菩薩深信有佛法不見有大乘小乘佛與衆生同一法性乃謂之善根闡提蓋闡提者猶言凡夫也如摩訶薩此云大道心衆生又云大心凡天義同大力菩薩言如是之人應不持戒於彼沙門應不敬仰此揀問後世之疑慢佛言為説戒者不善慢故海波浪故如彼心地八識海澄九識流淨風不能動波浪不起戒性等空持者迷倒如彼之人七六不生諸集滅定不離三佛而發菩提三無相中順心玄入深敬三寶不失威儀於彼沙門不無恭敬此破其疑慢而發明智行也言諸佛説戒者為令衆生捨不善而生善捨慢而生敬故又以衆生識海中波浪洶湧故以戒珠而為止之也如依教而修依法而住者則彼之心地中已得空如無相之性體其八識海中自然浪靜風恬澄渟一色凡一行一動一語一默皆從九識真性體中流出白淨之法此乃一切境風如利得可意事衰失可意事毀不現誹撥譽不現讚美稱現前讚美譏現前誹撥苦逼惱身心樂適悅身心等所不能動而意識中狂波逆浪決然不起夫如是則戒體清淨其性等於虗空若言有戒之可持皆衆生自迷而生顛倒蓋無有所犯又何有所持耶如彼之依教法修行者其七識與六識之俱生我法二執決定不生蓋不生者以七六皆緣有漏心相見二分相見皆從八識所變又相從見生即前五色根亦是第八相分第七恆執第八見分第六相引而生故第八以七六生滅不停為相分而七六所知所見即第八見分世間出世所有萬法不出此二攝盡無遺若盡此相見二分即是真識之性體故曰七六不生有者以緣塵分別為見分山河大地無知色相為相分見分為心相分為境者反覺贅疣矣然既已七六不生則諸法所集皆入於滅定至此而又能以本誓願力畢竟不離法報化身之三佛發菩提心又雖得於空相亦空空空亦空所空亦空如是三無相中順自心之理玄妙深入抑且深敬三寶弗違自心不失威儀為世師範故於沙門決定不無恭敬之心者也後地藏菩薩又收此中七六不生之義菩薩彼仁者不住世間動不動法入三空聚滅三有心此結明入實際自在之智用然特稱為仁者蓋直從性體上立名性體之用有五若從法上見名之曰道從行上立稱之曰德今從體上發明則謂之仁又從理上説便是義從用上顯便是智又仁者取之以象也如果核中之仁兩瓣合尖處有孽在此一點櫱最微最細當善保育勿令有損則能發生長養性體亦然今此六七已不生八五亦寂滅真性圓明全體具在正如核中之仁以故稱為仁者非仁者則不能入於實際然今入於實際則決不住世間動不動法此即觀音耳根圓通所謂入流亡所所入既寂動靜二相了然不生之義同也三空即前空相亦空空空亦空所空亦空亦與覺所覺空空覺極圓空所空滅之義同也三有即欲有色有無色有此言三界依正二報皆因屬有漏果屬有為故所得正報即衆生五陰身所感依報即衆生所居土也又經云如來為破三有衆生而出世又云為破外道計梵王為生物之主又計無想天以無心為涅槃又計五那含為真解脫故也按梵王即初禪大梵天王為世界主劫初先生劫盡後滅無想天心想不生故名無想乃外道所居五那含天是三果阿那含居處又名五不還天此無想與五那含俱在四禪天之上今云入菩薩之三空聚滅衆生三有之心者正是九地中得無礙智入實際之能事也大力菩薩言彼仁者果滿於足德佛如來藏佛形像佛如是佛所而發菩提心入三聚戒不住其相滅三有心不居寂地不捨可衆入不調地不可思議此歎美頓超果滿釋成佛意謂如佛所言彼仁者欲得妙覺果滿但於具足萬德之報身與如來藏海之法身及形像應化之身如是三佛所發心便入於三聚戒中攝於律儀攝於善法饒益衆生而又能不住其相滅三有之心又不居於寂滅之地且能隨機誨誘不捨可化之衆生而入於阿羅漢不調之地真乃不可思議文殊般若經云漏盡阿羅漢是名不調以諸結已盡更無所調故然大力菩薩作是語已何故舍利弗忍俊不禁即起説偈蓋以大力菩薩從前所得四無礙善巧智又得諸佛所與無量法門直下即已入佛境界具足十力而墮於佛數矣但第九善慧地即是大智菩薩所行處非別有所證而得滿地況舍利弗於法華會上已得受記作佛直以大智自任故當機不讓耳爾時舍利弗從座而起前説偈言此序發起之儀只顯一前字以明直趣無上菩提也具足般若海不住涅槃城如彼妙蓮華高原非所出此先明具智之妙言菩薩具足此般若智海又不應住於寂滅蓋般若實從衆生中生如妙蓮華而産於淤泥之中若高原淨地本非其所出矣諸佛無量劫不捨諸煩惱度世然後得如泥華所出此明得法之難言佛於無量劫不捨煩惱度脫世間衆生然後乃得此智慧正如淤泥中蓮華之所出也如彼六行地菩薩之所修如彼三空聚菩提之真道此明修證之要六行為菩薩所修之行三空乃菩薩所證之真菩提道也我今住不住如佛之所説來所還復來具足然後出此發利生之願言我今誓住生死道中以利生不求自住於寂滅蓋菩薩隨順大悲而常居生死隨順理智而生死恆真雖厭而不離雖居而無著誠如佛之所説利生之法吾當以之化導然非止於一生而來此所將生生還復來此必令衆生具足此般若海然後吾乃出離於生死中也復令諸衆生如我一無二前來後來者悉令登正覺此明願力之弘言衆生雖具智慧復當令彼同於此願如我一般而無有二俾前來與後來者悉令登於正覺第一地而後已爾時佛告舍利弗言不可思議汝當於後成菩提道無量衆生超生死海此特印記其誓願成就告者祝詞也又示也然舍利弗在法華會上祇云安住實智中我定當作佛故佛乃與其華光佛之記然授記聲聞作佛為欲䇿進入無餘涅槃故為欲誘進行菩薩行故今舍利弗又發如是大願佛復示無量衆生超生死海之祝詞也爾時大衆皆悟菩提諸小衆等入五空海此結同聞悟入之益言當時雖有大小二乘之衆而皆得融會於一乘矣所云菩提有五一小乘菩提二二乘菩提三權教空行菩提四一乘菩薩十波羅蜜菩提五佛果智慧菩提然五空乃入實際之原始菩提為入實際之要終也音釋愨音却與慤同誠也璽音徙技上去二聲方術也藝音詣凡九流百工業皆曰藝涯水際曰涯崖山邊瀝音力點滿曰瀝水將盡而餘滴也駭音蟹驚也潑潘入聲散水曰潑轆音六轉換不定也惛音昏心不明也音皮恬音甜間靜也渟音廷水止曰渟誹音非誹撥謂言行不然也贅追去聲疣音由瘤也範音范模範櫱音孽萌櫱淤音迂澤中穢泥
