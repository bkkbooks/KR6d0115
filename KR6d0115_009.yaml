body:
  text: 天台山華頂嗣祖沙門𧧌震述真性空品第六此為滿地分前品已是智辨無礙如雜華經云得此無礙智於心欲有所說一切隨念無不得者又云縱使不可說世界一切眾生於一剎那間各各以無量言音興於難問一一難問各各不同而能於一念頃悉能領受仍以一音普為解釋雖已如是復更精進成就智明於一念中領受微塵數諸佛所說無量法門悉不忘失以此當念便得成滿十地既得滿地即得菩薩離垢三昧入法界差別三昧莊嚴道場三昧一切種華光三昧海藏三昧海印三昧虗空界廣大三昧觀一切法自性三昧知一切眾生心行三昧一切佛皆現前三昧如是無量三昧皆現在前若入若出咸得善巧最後得受一切智勝職三昧於此三昧中出生大寶蓮華坐於其上一切身分放種種光作大佛事此皆從真性空三昧中之所流出者也然住此地中以一切智如實知世間出世間一切法集又以上上覺慧如實知一切法化一切所持一切佛微細智一切法祕密又得菩薩無量解脫三昧陀羅尼門是故名為法雲地也今此舍利弗承前起後申問如來為欲開發後世眾生以明真性空義而得一生成滿智地又前四品皆是菩薩當機此獨讓舍利弗者葢以舍利弗稱大智已證阿羅漢道且獨預華嚴末會與文殊大士游行文殊是菩薩中大智舍利弗是比丘中大智況為佛大弟子中第一人所作方便皆為利生是內祕外現實非是聲聞乘也又此會若盡讓與菩薩則後世將謂非比丘所能如華嚴論云若言此經非是凡夫境界是菩薩所行是人滅佛知見破壞正法令佛法不行令人不生正見斷滅佛種罪莫大焉諸有智者不應如是吾於此經亦云是品又從無相法品得法真源句來爾時舍利弗而白佛言尊者修菩薩道無有名相三戒無儀云何攝受為眾生說願佛慈悲為我宣說此咨請攝受法儀言修於菩薩三空之道本無有名相可得即入於三聚戒中本不住於相則亦無有儀範可為師表矣如此云何攝受一切眾生而為其說法耶佛言善男子汝今諦聽為汝宣說善男子善不善法從心化生一切境界意言分別制之一處眾緣斷滅何以故善男子一本不起三用無施住於如理六道門杜四緣如順三戒具足此示真性空體明凡夫以惑業為緣也葢言一切眾生所有善與不善之法皆從自心幻化而生實由外之一切境界內之意識計度遂發於言音而生種種分別若乃制其外境內識而歸一心如相之處則諸妄緣悉皆斷滅矣又即此一心如相之處原不見有起相而於三解脫之用亦無所施以故住於心如之理則六道之門皆已杜絕夫如是則四緣隨如而順三戒無不具足者也意言分別者教中有三種知一比知二現知三約教而知第一比知者如人睡夢中所現好惡境界憂喜宛然並是意識思想所為覺來俱是不實可以此比知覺時所為亦如夢中無實故知凡三世境界皆因八識相分所變若目前現境是明了意識分別過未二境是獨散意識思惟夢覺二境雖殊俱不出意識如是則惟心之旨比況照然矣第二現知者凡現今眼見前境境不自言境皆是眼識與同時意識計度分別則意辨其為境而即言其此為何境也境本自如何嘗自立名件悉是意言故曰萬法本閒而心自閙耳然心生境有心空境空空不自空因心故空有不自有因心故有既非空非有則知惟心惟識矣苟無心識萬法安寄又如過去境心忽緣念隨念現前心念不生境亦不現此皆是眾生日用可以現知不待修行功用而後乃證故先德云如大根人知唯識者恒觀自心意言為境雖未成聖分若知此意言則是菩薩位中人矣第三約教而知者如經云三界唯心萬法唯識是也又云初心菩薩皆可比知亦可約教而知先以聞解信入後以無思契同若入信門便登祖位昔永明壽禪師嘗以此示人又云此事非上根大智莫能擔荷所以先德云盡十方世界覓一人伴侶無有也又曰止是一人承紹祖位終無第二人須是親到始得若未親到縱曰玄之又玄玅之又玅但是方便門中旁贊助入之語於自己分上返照之時皆為魔境夫永明禪師日夕修持百八件事今此說不是無謂而發因當時說法之師不識唯心之旨直指之宗又因賢首天台慈恩三宗彼此矛盾永明乃集三宗之精於法義者更相設難永明以心宗而折衷之總輯其語名宗鏡錄一百卷一時稱震旦法施主故有是說耳舍利弗言云何四緣如順三戒具足此徵問未達之義佛言四緣者一謂作擇滅力取緣攝律儀戒二謂本利淨根力所集起緣攝善法戒三謂本慧大悲力緣攝眾生戒四謂一覺通智力緣順於如住是謂四緣此明四緣三戒知聖人以機感為緣也一者謂凡有所作當自揀擇斷滅一切障染以無漏智力取以為緣此即是攝律儀戒以明止作持犯也百法明門六種無為法中有擇滅無為非擇滅無為註云擇謂揀擇滅謂斷滅由無漏智斷諸障染而顯真理為擇滅一真法界本性清淨不由揀擇斷滅而顯名非擇滅今用擇滅二字本此二者謂得本覺所出之利以清淨根本智力之所集起取以為緣即是攝善法戒以修一切菩提分法也三者謂從本覺慧解發起大悲之力而以為緣即是攝眾生戒以饒益有情也此即是三戒具足四者謂得一心覺悟以通達佛智之力為緣而順於真如之相而住是為四緣中而本具三戒也戒本滅惡生善為初心入道者說然以真理觀之因緣本無自性善惡皆由習成如昔阿闍世王自知罪重翻然改圖又阿育王頓爾自悔修諸善行皆獲福果故知善惡業緣但隨心變現從緣而生所以楞伽百八句有自性句離自性句也善男子如是四大緣力不住事相不無功用離於一處則不可求此釋明緣力功用言此四緣雖則不住事相亦乃不無功用若離於一心如處亦不可求也善男子如是一事通攝六行是佛菩提薩婆若海此結明通攝六行言如是一大事誠非小緣直下頓悟即能通攝六行是即佛果菩提一切種智之海也佛說如來七常住果所謂菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智然名雖有七其體本同也舍利弗言不住事相不無功用是法真空常樂我淨超於二我大般涅槃其心不繫是大力觀是觀覺中應具三十七道品法此領解觀覺言若不住事相則不著於有為不無功用則不著於無為是法即為真性空矣然凡夫無常計常無我計我無樂計樂不淨計淨二乘則常計無常我計無我樂計無樂淨計不淨是皆為顛倒見也今真性空中破顛倒見常是真常即法身義我是真我即是佛義樂是真樂即涅槃義淨是真淨即是法義又眾生有世間我法果地有聖教我法今得真性空法則人無我法無我如來常說超此二無我便入等覺今此必得於諸佛大般涅槃而心亦不繫於涅槃是即大力菩薩所說不居寂地之觀但此觀一覺頓悟之中亦應具三十七道品法也佛言如是具三十七道品法何以故四念處此示七科之名一觀身不淨因染緣而有二觀受是苦有逆順內外而生諸苦縛三觀心無常而念念遷流四觀法無我約法計我無有定相如佛言比丘當依四念處行道能為三乘觀行初門又云雖行四念處而不畢竟永離身受心法是菩薩行四正勤此於四念處精勤修習正則不邪勤則不惰然於已生惡令斷未生不令生未生善令生已生令增長此是慧學又云雖行四正勤而不捨身心精進是菩薩行四如意足一樂欲於法名樂欲如意足此是定根二專注於心令法不斷名念如意足此是定覺三於諸善法精勤無間名進如意足此是定力四思惟彼理心不馳散名慧如意足此四是入定方便以正勤心少散當攝之以定則定慧均等然二乘修之得作意神通大乘修之則得自在神通矣五根依於四念處諦信不疑為信根住持不忘為念根倍䇿精勤為進根湛寂虗通修心不亂為定根明辨實諦以慧照了為慧根然二乘修之在無分別分別則念不純一菩薩離諸緣塵而能分別眾生諸根之利鈍也五力即五根增長積集成力以排欺怠嗔恨怨五障此五能為信進念定慧之障故也菩薩雖行五力而求佛十力七覺分念覺分念法性空擇法覺分分別了義進覺分勤修不退喜覺分護諸法喜除覺分煩惱輕安定覺分於定明了捨覺分捨諸有為此七支分隨機施設若心浮動以除覺分去身口之粗以捨覺分捨於觀智以定覺分而入於禪此修定學若心沉滯以進擇喜三覺分而䇿之此修慧學若不得力即趣後品二乘修此惟分別偏空之法菩薩而能分別佛之智慧八正道等正見離於斷常正思惟不生一念正語口業無失正業染淨俱離正精進勤修涅槃正定住理不移正念心不動失正命無所希愛清淨知止前七覺分乃觀一切法空無法可得義此八正道以無漏智為本能至涅槃故經云雖行八正道而樂行於無量佛道乃是菩薩行多名一義不一不異以名數故但名但字法不可得不得之法一義無文無文相義真實空性空性之義如實如如如如之理具一切法善男子住於如理過三苦海此明七科之義言雖有如上眾多之名實惟一義耳又觀此法相實乃不一若心如之義於一切諸法本不有異是皆以文言詮表其名相法數故但有假名字究竟真理法不可得須知此不得之法乃是一義而無有文然此無文字相之義即真實空性此空性之義即真如實際其體如如不動此如如之理具一切法以一切法皆從如如性體中流出故若能住於如如之理則超過世間之三苦海矣三苦即行苦壞苦苦苦以十二支中自無明至六入是行苦觸受是苦苦餘屬壞苦住於如理即十二支滅而三苦斷矣舍利弗言一切萬法皆悉言文言文之相即非為義如實之義不可言說今者如來云何說法此顯實揀疑謂誠如所言則一切法悉是語言文字語言文字之相即非為實義矣夫真性從堅密本覺而生語言由七處從下丹田而上觸胸喉舌唇齒齗以及于頂而發內外經論從語言而起而真如實際之義不可言說如是則常應示默方可顯此實義今者如來云何又為眾生說此一切法耶然非舍利弗之大智亦何能發此一問惜乎在涅槃會上不忍見佛滅度乃先示滅當時若在見世尊拈華決不讓大迦葉獨擅一時也佛言我說法者以汝眾生在生說故說不可說是故說之我所說者義語非文眾生說者文語非義非義語者皆悉空無空無之言無言於義不言義者皆是妄語如義語者實空不空空實不實離於二相中間不中不中之法離於三相不見處所如如如說如無無有無有於無如無有無有無於有有無不在說不在故不在於如如不有如不無如說此發明無文實義言我向所說法者以汝與一切眾生皆在眾生之中而以為說故不得不以方便權巧說此不可說之義是故說之然我之所說者皆是實義之語而非文字眾生說者文字之語非有實義華嚴懸談嘗引此四句以證會相顯性之義佛又言非義語者即世間戲論皆悉空無不實故空無之言無有言於實義不言義者皆是眾生虗妄之語也如佛言實義之語者實本自空而不空非空即有空本自實而不實非有即空空有俱非則離於二相應是中道然中亦不著於中故曰中間不中如昔六祖問南嶽讓禪師云甚麼物恁麼來讓云說似一物不中祖云還有修證也無讓云修證則不無染污則不得此真契證此無文實義者也然佛又言此不中之法離於空有及中三相不見其有處所此是如如中真如之說然真如中本無無與有對因無而有於無真如中本無有與無對因有而無於有究竟此有之與無二義俱不在乎是然今說此不在有無之故亦不在於真如何故雖云真如亦不真有其如但今為度眾生所以不無此真如之說也舍利弗言一切眾生從一闡提闡提之心住何等位得至如來如來實相此問眾生修進之位言一切眾生從一介凡夫本不知有善亦不知有信此所謂一闡提也若闡提發起一念正信之心又當住何等位得至如來之地而能究竟如來之實相也此品祇得發明如來後二品總言如來實相佛言從闡提心乃至如來如來實相住五等位此總示五位一者信位信此身中真如種子為妄所翳捨離妄心淨心清白知諸境界意言分別此別示名義謂自信此身之中具有真如佛性種子一向皆為諸妄想之所障翳即便捨離妄心之汙染能以淨法自治其心返於清白真性之體知一切境界由意言分別此是信位即大乘資糧位二者思位思者觀諸境界唯是意言意言分別隨意顯現所見境界非我本識知此本識非法非義非所取非能取此言既得是信則觀察目前一切境界惟是意言因意言分別即隨意識顯現目前所見諸塵境界此非是我本性之識然自知本性之識非屬於法非屬於義亦非所取能取是為思位即加行位三者修位修者常起能起起修同時先以智導排諸障難出離葢纏此言從思以修習心常起智既能起智則修習之心與起智之心同時而發雖則同時然當先以智為前導夫智有開治之功實能排障難而離葢纏也障即欺怠嗔恨怨五種葢即貪欲嗔恚睡眠疑五種纏者嗔是忿恚纏隱覆罪垢是覆纏意識昏迷是睡纏五情暗冥是眠纏縱逸嬉戲纏躁動掉舉纏屏處起罪不自羞為無慚露處起罪不羞他為無愧財法不能惠施曰慳見他榮樂心生熱惱曰嫉是為十纏皆能覆蔽真性苟不得智無以治之此即修習位四者行位行者離諸行地心無取捨極淨根利不動心如決定實性大般涅槃唯性空大此從智而行出世之行若依行布增進則有住行向地四十位心今以頓超而言則本無階級故離諸行地然二乘心存取捨若修大乘者無取無捨心極清淨根性猛利於不動心如之體決定見其實性知如來大般涅槃唯有自性真空為大是為行位約體會真如即一心真見道是見道位五者捨位捨者不住性空正智流易大悲如相相不住如三藐三菩提虗心不證心無邊際不見處所是至如來此從行而捨謂雖得是性空之理亦不住於性空何也以正智流易故葢以如來正智觀察則一切法本無生滅本非有無皆因眾生妄想而起人法二種執遂有煩惱障於事爾𦦨障於理故論云由人法二執二障俱生若正智現前知人無我則煩惱清淨知法無我則爾𦦨無相是以證於二空二障隨斷今此悟於性空亦不住於性空則生死涅槃悉皆蕩盡而空不住空空無空相若有空相可得則偏於空非為正智矣所言流易者此正智之體即真常流注乃隨緣而生本未嘗生隨緣而滅本未嘗滅亘古亘今周流變易今以度眾生故即起自性之大悲而示真如之相然相本不住於如故於正徧知覺虗心而不求證其心量豎窮橫徧無有邊際豎窮則坐斷古今橫徧則剎海普攝故不見其有處所是則至於如來之地也約教中等覺行尚有一分無明取生死涅槃二相潤非漏非無漏業有變易身至玅覺最後解脫道斷習盡智明一切棄捨名究竟位此云捨位於義正合佛設此五位正欲破諸行地之相又此五位約義前行位中體會真如乃是得至如來此捨位是如來實相但實相之義非止如是後二品總言如來實相又智論云三世諸佛皆以實相為師夫實相者以正智會於真如正智與如如二俱離相故又本覺是如始覺是來始本不二是如來實相即等玅二覺之法故今止曰是至如來善男子五位一覺從本利入若化眾生從其本處此總結五位以明其本言如上五位唯是一心覺悟即前一覺通智力緣順於如住然此從眾生之本覺得始覺之利而入於淨性中也又言若化眾生從其本處此本處者即本覺即真如種子也舍利弗言云何從其本處此徵問本處之義佛言本來無本處於無處空際入實發菩提心而滿成聖道何以故善男子如手執空不得非不得此示無本無處言本者從來無本處者住於無處無本無處即是性空實際得此性空實際則入於實相如此發明眾生本覺之心而即圓滿成就於聖道矣然此性空雖乃無本無處之可得亦非不可得者亦非實有所得實無所得惟在默識潛通神會心領此猶虗空雖非手之可執且已得一拳之空然拳中之空非可謂之不得故曰如手執彼空不得非不得舍利弗言如尊者北藏無者字所說在事之先取以本利是念寂滅寂滅是如總持諸德該羅萬法圓融不二不可思議當知是法即是摩訶般若波羅蜜是大神呪是大明呪是無上呪是無等等呪此體會真如而證實相言如佛所說今我已知利生之法當令其在事用未發之先取以發明眾生之本覺而得始覺之利也夫事用之先是諸妄念未生性本寂滅寂滅之體即是真如此真如性中本自具足清淨圓滿乃是德之大本而能總持諸德是法之全體而能該羅萬法一切性相智識真妄染淨及生死涅槃皆圓融不二即生滅即不生滅雖不生滅不妨熾然生滅真乃不可思議者矣當知是法即是諸佛大智慧到彼岸究竟之法然般若之名有三一實相般若二觀照般若三文字般若由文字而觀照法空由觀照法空而得實相般若以無所得而為實相故舍利弗有此言下四句是贊般若法者呪此云真言亦云密語謂般若乃真實祕密之言具大神變能通諸佛祕藏有大明照能破眾生暗鈍世間出世間無有能勝故云無上無可與並故云無等等在事之先一句是宗門旨要教中祇是說到宗門中直須覿面用出時有僧侍立遽問之曰你未開口前一著作麼生聻僧擬議即以竹篦擊之曰又落二落三去也佛言如是如是真如空性性空智火燒滅諸結平等平等等覺三地玅覺三身於九識中皎然明淨無有諸影善男子是法非因非緣智自用故非動非靜用性空故非有非無空相空故此印成智證以明二覺言知此真如空性即得性空之智其智如大火聚能燒一切諸有結業無不淨盡葢眾生因有我故乃有生死有生死故說涅槃所以淨名有云我等涅槃等我及涅槃此二皆空離二法故故云平等平等又云菩薩住無分別一切名義中平等平等又依二種平等謂能緣所緣能緣即無分別智以智無分別故稱平等所緣即真如境境亦無分別故稱平等又此境智不住能緣所緣義中譬如虗空故說平等平等由此義故菩薩得入真實性又般若云一切法自性空是平等性於平等性中學名平等學由平等學疾得無上正等菩提今此以智慧火焚盡諸結生死涅槃融成一法得平等之平等而等於覺住金剛心約佛智地中望後法雲望前玅覺惟有此三地然三地原即一地不勞彈指之頃便登玅覺位解脫道斷具法報化三身然一切眾生性中皆具此三身法身即法性身從法性身乃有眾生五陰正報之身於一心中現起諸行即應化身故曰眾生寂滅即是法身法身隨緣即是眾生葢以寂滅非無之眾生恒不異真而成立隨緣非有之法身恒不異事而顯現也又經云法身流轉五道名曰眾生眾生現時法身不現故教中以三因性開發而成三身如法身即正因性開發報身即了因性開發應身即緣因性開發是皆眾生之本有即從一心中法身般若解脫三智而以證得若三智圓明則三身互顯矣然佛觀眾生根器常以三身說法法身說法不可以言語音聲形相文字而求無所說無所證自性虗通而已報身說一切自性清淨法化身說六度萬行法古者云報化非真佛亦非說法者以法身自性虗通故也既證得法身於九識真性體中自得皎然明淨而無有一切妄想緣影生乎其間矣然以正眼觀之是法非屬因緣以真智自能運用故非屬於動靜以能運用此性空故非屬於有無以空相本亦空故此無非為度眾生權說為空耳後地藏菩薩言法性空故收此中之義善男子若化眾生令彼眾生觀入是義入是義者是見如來此特明後世化法當深觀察必求悟入斯義經云不應於一法一事一身一國土一眾生見於如來應徧一切處見於如來夫如來者即一心真如自性中來又經云如來即是法也起信論又云所言法者即眾生心又云如者即不動法身之本覺來即報化二身之玅覺也舍利弗言如來義觀不住諸流應離四禪而超有頂此問明獨超界外之義言今以如來實義觀之真乃逈然超出界外若外道修心想不生而生無想天二乘修寂滅定而耽空滯寂居四禪之頂凡夫祇修覺觀亦是妄想禪大乘權教慧定不能等修實教有理定事定通於凡聖大小二乘皆不出四禪八定今此最上乘不住諸流應離四禪而超有頂矣佛言如是何以故一切法名數四禪亦如是若見如來者如來心自在常在滅盡處不出亦不入內外平等故此揀過顯滅言一切世間法惟有名數而無實義如初禪覺觀未定二禪喜大發動三禪樂心多亂四禪謂純得清淨無出入息皆為二乘禪以有出入故非為真禪亦屬名數若乃見自本性知諸法皆如而來者則知自性即是如來心常自在常在滅盡處念念寂滅無有出入以內心外境悉平等不二故也善男子如彼諸禪觀皆為想空定是如非復彼何以故以如觀如實不見觀如相諸相已寂滅寂滅即如義如彼想禪定是動非是禪何以故禪性離諸動非染非所染非法非影離諸分別本義義故善男子如是觀定乃名為禪此揀妄明真又前揀名數之非此揀想念之咎前祇揀四禪此總揀諸禪觀想之過如二乘外道等所修皆為想念空定若是觀如實之相則非復同彼二乘外道以想念禪觀而為定者也葢吾以如而觀於如實不見有可觀之相以如相中諸相悉已寂滅而此寂滅之體即是如實之義也若彼二乘外道總是想念禪定有入有出即是動相而非是禪須知禪之體性離諸動靜如彼虗空無動靜故又云非染以不受垢染故亦非所染不為垢之所染故非有法相如虗空體非羣象故非有影質如虗空不礙萬象發揮故又禪性離諸分別如虗空本無有分別以本性如義為義故如是觀定乃可名為禪耳後地藏菩薩言如相寂滅收此中之義舍利弗言不可思議如來常以如實而化眾生如是實義多文廣義利根眾生乃可修之此明化於利根言我知如來出世常以真如實相之義化諸眾生然則如是實義中真乃具足多文廣義而為演說須是上智利根眾生乃可以修之也鈍根眾生難以措意云何方便令彼鈍根得入是諦此求鈍根方便言如何令其措置於意而能得入耶佛言令彼鈍根受持一四句偈即入實諦一切佛法攝在一四句偈中此示持偈發慧如瑞光徹禪師初苦行不識字義三峰藏和尚口授南嚴尊者偈云大智發於心於心何處尋成就一切義無古亦無今俾力持之如是三年不少懈一日忽覺風聲鳥語皆轉此偈因而求明偈意後即頓省乃於禪宗得大徹悟以斯較之不特佛在世時用此方便今時亦可驗也第苦於不自信耳舍利弗言云何一四句偈願為說之此請佛說偈於是尊者而說偈言因緣所生義是義滅非生滅諸生滅義是義生非滅此垂偈裕後謂凡屬因緣所生之義是義終歸於滅非從實義而生若滅諸因緣生滅之義乃是實義之所生而非有所滅矣初舍利弗因路逢馬勝宣說佛偈云法從因緣生法從因緣滅生滅是因緣自性非生滅遂了悟自心得須陀洹果後至佛所七日徧達佛法經十五日得阿羅漢今此偈意亦同乃知非獨為鈍根者說即舍利弗之大智亦由一偈而得悟耳但智者或聞說即便領悟若鈍根者必須久久受持方能開解也爾時大眾聞說是偈僉大歡喜皆得滅生滅生般若性空智海此結眾聞獲益於時同聞之眾皆得滅於因緣所生之義然得此滅生之義便入於般若咸知性空為體智海為用也品末更不說偈因先已贊歎於前品之末故不復說舍利弗請佛說偈祇完最初云何攝受為眾生說一語學者先從此一偈悟入而後方能通達此中多文廣義一切佛法又此偈明眾生本覺一切佛法即本覺所出之利最後般若二字正結明無相法品末之般若即是此滿地中般若一切般若皆攝此一般若中此一般若能出生一切般若波羅蜜門所以大論云說般若有二一共聲聞說二但為十地大菩薩說非九住所聞何況新發意者又九地所聞與初地所聞各各不同淺深有異又般若是菩薩本事在菩薩心中名般若在佛心中則名薩婆若故後二品絕不言般若惟談實相正智而已音釋件乾上聲數也予音侔兵器盾豚上聲矛盾兩兵持犯也衷音中折衷斷其中也惰駝上聲怠也齗音銀齒根肉也擅音善獨專也掉迢上聲搖動貌遽音據急卒也聻音你語後指實其事之聲措粗去聲處置也音預有益于後曰
